<script>

/*
* Funcion que permite habilitar un modad para agregar una especie al grupo   {panelId: panelId}, openModalSearchConcept
*/
function addConceptToGroup(e){
  
  // Se previene el evento por defecto
  e.preventDefault();
  
  // obtenemos los datos de la especie seleccionado
  var conceptData = e.data.conceptData;
  
  // referenciamos la tabla
  var $table = $("#tblAddNewGroup");
  
  // Obtenemos los datos de la columnas que no se deben insertar 
  var notColumns = $table.data("notColumns");
  
  // referenciamos el cuerpo de la tabla
  var $tBody = $table.find("tbody");
  
  // OBtenemos las filas 
  var $rows = $tBody.find("tr.isValid");
  
  // Numero de fila que se va a insertar 
  var rowIndex = $rows.length + 1;       
  
  // Verificamos de que se pueda agregar la especie 
  var stateVerificateConcept = verificateConcept(conceptData[1], $rows);
  
  //validamos si no esta la especie para agregarlo 
  if(stateVerificateConcept){
    
    // adicionamos la fila
    addRowInManageGroupTable($table, $tBody, conceptData, rowIndex, notColumns, null, null);
    
    // iniciaizamos el paginador
    SnvaJsApi.initPaginationByTable($table, "ulAddGroupPagination", 5);
    
  }else{
     
    // mostramos el respectivo mensaje
    SnvaJsApi.showAlert("Lo sentimos la especie ya existe.");
  }
 
}

/*
* Función que permtie verificar si ya esta la especie en la tabla
*/
function verificateConcept(nameConcept, $rows){
  
  // Estado para la validación de la especie suponemos de que no esta
  var stateValidate = true;
   
  // Validamos de vengan filas   
  if($rows && $rows.length > 0){
    
    // para los datos de al especie
    var conceptData = null;
    
    // Recorremo cada uno de las filas 
    $rows.each(function(){
      
      // Obtenmos los datos de la especie
      conceptData = $(this).data("conceptData");
      
      // Validamos por el nombre de la especie
      if(nameConcept == conceptData[1]){
       
        // Cambiamos de el estado a que si esta la especie
        stateValidate = false;
        
        // Forzamos la salida del ciclo
        return false;
      }
    });
  }
  
  // Retornamos el estado de validación 
  return stateValidate;
}

/*
* Función que permite habilitar el panel de edición de un grupo e insertar los datos del mismo
*/
function editGroupData(e){

  // Se previene el evento por defecto
  e.preventDefault();
  
  // Obtenemos los datos del grupo 
  var groupObjectData = e.data.groupObjectData;
  
  // Obtenemos el tipo con el cual se va a trabajar el grupo 
  var type = e.data.type;
  
  // Referenciamos el titulo del modal 
  var $txtModalTitle = $("#txtModalTitle");
  
  // Referenciamos el boton guardar en el formulario 
  var $btnAddGroup = $("#btnAddGroup");
  
  // Referenciamos el formulario de grupos 
  var $form = $("#frmAddGroup");
  
  // Validamos que tipo acción se va a trabajar sobre el grupo 
  if(type && type == "edit"){
    
    // Cambiamos el titulo del modal 
    $txtModalTitle.html("Edición de grupo.");  
    
    // Cambiamos el nombre del botón
    $btnAddGroup.text("Editar grupo");
    
    // Agregamos la propiedad al formulario que es editar
    $form.data({"type": "edit", "oldDataGroup": groupObjectData});
    
  }else{
    
    // Cambiamos el titulo del modal 
    $txtModalTitle.html("Creación de grupo.");
    
    // Cambiamos el nombre del botón
    $btnAddGroup.text("Crear grupo");
    
    // Agregamos la propiedad al formulario que es editar
    $form.data({"type": "duplicate"});
  }
  
  // validamos si existe la referencia del grupo
  if(groupObjectData != null && groupObjectData.groupObj && groupObjectData.groupObj.length > 0){
    
    // obtenemos solo los datos de grupos
    var onlyGroupArray = groupObjectData.groupObj;    
    
    // variable para almacenar las especies
    var conceptArray = [];
    
    // recorremos cada uno de los datos
    for(var i = 0; i < onlyGroupArray.length; i++){
      
      // Agregamos los datos de al especie
      conceptArray.push(onlyGroupArray[i].conceptData);
    
    }
  
    // llamammos la función que inserta los datos
    insertGroupDataByModify(conceptArray, onlyGroupArray, groupObjectData, type);
    
  } else {
  
    // mostramos el respectivo mensaje
    SnvaJsApi.showAlert("Lo sentimos la información del grupo no existe, por favor intenta nuevamente o comunicate con el administrador.");
  }
  
}

/*
* Función que permite realizar la busqueda de especies
*/
function runSearchConcepts(e){
  
  // prevenimos el evento por defecto
  e.preventDefault();
  
  // obtenemos el nombre de la especie
  var specieValue = String($("#txtSpecieSearch").val()).trim(), currValueSpecie = "";
  
  // obtenemos el index desde donde empieza el ptimer comodin
  var startIndex = specieValue.indexOf("${");
  
  // Se valida si existe comodines
  if(startIndex != -1){
  
    // eliminamos texto de comodines
    currValueSpecie = specieValue.substring(0, startIndex).replace(/\*$/g, "").trim();
  } else {
    currValueSpecie = specieValue.replace(/\*$/g, "").trim();
  }
  
  // Reemplazamos el ultimo astetisco si existe
  specieValue = specieValue.replace(/\*$/g, "").trim();
  
  // definimos el objeto actual de grupos o comodines
  var currOptions = getCommodinsObject(specieValue);

  // variable para obtener los valores de búsqueda
  var objectValues = {
    departament: String($("#txtDepartmentSearch").val()),
    specie: currValueSpecie,
    family: String($("#txtFamilySearch").val()),
    keyword: String($("#txtKeywordSearch").val()),
    gender: $("#pnlGenderSearch").data("genderData") || []
  };
  
  // configuramos el objeto de valores a un texto que despues se puede crear como expresión regular
  objectValues.specie = (objectValues.specie ? (SnvaJsApi.removeLatinSymbols(objectValues.specie).replace(/[|\/\\{}()[\]^$+*?.-]/g, '\\$&')) : "");
  
  // se referncia el modal
  var $modal = $("#mdlSearchConcepts");
  
  // obtenemos los datos de busqueda que estan almacenados en el modal
  var arrayData = $modal.data("arrayData");
  
  // obtenemos el id del panel donde se va agregar la especie
  var mainPanelId = $modal.data("panelId");
  
  // variable para almacenar los registros filtrados
  var filterArray = [],
      recordState = true;
  
  // Definimso las propiedade y columna de cada una de ellas
  var properties = getPropertiesComodin();
  
  // verificamos si trae los valores de $row y currentData y table
  var $selectedRow = $modal.data("row");
  var $currentData = $modal.data("currentData");
  var $table = $modal.data("table");
      
  // recorremos cada uno de los registros
  for(var i = 0; i < arrayData.length; i++){
    
    // definimos por defecto verdadero
    recordState = true;
    
    // validamos si ya existe algun grupo
    if(isComodinValue(arrayData[i], currOptions, properties) == false){
      
      // cambiamos a falso
      recordState = false;
      
    // validamos si existe valor de deparatamento y no pertenece al registro actual
    } else if(objectValues.departament && objectValues.departament != String(arrayData[i][0])){
      
      // cambiamos a falso
      recordState = false;
      
    }  else if(objectValues.specie && new RegExp(objectValues.specie, "gi").test(SnvaJsApi.removeLatinSymbols(String(arrayData[i][1]))) == false){  // validamos si existe valor de especie y no pertenece al registro actual
       
      // cambiamos a falso
      recordState = false;
      
    } else if(objectValues.family && objectValues.family != String(arrayData[i][2])){ // validamos si existe valor de familia y no pertenece al registro actual
      
      // cambiamos a falso
      recordState = false;
      
    } else if(objectValues.keyword && objectValues.keyword != String(arrayData[i][3])){ // validamos si existe valor de palabra clave y no pertenece al registro actual
      
      // cambiamos a falso
      recordState = false;
    } else if(objectValues.gender && objectValues.gender.length > 0 && (objectValues.gender).indexOf(String(arrayData[i][8])) == -1){ // validamos si existe valor de genero y no pertenece al registro actual
      
      // cambiamos a falso
      recordState = false;
    }
    
    // validamos si el estado es verdadero
    if(recordState && arrayData[i][1]){
      
      // agregamos el registro en los datos filtrados
      filterArray.push(arrayData[i]);
      
    }
  }   
  
  // se procede a ordenar por departamento, famili, palabra clave y luego diametro
  filterArray = sortResultByDiameter(filterArray);

  if (mainPanelId=="replaceConcept"){
    // insertamos los datos a la tabla
    insertConceptFromTableforReplace(filterArray, $selectedRow, $currentData, $table);
  }else{
    // insertamos los datos a la tabla
    insertConceptFromTable(filterArray, mainPanelId);
  }
  
}

/**
 * Permite obtener la lista de conceptos por diametro
**/
function sortResultByDiameter(filterArray){
  
  // variable para agrupar por lso primeros 2 parametros
  var groups = {}, arrayOrder = [], propertyTemp = "", mainArray = [];
  
  // recorermos cada uno de los items
  for(var i = 0; i < filterArray.length > 0; i++){
    
    // obtenemos la propiedad actual
    propertyTemp = filterArray[i][0] + filterArray[i][2] + filterArray[i][3];
    
    // se valida si aun no existe la propiedad
    if(!groups[propertyTemp]){
      
      // Inicializamos el objeto
      groups[propertyTemp] = []
      
      arrayOrder.push(propertyTemp);
      
    }
    
    // agregamos el registro
    groups[propertyTemp].push(filterArray[i]);
    
  }
  
  // recorremos cada una de las propiedades existentes
  for(var j = 0; j < arrayOrder.length; j++){
    
    // agregamos cada grupo en el array principal
    mainArray = mainArray.concat(groups[arrayOrder[j]].sort(function(a, b){
      var x = (Number(String(a[13]).replace(/[^\.\d\n]/gi, "")) || 0);
      var y = (Number(String(b[13]).replace(/[^\.\d\n]/gi, "")) || 0);
      if (x < y) {return -1;}
      if (x > y) {return 1;}
      return 0;
    }));
    
  }
  
  // Se retorna actualizada el orden a mostrar
  return mainArray;
}

/*
* Función para listar las palabraas claves respecto a la familia seleecionada
*/
function changeFamilyMirror(e){

  // prevenimos el evento por defecto
  e.preventDefault();
  
  //Referenciamos el campo de family
  var $keyword = $("#sltKeyword-Mirror");
  
  // Estado para deshabilitar los campos 
  var state = true;
  
  // Validamos de que se tenga una opción diferente a selecione
  if($("#sltFamily-Mirror").val()){
    
    // Obtenemos la opcion seleccionada
    var dataSelected = $("#sltFamily-Mirror option:selected").data("familyData");
    
    // obtenemos los datos 
    var keywordData = e.data.keywordData;
    
    // Obtenemos los datos para insertar
    var arrayData = keywordData[dataSelected[1]];
    
    //Validamos de se tengan datos
    if(arrayData){
      
      // Habilitamos el campo de seleecion
      $keyword.attr({ disabled: false });
      
      // agregamos los items de palabra clave
      SnvaJsApi.insertOptionToSelect($keyword, arrayData, 0, 0, "keywordData", true, true);
      
       // Validamos si se debe deshabilitar el campo y sus opciones
      state = false;
    }
    
  }
  
  // Validamos si se debe deshabilitar el campo y sus opciones
  if(state){
  
      // reseteamos el select y desactivamos el campo 
     $keyword.html('<option value="">--Seleccione --</option>').attr({disabled:true}).formSelect();
  }
}

      "19": {regexp: /\{11\}/g, id: "txtMake-Mirror"},
      "20": {regexp: /\{12\}/g, id: "sltSizeOrCapacity-Mirror"},
      "21": {regexp: /\{13\[1\]\}/g, id: "sltWidth-Mirror", index: 1, property: "widthData"},
      "22": {regexp: /\{13\[2\]\}/g, id: "sltWidth-Mirror", index: 2, property: "widthData"},
      "23": {regexp: /\{14\}/g, id: "sltCaliber-Mirror"},
      "24": {regexp: /\{15\}/g, id: "sltModel-Mirror"}
//      "25": {regexp: /\{16\[1\]\}/g, id: "sltFlow", index: 1, property: "flowData"},
//      "26": {regexp: /\{16\[2\]\}/g, id: "sltFlow", index: 2, property: "flowData"},
//      "27": {regexp: /\{16\}/g, id: "sltSeparation"}
    };
    
    // validamos si existen datos en la descrioción
    if(departmentData && departmentData.length > 3){
      
      // variable para obtener los atributos
      var options = {},
          currentValue = "",
          regexp = "",
          $field = null,
          propertyValues = [];
          
      // definimos el nombre de la especie
      var specieName = "";
      
      // recorremos los atributos
      for(var i = 3; i < departmentData.length; i++){
        
        // se referencia el valor actual
        currentValue = String(departmentData[i]).trim();
        
        // obtenemos las opciones
        options = referenceFields[i];
        
        // se valida que exista un valor
        if(currentValue && options){
          
          // validamos si el texto actual contiene un valor a reemplazar
          if(options.regexp.test(currentValue)){
            
            // referenciamos el campo
            $field = $("#" + options.id);
            
            // validamos si existe un valor seleccionado
            if($field.val()){
            
              // validamos si el atributo solo debe obtener el valor actual seleccionado
              if(!options.index){
                
                // agregamos el valor actual al nombre
                specieName += currentValue.replace(options.regexp, String($field.val() || "").trim()) + " ";
                
              } else {
                
                // obtenemos la propiedad
                propertyValues = $field.find("option:selected").data(options.property);
                
                // se valida que exista valores en la propiedad
                if(propertyValues && propertyValues[options.index]){
                
                  // agregamos el valor actual al nombre
                  specieName += currentValue.replace(options.regexp, propertyValues[options.index]) + " ";
                }
              }
            }
            
          } else {
            
            // agregamos el valor actual al nombre
            specieName += currentValue + " ";
            
          }
        }
      }
      
      // actualizamos el nombre
      $("#txtName-Mirror").val(specieName.trim());
      M.updateTextFields();
    }
  }  
}
</script>
