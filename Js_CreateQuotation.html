/**
 * Función que permite generar el nombre con la información actual 
**/
function generateGroupName(isReturn){

  // obtenemos los datos del formulario
  var formData = {
    prefix: $("#txtPrefix-group").val(),
    gender: $("#txtGender-group").val(),
    alias: $("#txtAlias-group").val(),
    attributes: $("#txtAttr-group").val(),
    suffix: $("#txtSuffix-group").val(),
    conectionInput: $("#sltConectionInput-group").val(),
    conectionOutput: $("#sltConectionOutput-group").val()
  };
  
  // referenciamos la primera fila
  var $firstRow = $("#tblAddNewGroup tbody tr:not(.info-message):first");
  
  // obtenemos los datos de la especie de la primera fila
  var firstData = $firstRow.data("conceptData");
  
  // variable para determinar el tipo o dimensión
  var typeOrFormat = "";
  
  // obtenemos la cantidad agregada
  var quatity = ($firstRow.find("input.txtGroupQuantity").val() || 0);
  
  // validamos si el tipo de unidad es PZA
  if(String(firstData[4]).trim().toLowerCase() == "pza"){
    
    // definimos el tipo 
    typeOrFormat = roundDecimal(eval(quatity), 6) + "X";
    
  } else {
    
    // validamos con la dimensión
    typeOrFormat = "L:" + roundDecimal(eval(quatity), 6) + firstData[4];
  }
  
  // obtenemos el material seleccionado
  var material = ($("#tblAddNewGroup tbody tr:not(.info-message) td[data-cellindex='9'].td-selected-group").data("valueSelected") || "");
  
  // obtenemos el material seleccionado
  var inputMM = ($("#tblAddNewGroup tbody tr:not(.info-message) td.td-selected-group input[data-reference='2']").closest("td").data("valueSelected") || "");
  
  // obtenemos el material seleccionado
  var outputMM = ($("#tblAddNewGroup tbody tr:not(.info-message) td.td-selected-group input[data-reference='3']").closest("td").data("valueSelected") || "");
  
  // obtenemos los valores generados a partir de las etiquetas
  var labelData = "{" + inputMM + " <" + (firstData[14] ? firstData[14] : firstData[16]) + "> " + outputMM + "}";
  
  // Formamos el nombre del grupo
  var groupName = formData.prefix + " " + formData.gender + " " + material + " " + typeOrFormat + " " + labelData + " " + formData.attributes + " " + formData.suffix + " " + (formData.conectionInput ? ("~" + formData.conectionInput) : "") + (formData.conectionOutput ? ("~" + formData.conectionOutput) : "");
  
  // agregamos el nombre del grupo con la información actual
  $("div.divGroupName").text(groupName.trim().replace(/ {2,}/g, " "));
  
  // Validamos si se requieresn valores de retorno
  if(isReturn){
  
    // Retornamos objeto con los diametros de entrasa salida y los de <>
    return {
      diameterInput: inputMM,
      diameterOutput: outputMM,
      diameterInternal: (firstData[14] ? firstData[14] : firstData[16]),
      protection: getprotection()
    };
  }
  
}

/*
* Función que permite obtener la protección del grupo 
*/
function getprotection(){
  
  // Obtenemos la referencia d ela fila
  var $tr = $("#tblAddNewGroup tbody td div.item-tag[data-index='5']:first").closest("tr");
  
  // Dato de protección 
  var protectionData = "";
  
  // Validamos de que existan filas 
  if($tr && $tr.length > 0){
    
    // Obtenemos el alias 
    var alias = $tr.find("input.inpAlias:first").val();
    
    // Validamos si tenemos el alias de protección
    if(alias && alias.indexOf("<>")){
      
      // Obtenemos el atributo del alias de proteción 
      var attribute = $tr.find("td.td-selected-group:not(.disabled-events):first").text();
      
      // Validamos de que se tenga el atributo 
      if(attribute){
        
        // Obtenemos el alias de protección
        protectionData = alias.replace("<>", ("<" + attribute  +">") );
      }
    }
  
  }
  
  
  // Retornamos el datos de protección 
  return protectionData;
}

/**

/**
 * Función que permite agregar el listado de atributos seleccionados
**/
function manageAttributes(e){ 
  
  // variable para agregar los aatributos agregados
  var attributes = [],
      columnSelected = [];

  // recorremos cada una de las filas de la tabla
  $("#tblAddNewGroup tbody tr").each(function(){
    
    // recorremos cada una de las columnas
    $(this).find("input.input-group-number:not(:disabled)").each(function(index, elem){
    
      // definimos el objeto por cada opción
      var elementObj = {
        value: $(this).closest("td").data("valueSelected"),
        index: (this.value || (index + 1))
      };
      
      // obtenemos el alias en array
      var aliasArray = String($(this).closest("tr").find("input.inpAlias").val()).split(",");
      
      // validmoa si index es igual a cero
      if(index < aliasArray.length){
        
        // agregamos la propiedad "alias"
        elementObj["alias"] = String(aliasArray[index]).trim();
      }
      
      // obtenermos el valor
      attributes.push(elementObj);
    });
    
  });
  
  // validamos si el valor es 1
  if(attributes.length > 0){
    
    // ordenamos el array de obetos
    attributes.sort(function(a, b){
      return a.index - b.index
    });
    
    // obtenemos los los atributos en solo array
    var onlyAttributes = [],
        newText = "";
    
    // recorremos cada uno de los atributos
    for(var i = 0; i < attributes.length; i++){
      
      // se valida si existe el valor de "alias"
      if(attributes[i].alias){
        
        // se valida si existe "<>" al final del alias
        if(attributes[i].alias.match(/(\<\>)$/g)){
          
          // unimos el alias y el valor del atributo encerrandolo en llaves 
          newText = attributes[i].alias.replace(/(\<\>)$/g, "") + " <" + attributes[i].value + ">";
          
        } else {
          
          // unimos el alias y el valor del atributo
          newText = attributes[i].alias + " " + attributes[i].value;
        }
      } else {
        
        // se agrega el valor del atributo
        newText = attributes[i].value;
        
      }
      
      // alamacenamos el registro
      onlyAttributes.push(newText);
        
    }
    
    // agregamos la clase "active"
    $("#txtAttr-group").val(onlyAttributes.toString().replace(/\,/g, " - ")).parent().find("label").addClass("active");
     
  } else {
    
    // removemos la clase "active"
    $("#txtAttr-group").val("").parent().find("label").removeClass("active");
  }
  
  // se va generando el nombre del grupo con la información existente
  generateGroupName();
  
}

/**

function filterAttributesByConcept(conceptList){

    counter = 0;
    
    // recorremos las filas
    for(var row = 0; row < conceptList.length; row++){
    
      // validamos si tiene algun valor
      if(String(conceptList[row][col]).trim() != ""){
        
        // aumentamos el contador
        counter ++;
        
      }
    }
    
    // validamos si la el contador es igual o mayor a la mitad de 
    if(counter < average && [8,9,13,19,20].indexOf(col) == -1){
      
      // validamos si la columna ya existe en el listado
      if(notColumns.indexOf(col) == -1){
      
        // agregamos la columna que no se debe tener en cuenta para la creación de un grupo
        notColumns.push(col);
      }
    }
    
  }
 
  // retornamos las columnas que no se deben tener en cuenta
  return notColumns;
  
}

/**
 * Función que permite mostrar la formula en el campo respectivo
**/
function showFormuleInField(){
  
  // referenciamos el campo
  var $field = $(this);
  
  // obtenemos el genero del concepto
  var conceptGender = $field.attr("data-gender");
  
  // se valida que exista el nombre
  if(conceptGender){
    
    // cambiamos el atributo de "pattern" para que no acepte espacios
    $field.attr("pattern", "^[0-9=]+(?:\\.[0-9]{1,2}){0,1}$");
    
  } else {
  
    // cambiamos el atributo de "pattern" para que no acepte espacios
    $field.attr("pattern", "^((?![a-zA-Z_\\n ]).)*$");
  }
  
  // obtenemos el atributo "data-formule"
  var formule = $field.attr("data-formule");
  
  // si existe el valor
  if(formule){
    
    // agregamos la formula
    $field.val(formule);
    
  }
  
}

/**
 * Función que permite crear la propiedad de "data-formule" en el campo y ejecutar la formula
**/
function processFormuleInField(){
  
  // referenciamos el campo
  var $field = $(this);
  
  // obtenemos el genero del concepto
  var conceptGender = $field.attr("data-gender");
  
  // obtenemos el valor actual
  var formule = String($field.val()).replace(/ /g, "");
  
  // obtenemos el valor para realizar la operación
  var value = String(formule).replace(/=/g, "");
 
  // se valida que exista el nombre
  if(conceptGender && formule.indexOf("=") != -1){
    
    // coonvertimos el valod a numero
    var valueNumber = (Number(value) || 0), result = 0;
    
    // se valida si el valor del campo es diferente a cero
    if(valueNumber != 0){
      
       // obtenemos el valor por tramo
      var tramoValue = valueNumber / 6;
      
      // obtenemos el valor redondedo hacia arriba agregando el 4%
      var tramoNewValue = Math.ceil(tramoValue * 1.04);
      
      // obtenemos el valor o resultado
      result = tramoNewValue * 6;      
    }
    
     // cambiamos el atributo de "pattern" para que solo acepte numeros
    $field.attr("pattern", "^[0-9]+(?:\\.[0-9]{1,2}){0,1}$");
    
     // agregamos el valor
    $field.val(result).change();
    
  } else {
    
    // cambiamos el atributo de "pattern" para que solo acepte numeros
    $field.attr("pattern", "^[0-9]+(?:\\.[0-9]{1,3}){0,1}$");
    
    // agregamos la formula
    $field.val(evalFormule(value)).change();
  }
  
  // agregamos el valor al atributo "data-formule"
  $field.attr("data-formule", formule);
  
}

/**
 * Función que permite evaluar una formula
**/
function evalFormule(value){
  
  // variable para el valor procesado
  var processValue = 0;
  
  // obtenemos el valor procesado
  try{
    
    // se procesa la formula
    processValue = eval(value);
    
  } catch(e){

    // definimos un valor por defecto de cero(0)
    processValue = 0;
    
  }
  
  // retornamos el valor procesado
  return processValue;  
}

/**
 * Función que permite calcular el total de una especie
**/
function calculateTotal(e){
  
  // inicializamos el valor
  var value = 0;
  
  // validamos si existe un valor
  if(e && e.data){
  
    // obtenemos el valor de la especie o producto
    value = e.data.price;
  }
  
  // obtenemos el valor del campo
  var fieldValue = String(evalFormule($(this).val())) || "0";
  
  // lo convertimos en un numero
  fieldValue = Number(fieldValue.replace(/\,/g, ""));
  
  // se valida se no es un nmero para inicializarlo en cero
  if(isNaN(fieldValue)) fieldValue = 0;
  
  // validamos si es un valor valido
  value = value ? value : 0;
  
  // obtenemos la fila donde se muestra la especie
  var $row = $(this).closest("tr");
  
  // buscamos la fila 5 para agregar el total
  $row.find("td:eq(5)").text( SnvaJsApi.formatValue(roundDecimal(value * fieldValue, 2) ) );
  
  // variable para guardar el total de la linea del producto
  var lineProductTotal = 0;
  
  // calculamos el total de la linea
  $row.closest("tbody").find("tr").each(function(){
   
    // realizamos la sumatoria de las especies
    lineProductTotal += Number($(this).find("td:eq(5)").text().replace(/\,/g, ""));
    
  });
  
  // agregamos el total de la linea en el campo respectivo
  $row.closest("li").find("span.lineTotal").text(SnvaJsApi.formatValue(roundDecimal(lineProductTotal, 2)));
  
  // variable para guardar el total de orden del proyecto
  var orderTotal = 0;
  
  // recorremos cada una de las líneas
  $row.closest("ul.collapsible").find("span.lineTotal").each(function(){
    
    // realizamos la sumatoria de las líneas de productos
    orderTotal += Number($(this).text().replace(/\,/g, ""));
    
  });
  
  // agregamos el total de orden del proyecto especifico
  $row.closest(".collapsible-order-body").parent().find("span.orderTotal").text(SnvaJsApi.formatValue(roundDecimal(orderTotal, 2)));
  
  //Actaulziamos el total
  updateDataValueOrders();
  
}

/**
 * Función que permite subir nivel
**/
function manageUpOrDown(e){
  
  // Se previene el evento por defecto
  e.preventDefault();
  
  // Referenciamos la tabla
  var $table = e.data.$table;
  
  // removemos la respectiva fila
  var $row = $(this).closest("tr");
  
  // validamos si requiere subir de nivel
  if(e.data.action == "levelUp"){
  
    // sibimos el nivel
    $row.insertBefore($row.prev());
  } else {
  
    //bajamos de nivel
    $row.insertAfter($row.next());
  }
  
  // actualizamos los datos temporales
  updateTemporalData();
  
  // iniciaizamos el paginador
  SnvaJsApi.initPaginationByTable($table, e.data.paginationId, 10);
  
}

/**
 * Función que permite eliminar un concept de una determinada tabla
**/
function deleteConcept(e){
  
  // Se previene el evento por defecto
  e.preventDefault();
  
  // Referenciamos la tabla
  var $table = $("#tblConceptPending");
  
  // referenciamos el id de referencia
  var uuId = e.data.uuId;
  
  // removemos de la tabla de pendientes la respectiva fila
  $table.find("tbody tr[data-reference='" + uuId + "']").remove();
  
  // referenciamos el id del paginador
  var paginationId = e.data.paginationId;
  
  // Obtenmos la referencia de la tabla 
  var $tableModifiy = e.data.$table;
  
  // removemos la respectiva fila
  var $row = $(this).closest("tr");
  
  // mostramos mensaje de confirmación antes de proceder a eliminar la cotización
  SnvaJsApi.confirm("¿Seguro desea eliminar esta especie?", function(){
    
    // removemos la fila
    $row.remove();
    
    // referenciamos el paginador 
    var $pagination = $("#" + paginationId);
    
    // Obtenemos el numero de la pagina 
    var pageNumberActive = $pagination.find("li.active").text();
    
    // iniciaizamos el paginador
    SnvaJsApi.initPaginationByTable($tableModifiy, paginationId, 10);
    
    // Validamos la cantidad de paginas se encuentre entre la pagina activa
    if(pageNumberActive > ($pagination.find("li").length - 2)){
      
      // Le restamos una pagina 
      pageNumberActive = Number(pageNumberActive) -1;
    }
    
    // Simulamos el click en la pagina       
    $pagination.find("li:eq(" + pageNumberActive + ") a").click();
    
    
    // validamos si el id paginador
    if(paginationId == "ulPaginationConceptList"){
      
      // actualizamos el total
      $("#tblConceptRenovation tbody").find("input:first").change();
      
    }else{
      // validamos la cantidad de filas 
      if($tableModifiy.find("tbody tr.isValid").length == 0){
      
        // Agrregamos la fila de que no se tiene registros 
        $tableModifiy.find('tbody').html('<tr class="info-message" style=""><td colspan="7">No hay especies para mostrar.</td></tr>');
      }
    }
    
    // Actualizamos las listas de valores
    $('.ctn-concept').each(function(){
      var $inputRecord = $(this).find('input[type="text"]:eq(0)');
      if($inputRecord.length > 0) $inputRecord.change();
    });
    
    // actualizamos la información de los datos temporales
    updateTemporalData(); 
    
  });
  
}

/**
 * @desc: Funcion que permite abrir el widget de google picker para seleccionar un archivo
 */
function showPickerFile(pickerObject) {
  
  // establecemos la variable para almacenar la vista
  var view = null,
      pickerTitle = "Seleccione una carpeta";
  
  // validamos si la propiedad tipo existe y es doc
  if(pickerObject.type && pickerObject.type == "doc") {
  
    // Se declara un objeto PickerView, el cual permitirá seleccionar archivos de Google Docs almacenados en Google Drive
    view = new google.picker.DocsView(google.picker.ViewId.DOCS);
    
    // cambiamos el título 
    pickerTitle = "Seleccione un archivo";
  
  } else {
  
    // Se declara un objeto PickerView, el cual permitirá seleccionar una carpeta en Google Drive
    view = new google.picker.DocsView(google.picker.ViewId.FOLDERS);
    
    // habilitamos la selecciòn de carpetas
    view.setSelectFolderEnabled(true);
  
  }
  
  // habilitamos la opciòn de Incluir las carpetas
  view.setIncludeFolders(true);
  
  // Se valida si se definió el Id de la carpeta raiz de la consulta
  if (pickerObject.folderId) {
  
    // Se configura en el objeto PickerView la carpeta sobre la cual se consultarán los Documentos de Google existentes
    view.setParent(pickerObject.folderId)
  }
  
  //Creamos el constructor de Drive Picker y establecemos los parámetros de configuración
  var pickerBuilder = new google.picker.PickerBuilder()
    .addView(view)
    .enableFeature(google.picker.Feature.NAV_HIDDEN)
    .setLocale('es')
    .setOAuthToken(pickerObject.token)
    .setDeveloperKey(pickerObject.developerKey)
    // Establecemos la función que será invocada una vez se haya seleccionado el documento
    .setCallback(function(responsePicker){
      
      // se llama la función para realizar una tarea al momento de seleccionar un archivo
      responseSelectedFile(responsePicker, pickerObject.paramsData);
    })
    .setTitle(pickerTitle) // se agrega un t{itulo personalizado
    .setOrigin(google.script.host.origin)
    // Se establece las dimensiones de la ventana de selección de archivos
    .setSize(pickerObject.dialogDimensions.width, pickerObject.dialogDimensions.height)
    .build()
    .setVisible(true);
}

/**
 * Respuesta para cuando seleccionó los archivos desde "Drive Picker"
 */
function responseSelectedFile(response, paramsData) {
  
  //Referenciamos el tipo de respuesta retornado por el "Drive Picker"
  var action = response[google.picker.Response.ACTION],
      selectedFiles = "",
      text = "Carpeta seleccionada: ",
      property = "folderId";
  
  // validamos si existe la propiedad de "text"
  if(paramsData.text){
     
     // cambiamos el texto
     text = paramsData.text;
     
     // cambiamos la propiedad
     property = paramsData.property;
     
  }

  //Si seleccionó archivos
  if (action == google.picker.Action.PICKED) {

    //Referenciamos los archivos seleccionados
    selectedFiles = response[google.picker.Response.DOCUMENTS];

    //Mostramos el nombre de la plantilla seleccionada
    $("#" + paramsData.contentId).html(
      $("<div>").append(
        $("<span>").attr({style: "font-weight: bold;"}).text(text)
      ).append(
        $("<a>").data(property, selectedFiles[0].id).attr({
          class: "linkDocument",
          href: selectedFiles[0].url,
          target: "_blank"
        }).text(selectedFiles[0].name)
      )
    );
  }
}
</script>
