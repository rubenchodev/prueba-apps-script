/*
* Pemrite eliminar una version 
*/
function deleteVersion(e){
  
  // Prevenimos el evento por defecto
  e.preventDefault();
  
  // Obtenemos los datos del proyecto 
  var requestData = $("#frmCreateQuotation").data();
  
  // Validamos la cantidad de versiones del proyecto
  if($("#sltVersion option").length > 1  && requestData){
    
    // Obtenemos referencia del campo de seleccionado
    var $sltVersionSeleted =  $("#sltVersion option:selected");
    
    // Obtenemos los datos de la version seleccionada 
    var deleteNameVersion = $sltVersionSeleted.val();
    
    // validamos de que no se a la versión original 
    if(deleteNameVersion != "Proyecto"){
    
     // mostramos mensaje de confirmación antes de proceder a registrar la prioridad
      SnvaJsApi.confirm("¿Esta seguro que desea eliminar esta versión del proyecto?", function(){
        
        // Mostramos el loading
        SnvaJsApi.manageLoading("block", "Eliminado la versión del proyecto...");
        
        // Datos de la version que se va a eliminar
        var versionDataDelete = $sltVersionSeleted.data("sheetsData");
        
        // Removemos la opcion 
        $sltVersionSeleted.remove();
        
        // Actualizamos el selector
        $("#sltVersion").formSelect();
        
        // agregamos el dato del nombre comun 
        $("#sltVersion option:eq(0)").click();
        
        // actualizamos las clase de los campos
        M.updateTextFields();
        
        // Recargamos los datos de esta orden
        var newOptionSelected =  $("#sltVersion option:selected").click().val();
        
        //Invocamos a la función que trae del servidor los datos de las carpetas hijas de la carpeta principal y sus respectivos archivos
        google.script.run.withSuccessHandler(function(response){
          
          // seleccionamos los conceptos asociados a la versión seleccionada
          $("#sltVersion").change();
          
          // Ocultamos el loading
          SnvaJsApi.manageLoading("none", "Espera un momento por favor...");
          
          // mostramos mensaje en la interfaz
          SnvaJsApi.showAlert("Se ha eliminado la versión del proyecto con éxito");
           
        }).withFailureHandler(SnvaJsApi.onFailure).deleteVersionProject(deleteNameVersion, versionDataDelete, requestData, newOptionSelected);
        
      });
    
    }else{
      
      // mostramos un mensaje
      SnvaJsApi.showAlert("No se puede eliminar la versión original del proyecto.");  
    }
     
  }else{
    
    // mostramos un mensaje
    SnvaJsApi.showAlert("No hay versiones para eliminar del proyecto.");  
  }
  
}

/**
* Función que permite insertar valores en una campo de select
**/
function addOptionsComunName($select, arrayData){
  
  // Agregamos la lista como una propiedada del select
  $select.data('comunNameList', arrayData);
  
  // eliminamos el contenido
  $select.html("");
  
  // agregamos la opción vacia
  $select.append(
    $("<option>").attr({value: ""}).text("-- Seleccione una opción --")
  );
  
  // recorremos cada uno de los registros
  for(var i = 0; i < arrayData.length; i++){
  
    // agregamos cada una de las opciones
    $select.append(
      $("<option>").attr({value: arrayData[i].comunName}).text(arrayData[i].comunName).data('comunNameData', arrayData[i])
    );
  }
}

/**
 * Función encargada generar cada una de la imagenes que luego seran enviadas para crear la cotización de federal 
 * @author Rubén Sánchez
 */
function initCreationStatalFile_(requestData, manageConcept) {
 
  // iniciamos el listado de imagenes
  IMAGE_LIST = [];
  
  // creamos la propiedad para guardar los precios de las ordenes
  manageConcept.prices = {
    "1. Sistema de riego": 0,
    "2. Obra civil": 0,
    "3. Equipo mecanico y electrico": 0,
    "4. Servicios complementarios": 0,
  };

  // variable del contenedor de tablas de especies
  var $ctnTempConcepts = $("#ctnTempConcept");

  // eliminamos los elementos actuales
  $ctnTempConcepts.html("");

  // Inicializamos la matriz con los datos de lineas de producto
  requestData.productLines = [];

  // definimos el separador
  var separator = 5;

  //  variable para referenciar el listado de especie
  var conceptsList = manageConcept.concepts;

  // variable para agregar las filas para cada imagen
  var recordToImage = [],
    counter = 1;

  // se realiza el recorrido de cada uno de los ciclos
  for (var i = 0; i < conceptsList.length; i++) {

    // se valida si es un orden el registro que se esta recorriendo o si es una linea que no va de seguido a un orden o si ya existen mas de la cantidad de especies existente
    if (conceptsList[i][0] != "" ||
      (i > 0 && conceptsList[i - 1][0] == "" && conceptsList[i][1] != "") ||
      (recordToImage.length == separator && i < (conceptsList.length - 2) && (conceptsList[i + 1][4] != "" && conceptsList[i + 2][4] != ""))) {

      // se valida si tiene datos en el array de
      if (recordToImage.length > 0) {

        // se llama la función para crear la imagen
        createImageFromTableStatal_(requestData.productLines, recordToImage, $ctnTempConcepts, counter, manageConcept);

        // aumentamos el contador
        counter++;
      }

      // agregamos como primer registro el de la orden
      recordToImage = [conceptsList[i]];
    } else {

      // agregamos el nuevo registro
      recordToImage.push(conceptsList[i]);
    }
  }

  // creamos la tabla con los datos restantes y el importe
  createImageFromTableStatal_(requestData.productLines, recordToImage, $ctnTempConcepts, counter, manageConcept, manageConcept.importe, manageConcept.importeLetter, requestData);
}

/**
 * Función encargada generar cada una de la imagene que luego seran enviadas al documento 
 * @author Rubén Sánchez
 */
function createImageFromTableStatal_(productLines_, arrayData, $ctnTempConcepts, counter, manageConcept, importe, importeLetter, requestData) {

  // variable para guardar el html de la tabla
  var tableHtml = '<table border=0 cellspacing=0 bordercolor="ffffff" cellpadding=2 style="color:#000;width: 780px;font-family: sans-serif;font-size: 13px;">';

  // se valida si el index es igual a cero
  if (counter == 1) {

    // agregamos el encabezado en la tabla
    tableHtml += '<thead><tr style="background:#f5feff;padding:3px 0px;">\
        <th style="border-top:1px solid #018ada;border-bottom:2px solid #018ada;min-width: 110px;max-width: 110px;padding: 5px 0px;">Orden</th>\
        <th style="border-top:1px solid #018ada;border-bottom:2px solid #018ada;min-width: 110px;max-width: 100px;padding: 5px 0px;">Línea</th>\
        <th style="border-top:1px solid #018ada;border-bottom:2px solid #018ada;min-width: 260px;max-width: 260px;padding: 5px 0px;">Descripción</th>\
        <th style="border-top:1px solid #018ada;border-bottom:2px solid #018ada;min-width: 70px;max-width: 70px;padding: 5px 0px;">Unidad</th>\
        <th style="border-top:1px solid #018ada;border-bottom:2px solid #018ada;min-width: 70px;max-width: 70px;padding: 5px 0px;">Cantidad</th>\
        <th style="border-top:1px solid #018ada;border-bottom:2px solid #018ada;min-width: 80px;max-width: 80px;padding: 5px 0px;">C. Unitario</th>\
        <th style="border-top:1px solid #018ada;border-bottom:2px solid #018ada;min-width: 80px;max-width: 80px;padding: 5px 0px;">Importe</th>\
      </tr></thead>';

    // se agrega la etiqueta del body
    tableHtml += '<tbody><tr><td style="padding-top:6px;border-bottom:1px solid #ff9900;" colspan="7"></td></tr>';
  } else {

    // se agrega la etiqueta del body sola
    tableHtml += '<tbody>';
  }

  // se recorre cada uno de los registros
  for (var i = 0; i < arrayData.length; i++) {

    // se valida si el registro es de tipo orden
    if (arrayData[i][0]) {

      // agregamos la fila respectiva
      tableHtml += generateRowByOrden(arrayData[i]);
      
      // actualizamos el valor con el que se encuentra en la hoja
      manageConcept.prices[arrayData[i][0]] = arrayData[i][6];

    } else if (arrayData[i][1]) { // se valida es de tipo Línea

      // agregamos la fila respectiva
      tableHtml += generateRowByLine(arrayData[i]);

      // Se agrega la información de lalinea de producto
      productLines_.push([
        arrayData[i][1],
        arrayData[i][7]
      ]);

    } else {

      // agregamos la fila respectiva
      tableHtml += generateRowByConcept(arrayData[i]);
    }
  }

  // se valida si el (ciclo - 1) es igual al Index
  if (importe) {

    // agregamos una fila vacia
    tableHtml += '<tr style="padding: 3px 0px;"><td style="padding-top:6px;padding-left: 0;padding-right: 0;padding-bottom: 0;" colspan="7"></td></tr>';

    // agregamos una fila con el texto de oferta
    tableHtml += '<tr style="background:#e0f7fa;padding: 3px 0px;"><td style="text-align:center;color:#0000ff;font-weight: 600;border:1px solid #ff9900;min-width: 110px;max-width: 110px;padding: 5px 0px;">Oferta</td>\
        <td colspan="6" style="color:#0000ff;font-weight: 600;border-top:1px solid #ff9900;border-right:1px solid #ff9900;min-width: 670px;max-width: 670px;padding: 5px 0px;"></td></tr>';

    // agregamos una fila con el valor en número del importe
    tableHtml += '<tr style="background:#ffffff;padding: 3px 0px;"><td style="min-width: 110px;max-width: 110px;padding-left: 0;padding-right: 0;"></td>\
        <td colspan="4" style="color:#0000ff;font-weight: 600;border-bottom:1px solid #ff9900;border-left:1px solid #ff9900;min-width: 510px;max-width: 510px;padding: 5px 0px;">IMPORTE TOTAL DE LA EJECUCIÓN EN MONEDA NACIONAL (M.N.)</td>\
        <td colspan="2" style="text-align: right;color:#285632;font-weight: 600;border-bottom:1px solid #ff9900;border-right:1px solid #ff9900;min-width: 160px;max-width: 160px;padding: 5px 0px;">' + importe + '</td></tr>';

    // agregamos una fila con el valor en letras del importe
    tableHtml += '<tr style="background:#ffffff;padding: 3px 0px;"><td style="min-width: 110px;max-width: 110px;padding: 5px 0px;"></td>\
        <td colspan="6" style="color:#000;font-weight: 600;border-bottom:1px solid #ff9900;border-left:1px solid #ff9900;border-right:1px solid #ff9900;min-width: 670px;max-width: 670px;padding: 5px 0px;">' + importeLetter + '</td></tr>';

  }

  // se agrega el cierre de la etiqueta del body y tabla
  tableHtml += '</tbody></table>';

  // agregamos la tabla
  $ctnTempConcepts.append(tableHtml);

  // creamos la respectiva imagen
  html2canvas(document.querySelector("#ctnTempConcept table:nth-child(" + counter + ")"), {
    width: 782,
    logging: false
  }).then(canvas => {

    // agregamos la imagen en el listado
    IMAGE_LIST.push(canvas.toDataURL("image/png"));

    // se valida que la cantidad de imagenes generadas sea igual a la cantidad de ciclos
    if (importe) {

      // eliminamos los elementos actuales
      $("#ctnTempConcept").html("");

      // se llama la función que permite agregar las imagenes al documento
      insertImageToGoogleDocStatal_(requestData, manageConcept);
    }
  });
}

/**
* Función que permite enviar el listado de imagens generadas en base64 e insertarlas al documento
*/
function insertImageToGoogleDocStatal_(requestData, manageConcept){

   // Obtenemos el año seleccionado
   var yearSelected = $("#sltProjectYears").val();
   
   // Enviamos los datos al servidor
   google.script.run.withSuccessHandler(function(responseObj){
      
    // iniciamos la variable de imagenes
    IMAGE_LIST = [];
      
    // eliminamos los elementos actuales
    $("#ctnTempConcept").html("");
      
    // actualizamos el listado de solicitudes
    insertRecordsFromTable(responseObj.requestData);
     
    // mostramos el panel de inicio
    $("#pnlMain").show();
     
    // ocultamos el panel de creación
    $("#pnlCreateQuotation").hide();
     
    // reseteamos el formulario
    resetCreateForm();
    
    // Ocultamos el loading
    SnvaJsApi.manageLoading("none", "Espera un momento por favor...");
    
    // mostramos un mensaje
    SnvaJsApi.showAlert(responseObj.message);
      
  }).withFailureHandler(SnvaJsApi.onFailure).initCreationStatalFile(IMAGE_LIST, requestData, manageConcept, userRole, yearSelected);
}

  for (var i = 0; i < arrayData.length; i++) {

    // se valida si el registro es de tipo orden
    if (arrayData[i][0]) {

      // agregamos la fila respectiva
      tableHtml += generateRowByOrden(arrayData[i]);
      
      // actualizamos el valor con el que se encuentra en la hoja
      manageConcept.prices[arrayData[i][0]] = arrayData[i][6];

    } else if (arrayData[i][1]) { // se valida es de tipo Línea

      // agregamos la fila respectiva
      tableHtml += generateRowByLine(arrayData[i]);

    } else {

      // agregamos la fila respectiva
      tableHtml += generateRowByConcept(arrayData[i]);
    }

  }

  // se valida si el (ciclo - 1) es igual al Index
  if (importe) {

    // agregamos una fila vacia
    tableHtml += '<tr style="padding: 3px 0px;"><td style="padding-top:6px;padding-left: 0;padding-right: 0;padding-bottom: 0;" colspan="7"></td></tr>';

    // agregamos una fila con el texto de oferta
    tableHtml += '<tr style="background:#e0f7fa;padding: 3px 0px;"><td style="text-align:center;color:#0000ff;font-weight: 600;border:1px solid #ff9900;min-width: 110px;max-width: 110px;padding: 5px 0px;">Oferta</td>\
        <td colspan="6" style="color:#0000ff;font-weight: 600;border-top:1px solid #ff9900;border-right:1px solid #ff9900;min-width: 670px;max-width: 670px;padding: 5px 0px;"></td></tr>';

    // agregamos una fila con el valor en número del importe
    tableHtml += '<tr style="background:#ffffff;padding: 3px 0px;"><td style="min-width: 110px;max-width: 110px;padding-left: 0;padding-right: 0;"></td>\
        <td colspan="4" style="color:#0000ff;font-weight: 600;border-bottom:1px solid #ff9900;border-left:1px solid #ff9900;min-width: 510px;max-width: 510px;padding: 5px 0px;">IMPORTE TOTAL DE LA EJECUCIÓN EN MONEDA NACIONAL (M.N.)</td>\
        <td colspan="2" style="text-align: right;color:#285632;font-weight: 600;border-bottom:1px solid #ff9900;border-right:1px solid #ff9900;min-width: 160px;max-width: 160px;padding: 5px 0px;">' + importe + '</td></tr>';

    // agregamos una fila con el valor en letras del importe
    tableHtml += '<tr style="background:#ffffff;padding: 3px 0px;"><td style="min-width: 110px;max-width: 110px;padding: 5px 0px;"></td>\
        <td colspan="6" style="color:#000;font-weight: 600;border-bottom:1px solid #ff9900;border-left:1px solid #ff9900;border-right:1px solid #ff9900;min-width: 670px;max-width: 670px;padding: 5px 0px;">' + importeLetter + '</td></tr>';

  }

  // se agrega el cierre de la etiqueta del body y tabla
  tableHtml += '</tbody></table>';

  // agregamos la tabla
  $ctnTempConcepts.append(tableHtml);

  // creamos la respectiva imagen
  html2canvas(document.querySelector("#ctnTempConcept table:nth-child(" + counter + ")"), {
    width: 782,
    logging: false
  }).then(canvas => {

    // agregamos la imagen en el listado
    IMAGE_LIST.push(canvas.toDataURL("image/png"));

    // se valida que la cantidad de imagenes generadas sea igual a la cantidad de ciclos
    if (importe) {

      // eliminamos los elementos actuales
      $("#ctnTempConcept").html("");

      // se llama la función que permite agregar las imagenes al documento
      insertImageToGoogleDoc(requestData, fileUrl, manageConcept);
    }
  });

}

/**

function showModalTabSelectedBlank(e){
  
  // Variable para obtener la información de la solicitud
  var requestData = null;

    }

      $("#sltCultivation").val(structureData.cultive).formSelect();
      $("#sltComunNameNew").val($("#sltComunNameNewModal").val()).formSelect();
      $("#txtSurface").val(structureData.surface);
     
      // agregamos la nueva opción
      $sltVersion.append(
        $("<option>").attr({value: response.newSheetName}).data("sheetsData", {
          sheetName: response.newSheetName,
          structure: objectData.structure,
          rowIndex: response.newRowIndex
        }).text(response.newSheetName)
      );
            
      // Seleccionamos la opcion 
      $sltVersion.val(response.newSheetName).change();
      
      // actualizamos el select
      $sltVersion.formSelect();
      
      // se referencia el modal de copiar una versión
      var $modal= $("#mdlCopyTabBlank");
      
      // creamos la instancia del modal
      var instanceMdl = M.Modal.getInstance($modal);
      
      // validamos si existe la instancia
      if(instanceMdl){
      
        // cerramos el modal
        instanceMdl.close();

    }).withFailureHandler(SnvaJsApi.onFailure).duplicateTabSelectedBlank(objectData);
    
  });

  e.preventDefault();
  
}

/**
 * Función que permite crear una pestña de estatal
**/
function createFederal(e){
  
  // Se previene el evento por defecto
  e.preventDefault();
  
  // referenciamos el boton
  var $button = $(this);     
  
  // obtenemos la información de la solicitud actual
  var requestObj = $button.data("requestObj");
  
  // obtenemos el factor
  var chosenFactor = $button.data("chosenFactor");

  // Ocultamos la ventana de advertencia
  $(".alert__state-info").hide();
  
  // se valida si existe esa propiedad
  if(requestObj){

    // creamos la instancia del modal de datos del catalogo
    var instanceMdlFederalTab_ = M.Modal.getInstance($("#mdlGenerateStateTab"));
    
    // validamos si existe la instancia
    if(instanceMdlFederalTab_){

      // Agregamos el indicador de la cantidad de hectareas
      $("b.alert__number-ref").text(requestObj.surface + " hectáreas");

      // Obtenemos el valor de superficie
      var surface_ = Number(requestObj.surface) || 0;

      // Se valida si la superficie es mayor
      if(surface_ > 5){
        // Mostramos la ventana de advertencia
        $(".alert__state-info").show();
      }

      // Iniciamos el formulario
      $("#frmGenerateStateTab")[0].reset();

      // Asignamos el evento al formulario
      $("#frmGenerateStateTab").off("submit").on("submit", {requestObj: requestObj, chosenFactor: chosenFactor}, generateStateTab_);
      
      // abrimos el modal
      instanceMdlFederalTab_.open();
    }
    
  } else {
    
    // mostramos el mensaje
    SnvaJsApi.showAlert("No es posible generar la hoja de estatal. Por favor ingresa nuevamente a la edición de una cotización e intenta nuevamente.");    
  }
}

  // asignamos el evento submit al formulario para definir prioridad
  $("#frmSettingPriorityLines").data("column", priorityProductLinesObj.column).submit(settingPriorityLines);
  
  // definimos el objeto con las clases que se deben aplicar a las categorias
  var classByCategory = ["bg-aliceblue", "bg-cornsilk", "bg-bisque", "bg-floralwhite", "bg-darksalmon"];
  
  // objeto para manipular las clases
  var classObject = {};
  
  // recorremos cada uno de los datos
  for(var i = 0; i < priorityProductLinesObj.data.length; i++){
     
     // validamos si la clave NO existe
     if(!classObject[priorityProductLinesObj.data[i][0]]){
       
       // le asignamos una clase
       classObject[priorityProductLinesObj.data[i][0]] = classByCategory[Object.keys(classObject).length];
       
     }
     
     // creamos la nueva fila
     $row = $("<tr>").attr({class: classObject[priorityProductLinesObj.data[i][0]]});
     
     // agregamos la fila al cuerpo
     $tbody.append($row );
     
     // creamos la columna con el orden
     $row.append(
       $("<td>").text(priorityProductLinesObj.data[i][0])
     );
     
     // creamos la columna con la Línea de producto
     $row.append(
       $("<td>").text(priorityProductLinesObj.data[i][1])
     );
     
     // creamos la columna con la Prioridad por defecto
     $row.append(
       $("<td>").attr({class: "center"}).text(priorityProductLinesObj.data[i][2])
     );
     
     // creamos la columna con el campo de 
     $row.append(
       $("<td>").attr({style: "padding: 8px 5px;", class: "center"}).append(
         $("<input>").attr({class: "input-priority", type: "number", min: "1", required: true, value: priorityProductLinesObj.data[i][3]})
       )
     );
  }
  
  // referenciamos el contenedor de convensiones
  var $conventionsPriority = $("#ctnConventionsPriority").html("");
  
  // recorremos el objeto
  for(var key in classObject){
    
    // agregamos la convensión
    $conventionsPriority.append(
      $("<div>").attr({class: "conventions-item"}).append(
        $("<span>").attr({class: classObject[key]})
      ).append(key)
    );
  }
  
}

/**
 * Función que permite crear un nuevo grupo
**/
function createNewGroup(e){
  
  // actualizamos el nombre del grupo 
  var objectDataAttributes = generateGroupName(true);
  
  // referenciamos el frmulario
  var $form = $(this);
  
  // obtenemos la fila donde esta ubicada el grupo por si es una actualización
  var rowIndexGroup = $form.data("rowIndex");
  
  // Obtenemos el tipo del grupo el cual se esta manejando 
  var type = $form.data("type");
  
  //Obtenemos los datos anteriores
  var oldDataGroup = $form.data("oldDataGroup");
  
  // Objeto con la etiquetas Requeridas
  var labels = {
    count_itemGroup1: 0,
    count_itemGroup2: 0, 
    count_itemGroup3: 0,
    count_itemGroup4: 0
  };
    
  // siempre Toma la referencia del collapsible
  var instanceCollapsible = M.Collapsible.getInstance($("#ulFormCollapsible"));
      
  // validamos si existe algun atributo seleccionado
  if($("#tblAddNewGroup td.td-selected-group").length > 0){
    
    // variable de estado
    var stateCounter = true,
        conceptObj = [],
        $currentRow = null,
        quantity = -1,
        $cell = null,
        arraylabels = [],
        indexLabel = null;
        
    // validamos si todos los campos de cantidad son diligenciados
    $("#tblAddNewGroup tbody tr:not(.info-message)").each(function(){
       
       // referenciamos la fila
       $currentRow = $(this);
       
       // Array con el numerro de las etiquetas 
       arraylabels = [];
       
       // Obtenemos las etiquetas 
       $cell = $currentRow.find("td:eq(2) div.item-tag");
       
       // Recorremos cada uno de los div
       $cell.each(function(){
       
         // Obtenemos el index
         indexLabel = $(this).attr("data-index");
         
         // Validamos por cada uno de los index
         if( indexLabel == 1){ labels.count_itemGroup1 ++;}
         else if(indexLabel == 2){ labels.count_itemGroup2 ++; }
         else if(indexLabel == 3){ labels.count_itemGroup3 ++; }
         else if(indexLabel == 4){ labels.count_itemGroup4 ++; }
         
         // Agregamos el item 
         arraylabels.push(indexLabel);
       });
       
       // obtenemos el valor de cantidad
       quantity = $currentRow.find("input.txtGroupQuantity").val();
       
       // validamos si existe un valor de cantidad
       if(quantity){
         
         // obtenemos las columnas seleccionadas
         var $items = $currentRow.find("td.td-selected-group");
         
         // variable para guardar los atributos seleccionados
         var attrsList = [];
         
         // se recorre cada una de las columnas seleccionadas
         $items.each(function(index, element){
           
           // referenciamos el input actual
           var $currInput = $(element).find("input");
           
           // agregamos los valores de cada atributo
           attrsList.push({
             columnIndex: $(element).index(),
             value: ($currInput.val() || (index + 1)),
             disabled: ($currInput.attr("disabled") ? true : false)
           });
         });
         
         // agregamos los datos del especie actual
         conceptObj.push({
           conceptData: $currentRow.data("conceptData"),
           position: $currentRow.find("b.spnNumberCounter").text(),
           quantity: quantity,
           alias: $currentRow.find("input.inpAlias").val(),
           attrsList: attrsList,
           labels : arraylabels
         });
       
       } else{
       
         // cambiamos el estado
         stateCounter = false;
         
         // salimos el ciclo
         return;
       }
    });
   
    // Validamos de que las etiquetas requeridas se encuentren establecidads
    if(labels && labels.count_itemGroup1 > 0 && labels.count_itemGroup2 > 0 && labels.count_itemGroup3 > 0 && labels.count_itemGroup4 > 0){
      
      // validamos si todos los campos de cantidad estan diligenciados
      if(stateCounter){
        
        // obtenemos los datos del formulario
        var formData = {
          prefix: String($("#txtPrefix-group").val()).trim(),  
          gender: String($("#txtGender-group").val()).trim(),
          alias: String($("#txtAlias-group").val()).trim(),
          attrbutes: String($("#txtAttr-group").val()).trim(),
          suffix: String($("#txtSuffix-group").val()).trim(),
          conectionInput: String($("#sltConectionInput-group").val()).trim(),
          conectionOutput: String($("#sltConectionOutput-group").val()).trim(),
          diameterInput: objectDataAttributes.diameterInput ?  objectDataAttributes.diameterInput: "",
          diameterOutput: objectDataAttributes.diameterOutput ?  objectDataAttributes.diameterOutput: "",
          diameterInternal: objectDataAttributes.diameterInternal ?  objectDataAttributes.diameterInternal: "",
          protection: objectDataAttributes.protection ? objectDataAttributes.protection: ""
      
        };
        
        //validamos de que que los campos de prefijo, genero, alias atributos y sufijo  se encuentren con datos
        if(formData.prefix && formData.gender && formData.attrbutes && formData.attrbutes && formData.conectionInput){
              
          // Mesaje por defecto para la creación de un grupo 
          var message = "¿Esta seguro que desea crear este nuevo grupo?";
          
          // Validamos si se esta editando un grupo 
          if(type && type == "edit"){
            
            // Cambiamos el mensaje para edición de grupo 
            message = "¿Esta seguro que desea editar este grupo?";
            
          } else if(type == "duplicate"){
            
            // Cambiamos el numero de la fila para que se guarde en una nueva fila
            rowIndexGroup  = undefined;
          }
          
          // obtenemos el nombre del grupo
          var groupName = String($(".divGroupName:first").text()).trim();

          // mostramos mensaje de confirmación antes de proceder a crear un nuevo grupo
          SnvaJsApi.confirm(message, function(){
          
            // mostramos el loading
            SnvaJsApi.manageLoading("block", "Almacenando información del grupo...");
              
            //Invocamos a la función que trae del servidor los datos de las carpetas hijas de la carpeta principal y sus respectivos archivos
            google.script.run.withSuccessHandler(function(response){
              
              // se llama la función que se ejecuta al momento de terminar de crear o modificar un grupo
              responseManageGroup(response, rowIndexGroup, $form, (oldDataGroup ? oldDataGroup[1] : ""), conceptObj, type);
              
            }).withFailureHandler(SnvaJsApi.onFailure).createNewGroup(conceptObj, formData, rowIndexGroup, type, groupName);
            
          });
        
        }else{
        
          // validamos si existe el collapsible
          if(instanceCollapsible){
          
            // mostramos el collapsible
            instanceCollapsible.open(1);
          
          }
          
          //mostramos mensaje 
          SnvaJsApi.showAlert("Los campos de 'Prefijo', 'Género', 'Atributos' y 'Tipo de conexión de entrada' son obligatorios.");
          
        }
      
      } else {
        
        // validamos si existe el collapsible
        if(instanceCollapsible){
        
          // mostramos el collapsible
          instanceCollapsible.open(0);
          
        }
        
        //mostramos mensaje 
        SnvaJsApi.showAlert("El campo cantidad en cada producto debe ser diligenciado.");
        
      }
    }else{
      
      // validamos si existe el collapsible
      if(instanceCollapsible){
      
        // mostramos el collapsible
        instanceCollapsible.open(0);
      
      }
      //mostramos mensaje 
      SnvaJsApi.showAlert("Debe establecer las etiquetas requeridas.");
    }
 
  } else {
    
    // validamos si existe el collapsible
    if(instanceCollapsible){
    
      // mostramos el collapsible
      instanceCollapsible.open(0);
      
    }
    
    // mostramos mensaje
    SnvaJsApi.showAlert("Se debe seleccionar al menos un atributo.");
    
  }
  
  // prevenimos el evento por defecto
  e.preventDefault();
}

/**
 * Función que recibe la respuesta al momento de crear o modificar un grupo
**/
function responseManageGroup(response, rowIndexGroup, $form, oldGroupName, conceptObj, type){
  
  // agregamos el listao actualizado
  $("#mdlSearchConcepts").data("arrayData", response.conceptUpdated);
  
  // se referencia el modal de crear grupo
  var $modalGroup = $("#mdlAddNowGroups");
  
  // creamos la instancia del modal
  var instanceMdl = M.Modal.getInstance($modalGroup);
  
  // validamos si existe la instancia
  if(instanceMdl){
  
    // cerramos el modal
    instanceMdl.close();
  }
  
  // obtenemos el id del panel donde se ingresan los especies 
  var currentPanelId = $("#mdlSearchConcepts").data("panelId");
  
  // variable para referencia de tabla de la propuesta
  var $tableConcepts= null;
   
  // creamos la instancia del modal de busqueda de grupos
  var instanceSearchGroupMdl = M.Modal.getInstance($("#mdlSearchingGroups"));
  
  // validamos si existe la instancia
  if(instanceSearchGroupMdl){
  
    // cerramos el modal de busqueda de grupos
    instanceSearchGroupMdl.close();
  }
  
  //mostramos todas las etiquetas
  $(".lst-items-tag div.item-tag").show();
  
  // refrenciamos el formulario
  var $formSearchConcepts = $("#frmSearchConcept");
  
  // validamos si es una actualización de un grupo para actualizar la busqueda
  if(rowIndexGroup){
    
    // emulamos el evento clic a la busqueda de especie
    $formSearchConcepts.trigger("submit");
    
    // removemos la propiedad
    $form.removeData("rowIndex");
    
    // Datos del grupo 
    var groupData = [];
    
    if(currentPanelId){
    
      // referenciamos la tabla
      $tableConcepts = $("#" + currentPanelId + "_table");
      
      // recorremos cada uno de los grupos
      $tableConcepts.find("tbody tr td a.btn-group").closest("tr").each(function(){
        
        // Obtenemos los datos del grupo
        groupData = $(this).data("conceptData");
        
        // Validamos de que venga los datso del grupo y por el nombre del grupo 
        if(groupData && groupData[1] == oldGroupName){
          
          // Actualizamos los datos del grupo 
          updateRowGroup($(this), response.nowGroupArray, currentPanelId);
        }
      });
    }
    
    // mostramos el respectivo mensaje
    SnvaJsApi.showAlert("Grupo modificado con éxito.");
    
  } else {
  
    // emulamos el evento clic a la busqueda de especie
    $formSearchConcepts[0].reset();
    
    // agregamos el valor de especie
    $("#txtSpecieSearch").val(response.newGroupName);
    
    // emulamos el evento clic a la busqueda de especies
    $formSearchConcepts.trigger("submit");
    
    // ubicamos el boton de agregar al panel actual
    var $btnAddConcept = $("#tblConceptList tbody tr:not(.info-message):first td:last a:not(.btn-edit-group)");
    
    // validamos si existe el boton y emulamos el clic
    if($btnAddConcept.length > 0) $btnAddConcept.click();
    
    // validamos si existe el panel
    if(currentPanelId){
      // referenciamos la tabla
      $tableConcepts = $("#" + currentPanelId + " table");
      
      //validamos si el tipo de de grupo es una duplicación
      if(type != "duplicate"){
        // mostramos mensaje de confirmación antes de proceder a crear un nuevo grupo
        SnvaJsApi.confirmAvanced("Grupo creado exitosamente, ¿Desea eliminar las especies seleccionados actualmente?", "Si", "No", function(){
          
          // eliminamos las filas
          $tableConcepts.find("tbody tr td input[type='checkbox']:checked").each(function(){
          
          // removemos cada una de las filas
          $(this).closest("tr").remove();
          
          });
        
        });
      }else{
      
        // mostramos el respectivo mensaje
        SnvaJsApi.showAlert("Grupo duplicado con éxito.");
        
      }
      
      // iniciamos el paginador de la tabla
      SnvaJsApi.initPaginationByTable($tableConcepts, currentPanelId + "_pagination", 10);
    }
  }
  
  // Ocultamos el loading
  SnvaJsApi.manageLoading("none", "Espera un momento por favor...");
  
}


/*
* Función que permite actualizar  los datos de un grupo en la propuesta
*/
function updateRowGroup($row, nowGroupArray, currentPanelId){ 

   // Actualizamos los datos de la fila 
   $row.data("conceptData", nowGroupArray);
   
   // Actualizamos los datos en el botón de editar 
   $row.find("td:eq(0) a").off("click").click({conceptData: nowGroupArray, panelId: currentPanelId, isMainPanel: true, type: "edit"}, editGroup);
   
   // Estabelcemos el nuevo nombre del grupo
   $row.find("td:eq(1)").text(nowGroupArray[1]);
   
   // Establemcemos la unidad
   $row.find("td:eq(2)").text(nowGroupArray[4]);
   
   // Establecemos el costo unitario
   $row.find("td:eq(4)").text(nowGroupArray[5]);
   
}

/**
 * Función que permite obtener cada uno de los datos del departamento,familia, palabra clave y Unidad
**/
function getConceptFilterData(conceptList){
  
  // definimos el objeto a retornar
  var returnObject = {
    departament: {},
    family: {},
    keyWord: {},
    gender: {}
  };
  
  // recorremos cada uno de los especies
  for(var i = 0; i < conceptList.length; i++){
    
    // validamos si ya existe el valor del departamento
    if(conceptList[i][0]){
      
      if(!returnObject.departament[conceptList[i][0]]){
        // agregamos el departamento
        returnObject.departament[conceptList[i][0]] = {
          family: {},
          keyWord: {},
          gender: {}
        };
      }
      
      // obtenemos las sub dependencias del departamento
      validationNewValueToObject(returnObject.departament[conceptList[i][0]].family,conceptList[i][2]); // familia
      validationNewValueToObject(returnObject.departament[conceptList[i][0]].keyWord,conceptList[i][3]); // palabra clave
      validationNewValueToObject(returnObject.departament[conceptList[i][0]].gender,conceptList[i][8]); // genero

    }
    // validamos si ya existe el valor de familia
    if(conceptList[i][2]){
      
      if(!returnObject.family[conceptList[i][2]]){
        // agregamos la familia
        returnObject.family[conceptList[i][2]] = {
          departament: {},
          keyWord: {},
          gender: {}
        };
      }
      
      // obtenemos las sub dependencias del familia
      validationNewValueToObject(returnObject.family[conceptList[i][2]].departament,conceptList[i][0]); // departamento
      validationNewValueToObject(returnObject.family[conceptList[i][2]].keyWord,conceptList[i][3]); // palabra clave
      validationNewValueToObject(returnObject.family[conceptList[i][2]].gender,conceptList[i][8]); // genero
    }
    
    // validamos si ya existe el valor de palabre clave
    if(conceptList[i][3]){
      
      if(!returnObject.keyWord[conceptList[i][3]]){
      
        // agregamos la palabre clave
        returnObject.keyWord[conceptList[i][3]] = {
          departament: {},
          family: {},
          gender: {}
        };
      }
      
      // obtenemos las sub dependencias del familia
      validationNewValueToObject(returnObject.keyWord[conceptList[i][3]].departament,conceptList[i][0]); // departamento
      validationNewValueToObject(returnObject.keyWord[conceptList[i][3]].family,conceptList[i][2]); // palabra clave
      validationNewValueToObject(returnObject.keyWord[conceptList[i][3]].gender,conceptList[i][8]); // genero
    }
    
    // validamos si ya existe el valor de palabre clave
    if(conceptList[i][8]){
      
      if(!returnObject.gender[conceptList[i][8]]){
      
        // agregamos la palabre clave
        returnObject.gender[conceptList[i][8]] = {
          departament: {},
          family: {},
          keyWord: {}
        };
      }
      
      // obtenemos las sub dependencias del familia
      validationNewValueToObject(returnObject.gender[conceptList[i][8]].departament,conceptList[i][0]); // departamento
      validationNewValueToObject(returnObject.gender[conceptList[i][8]].family,conceptList[i][2]); // palabra clave
      validationNewValueToObject(returnObject.gender[conceptList[i][8]].keyWord,conceptList[i][3]); // genero
    }
  }
  
  // retornamos el objeto
  return returnObject;
  
}

/*
* función encargada de validar si se debe agregar un nuevo indice al objeto
*/
function validationNewValueToObject(objectPrimary, newIndex){
  
  // validamos si ese objeto existe
  if(newIndex &&  !objectPrimary[newIndex]){
    // agregamos ese dato al objeto
    objectPrimary[newIndex] = null;
  }
}

/**
 * Función encargado de obtener los datos diligenciados y enviarlos para realizar una acción
 **/
function sendRequest(e) {
  
  // referenciamos el formulario como objeto Jquery
  var $form = $(this);
  
  // se obtiene que tipo de acción que se debe realizar
  var action = $form.data("action");
  
  // referenciamos el id del documento de la cot.
  var documentId = null,
      rowIndex = -1,
      message = "¿Seguro desea generar la cotización?",
      lastRow = -1,
      sheetsData = {
        "sheetName": "Proyecto"
      },
      consecutive = null;
   
  // validamos si es una actualización
  if(action == "modification"){
  
    // obtenemos el id del documento
    documentId = $form.data("documentId");
    
    // obtenemos la fila donde se encuentra la cotización en la hoja base de solicitudes
    rowIndex = Number($form.data("rowIndex"));
    
    // obtenemos la fila hasta la que se van a eliminar filas cuando se modificque
    lastRow = Number($form.data("lastRow"));
    
    // obtenemos el consecutivo de la solicitud
    consecutive = $form.data("consecutive");
    
    // cambiamos el mensaje
    message = "¿Seguro desea modificar la cotización?";
    
    // obtenemos la información de la hoja que se debe modificar
    var $versionSelected = $("#sltVersion option:selected");
    
    // se valida si NO existe un campo de la versión que desea actualizar
    if($versionSelected.length == 0){
      
      // mostramos mensaje 
      SnvaJsApi.showAlert("Debes elegir en que versión quieres almacenar la información.");
      
      // finalizamos la ejecución de la función
      return false;
      
    }
    
    try{
      // obtenemos los datos de la hoja donde se desea guardar los datos
      sheetsData = JSON.parse(JSON.stringify($versionSelected.data("sheetsData")));
    }catch(e){
      sheetsData = {
        "sheetName": "Proyecto"
      };
    }
    
    // se valida si la propiedad de sheetName eiste
    if(sheetsData && !sheetsData.sheetName){
      
      // se define un objeto por defecto
      sheetsData = {

/**
 * Función que permite validar si los datos de presupuesto esta diligenciados correctamente o falta alguno
**/
function isVerifyDataEstimate(orderProjects){
  
  // definimos un objeto por defecto
  var returnObject = {
    state: true,
    message: ""
  };
  
  // validamos si no tiene seleccionado ninguna orden
  if(orderProjects.length == 0){
    
    // Ajustamos el mensaje
    returnObject.message = "Debe agregar mínimo una orden de proyecto.";
    
    // Ajustamos el estado
    returnObject.state = false;
    
  }
  
  // recorremos cada una de las ordenes del proyecto
  for(var i = 0; i < orderProjects.length; i++){
    
    // validamos si las lineas de productos no tiene valores
    if(orderProjects[i].linesProducts.length == 0){
      
      // Ajustamos el mensaje
      returnObject.message = "Debes seleccionar mínimo una línea de producto para el orden: <b>" + orderProjects[i].orderName + "</b>.";
      
      // Ajustamos el estado
      returnObject.state = false;
      
      // salimos del ciclo
      break;
      
    }

    // recorremos cada una de la líneas de proyectos
    for(var j = 0; j < orderProjects[i].linesProducts.length; j++){
      
      // validamos si no existe especie para la línea actual
      if(orderProjects[i].linesProducts[j].conceptList.length == 0){
        
        // Ajustamos el mensaje
        returnObject.message = "Debes agregar mínimo una especie para la línea: <b>" + orderProjects[i].linesProducts[j].lineProductName + "</b> del orden: <b>" + orderProjects[i].orderName + "</b>.";
        
        // Ajustamos el estado
        returnObject.state = false;
        
        // salimos del ciclo
        return returnObject;
        
      } else {
        
        // definimos un estado de especie diligenciados
        var conceptState = true;
        
        // recorremos cada uno de los especies para validar que cada especie este diligenciado correctamente
        orderProjects[i].linesProducts[j].conceptList.forEach(function(record){

          // validamos si el valor es diferente de vacio
          if(!record.conceptCount || (record.conceptCount == "0") ){
            
            // cambiamos de estado
            conceptState = false;
            
            // salimos del ciclo
            return false;
            
          }
          
        });
        
        // validamos si el estado es false
        if(conceptState == false){
          
          // Ajustamos el mensaje
          returnObject.message = "Debes agregar la cantidad en cada especie para la línea: <b>" + orderProjects[i].linesProducts[j].lineProductName + "</b> y el orden: <b>" + orderProjects[i].orderName + "</b>.";
          
          // Ajustamos el estado
          returnObject.state = false;
          
          // salimos del ciclo
          return returnObject;
          
        }
      }
    }
  }
  
  // retornamos los respectivos datos
  return returnObject;
  
}

/**
 * Función que permite obtener las lineas de productos
**/
function getProductsLines($content){
 
  // validamos si existe un contenedor valido
  if($content.length > 0){
 
    // definimos la variable donde almacenamos las lineas de producto
    var lineProductsArray = [];

    // recorremos cada una de las opciones seleccionadas sobre orden
    $content.find(".collapsible-order-body input[type=checkbox].chx-product-line").each(function(index, element){

      // validamos si tiene chequeado la opción
      if(this.checked){
      
        // Agregamos cada una de las ordenes del proyecto
        lineProductsArray.push({
          lineProductName: this.value,
          conceptList: getConceptListByTable($content.find("ul.collapsible li[data-position=" + (index + 1) + "]"))
        });
      }
      
    });
    
    // se ordena las líneas de producto
    sortCriteria(lineProductsArray);
    
    // retornamos los datos
    return lineProductsArray;
    
  }
  
  // retornamos por defecto un array vacio
  return [];
  
}

/**
 * Función que permite organizar las lineas de producto
**/
function sortCriteria(array) {
  array.forEach(function(object) {
    object.characters = [""];
    var match = object.lineProductName.match(/^(?:(?:[a-zá-ú]|\d)+\.)+/gi);
    if (match) {
      if (match[0]) {
        var matches = match[0].match(/(([a-zá-ú]|\d)+)/gi);
        if (matches) {
          object.characters = matches.map(function(item) {
            if (isNaN(item)) {
              return item;
            } else {
              return Number(item);
            }
          });
        }
      }
    }
  });
  
  array.sort(function(a, b) {
    return getTempIndex_(a.characters, b.characters, 0);
  });
  
  function getTempIndex_(arrayA, arrayB, position) {
    var valA = "", valB = "";
    
    if (Object.prototype.hasOwnProperty.call(arrayA, position)) {
      valA = arrayA[position];
    }
    
    if (Object.prototype.hasOwnProperty.call(arrayB, position)) {
      valB = arrayB[position];
    }
    
    if (valA < valB) { return -1; }
    if (valA > valB) { return 1; }
    
    if (valA != "" || valB != "") {
      return getTempIndex_(arrayA, arrayB, position + 1);
    }
    
    return 0;
  }
}

/**
** Función que permite obtener el listado de especie
**/
function getConceptListByTable($content){
  
  // validamos si existe un contenedor valido
  if($content.length > 0){
    
    // definimos la variable donde almacenamos los especie
    var conceptsArray = [];
    
    // recorremos cada una de las opciones seleccionadas sobre los especie asociados a una linea
    $content.find("table > tbody tr").each(function(index, element){
      
      // refernciamos la fila
      var $row = $(this);
      
      // validamos si tiene chequeado la opción
      if($row.hasClass("info-message") == false){
      
        // Agregamos cada una de las ordenes del proyecto
        conceptsArray.push({
          conceptCount: $row.find("input[type='text']").val(),
          conceptData: $row.data("conceptData")
        });
      }
      
    });
    
    // retornamos los datos
    return conceptsArray;
    
  }
  
  // retornamos por defecto un array vacio
  return [];
  
}

/**
 * Función que permite adicionarun panel de tipo orden
**/
function addOrderPanel(productLineList, panelId, orderName, $mainContainer, position, defaultLines, lineTempData){

  // creamos el contenedor del la lista en el colapssable
  var $nowElement = $("<li>").attr({id: panelId, "data-position": position});
  
  // creamos el contenedor del elemento colapsable
  var $productLineUl = $("<ul>").attr({class: "collapsible"});
  
  // se define la variable donde se almacenara el elemento anterior a donde se va a ingresar el nuevo
  var $beforeElement = null,
  counter = 0;
  
  // buscamos y recorremos los elementos
  $mainContainer.find(">li").each(function(){
    
    // aumentamos el contador
    counter++;
    
    // obtenemos la posición del elemento actual
    var currentPosition = Number($(this).attr("data-position"));
   
    // validamos si la posición actual es menor
    if(currentPosition < position){
      
      // referenciamos el elemento
      $beforeElement = this;
      
    } 
  });
  
  // creamos el contenedor de opciones
  var $optionContent = $("<div>").attr({class: "row"});
 
  // validamos si el index es igual a cero
  if($beforeElement != null){
   
    // agregamos 
    $($beforeElement).after($nowElement);
    
  } else {
    
    // validamos si el contador es igual a cero
    if(counter == 0){
    
      // agregamos el contenedor el respectivo panel principal
      $mainContainer.append($nowElement);
    } else {
      
      // agregamos el elemento de primero
      $mainContainer.find("li:eq(0)").before($nowElement);
    }
    
  }
  
  // agregamos la estructura del contenedor
  $nowElement.append(
    $("<div>").attr({class: "collapsible-header collapsible-order-header"}).append(orderName).append(
      $("<i>").attr({class: "material-icons right expand-order"}).text("expand_less")
    ).append(
      $("<span>").attr({class: "right orderTotal"}).text("0")
    )
  ).append(
    $("<div>").attr({class: "collapsible-body collapsible-order-body"}).append(
      $("<p>").attr({style: "font-weight: bold;"}).html("Líneas de productos")
    ).append("<br>").append($optionContent).append(
      $("<div>").attr({class: "row"}).append($productLineUl)
    )
  );
  
  // recorremos cada una de las líneas del producto
  for(var i = 0; i < productLineList.length; i++){
  
    // creamos las opción actual
    $optionContent.append(
      $("<div>").attr({class: "col s12 m4 xl3"}).append(
        $("<label>").append(
          $("<input>").attr({type: "checkbox", class: "filled-in chx-product-line", value: productLineList[i]}).click({position: (i + 1),value: productLineList[i], panelId: "PLP_" + SnvaJsApi.generateUUID()}, manageProductLinePanel)
        ).append(
          $("<span>").text(productLineList[i])
        )
      )
    );
  
  }
  
  // validamo si existen datos temporales sobre la lineas de producto
  if(lineTempData){
    
    // recorremos cada una de las ordenes seleccionadas
    for(var j = 0; j < lineTempData.length; j++){
      
      // buscamos un cheched con el valor respectivo
      $optionContent.find("input[value='" + lineTempData[j].lineProductName + "']").data("conceptTempData", lineTempData[j].conceptList).click();
    
    }
    
  } else {
    
    // recorremos cada una de las ordenes seleccionadas
    for(var j = 0; j < defaultLines.length; j++){
      
      // buscamos un cheched con el valor respectivo
      $optionContent.find("input[value='" + defaultLines[j] + "']").click();
    
    }
    
  }
  
  // actualizamos el collapsible
  $mainContainer.collapsible();
  
  // inicializamos el calapsable de linea de producto
  $productLineUl.collapsible();
  
}

/**
 * Función que permite agregar el contenedor de linea
**/
function insertProductLine(panelId, $mainContainer, productLineName, position, conceptTempData){
  
  // creamos el contenedor del la lista en el colapssable
  var $nowElement = $("<li>").attr({id: panelId, "data-position": position});
  
  // se define la variable donde se almacenara el elemento anterior a donde se va a ingresar el nuevo
  var $beforeElement = null,
  counter = 0;
  
  // buscamos y recorremos los elementos
  $mainContainer.find(">li").each(function(){
    
    // aumentamos el contador
    counter++;
    
    // obtenemos la posición del elemento actual
    var currentPosition = Number($(this).attr("data-position"));
   
    // validamos si la posición actual es menor
    if(currentPosition < position){
      
      // referenciamos el elemento
      $beforeElement = this;
      
    } 
  });
  
  // validamos si el index es igual a cero
  if($beforeElement != null){
   
    // agregamos 
    $($beforeElement).after($nowElement);
    
  } else {
    
    // validamos si el contador es igual a cero
    if(counter == 0){
    
      // agregamos el contenedor el respectivo panel principal
      $mainContainer.append($nowElement);
    } else {
      
      // agregamos el elemento de primero
      $mainContainer.find("li:eq(0)").before($nowElement);
    }
    
  }

  // agregamos la estructura del contenedor
  $nowElement.append(
    $("<div>").attr({class: "collapsible-header collapsible-product-line-header"}).append(
      $("<span>").text(productLineName)
    ).append(
      $("<i>").attr({class: "material-icons right expand-product-line"}).text("expand_less")
    ).append(
      $("<span>").attr({class: "right lineTotal"}).text("0")
    )
  ).append(
    $("<div>").attr({class: "collapsible-body collapsible-product-line-body"}).append(function(){
      
      // retornamos la interfaz
      return generateConceptPanel(panelId, conceptTempData, productLineName);
    })
  );
  
  // iniciamos el paginador de la tabla
  SnvaJsApi.initPaginationByTable($nowElement.find("table"), panelId + "_pagination", 10);
  
   // Actualizamos los valores de la ordenes, lines y productos
   updateDataValueOrders();
    
  
}

/**
 * Permite eliminar los conceptos seleccionados
**/
function deleteFullConcepts(e){

  // Obtenemos el id del panel
  var panelId = e.data.panelId;
  
  // se referencia el panel
  var $panel = $("#" + panelId);
  
  // Obtenmos la referencia de la tabla 
  var $tableModifiy = $panel.find("table");
  
   // referenciamos el id del paginador
  var paginationId = panelId + "_pagination";
  
  // mostramos mensaje de confirmación antes de proceder a eliminar la cotización
  SnvaJsApi.confirm("¿Seguro(a) desea eliminar las especies seleccionadas?", function(){
         // referenciamos el paginador 
    var $pagination = $("#" + paginationId);
    
    // Obtenemos el numero de la pagina 
    var pageNumberActive = $pagination.find("li.active").text();
    
    // recorremos la lista de check marcados para eliminar
    $tableModifiy.find("tbody tr input[type='checkbox']:checked").each(function(){
      
      // Agregamos los datos del especies
      $(this).closest("tr").remove();
      
    });

    // iniciaizamos el paginador
    SnvaJsApi.initPaginationByTable($tableModifiy, paginationId, 10);
    
    // Validamos la cantidad de paginas se encuentre entre la pagina activa
    if(pageNumberActive > ($pagination.find("li").length - 2)){
    
      // Le restamos una pagina 
      pageNumberActive = Number(pageNumberActive) -1;
    }
    
    // Simulamos el click en la pagina       
    $pagination.find("li:eq(" + pageNumberActive + ") a").click();
    
    // validamos la cantidad de filas 
    if($tableModifiy.find("tbody tr.isValid").length == 0){
    
      // Agrregamos la fila de que no se tiene registros 
      $tableModifiy.find('tbody').html('<tr class="info-message" style=""><td colspan="7">No hay especies para mostrar.</td></tr>');
    }
    
     // Actualizamos los valores de la ordenes, lines y productos
    updateDataValueOrders();
    
    // Ocultamos el boton de eliminar
    $panel.find("button.delete__concepts").hide();
    
    // Desmarcamos la opción de chequeada de la cabecera
    $tableModifiy.find("thead th input[type='checkbox']").prop('checked', false);
    
  });
  
}

function refreshTotalLine(){

  $('.ctn-concept').each(function(){

/*
* permite seleccionar o deseleccionar todos los elementos de la tabla 
*/
function changeCheckBox(e){
  
  // Prevenimos el evento por defecto 
  e.preventDefault();
  
  // Obtenemos la referencia de la tabla 
  var $table = e.data.table;
  
  // refernciamos el panel
  var $panel = $table.closest(".ctn-concept");
  
  // obtenemos el estado para seleccionar o deseleccionar 
  var stateCheckBox =  $table.find("thead th input[type='checkbox']").prop('checked');
   
  // Validamos de que se tenga la referencia de la  tabla 
  if($table){
     
     // se valida si esta chequeado
     if(stateCheckBox){
       
       // Mostramos el boton de eleiminar
       $panel.find("button.delete__concepts").show();
       
     } else {
       
       // Ocultamos el boton de eliminar
       $panel.find("button.delete__concepts").hide();
       
     }
     
     // Referenciamos el cuerpo de la tabla
     var $rows = $table.find("tbody tr.isValid");
     
     // Validamos de que se tenga filas para recorrer
     if($rows && $rows.length > 0){
       
       // Fila para trabajar
       var $inputChecked = "";
       
       // recorremos cada fila para obtener los dato s
       $rows.each(function(){
         
         // Referencia a la fila 
         $inputChecked = $(this).find("td input[type='checkbox']");
        
         // Cambiamos el estado 
         $inputChecked.prop("checked", stateCheckBox);
         
       });
     }
  }
}

/*
* Permite validar si los valores estan todos seleccionados o no 
*/
function changeCheckboxTable(e){
  
  // Prevenimos el evento por defecto 
  e.preventDefault();
  
  // Obtenemos la referencia de la tabla 
  var $table = e.data.table;
  
  // refernciamos el panel
  var $panel = $table.closest(".ctn-concept");
  
  // obtenemos el estado para seleccionar o deseleccionar 
  var stateCheckBox =  $table.find("thead th input[type='checkbox']").prop('checked');

  // Validamos de que se tenga la referencia de la  tabla 
  if($table){
     
     // Referenciamos el cuerpo de la tabla
     var $rows = $table.find("tbody tr.isValid");

     // Validamos de que se tenga filas para recorrer
     if($rows && $rows.length > 0){
       
       // Validamos cuantos esta seleccionados
       var countChecked = $rows.find("td input[type='checkbox']:checked");
       
       // se valida si es mayor a cero
       if(countChecked.length > 0){
         
         // Mostramos el boton de eleiminar
         $panel.find("button.delete__concepts").show();
         
       } else {
         
         // Ocultamos el boton de eliminar
         $panel.find("button.delete__concepts").hide();         
       }
       
       // Obtenemos las filas con los check
       var $rowsChecked = $rows.find("td input[type='checkbox']");
       
       // Validamos si hay que deseleccionarlo o selecccionar de pendiendo de la cantidad 
       if(countChecked && $rowsChecked && countChecked.length == $rowsChecked.length){
         
         // Seleccionamos el elmento
         $table.find("thead th input[type='checkbox']").prop('checked', true);
       
       }else{
         
         // Deseleccionamos el elmento
         $table.find("thead th input[type='checkbox']").prop('checked', false);
       
       }
     }
  }

}

/**
 * Función que permite realizar una acción al momento de colocar un elemento sobre otro
**/
function dropTag(event) {

  // Prevenimos el evento por defecto
  event.preventDefault();
  
  // actualizamos el objeto jQuery a un Objeto nativo
  event.dataTransfer = event.originalEvent.dataTransfer;
  
  // obtenemos el id del elemento
  var fieldTagId = event.dataTransfer.getData("fieldTagId");
  
  // validamos si existe algun elemento
  if(fieldTagId){

    // referenciamos el elemento
    var $element = $("#" + fieldTagId);
    
    // obtenemos los atributos del elemento que se esta movindo
    var options = {
      only: ($element.attr("data-only") ? true : false),
      index: Number($element.attr("data-index")),
      id: fieldTagId
    };
    
    // referenciamos el contenedor
    var $content = $(event.target);
    
    // validamos si la clase del elemento es "ctn-item-drag-drop"
    if(!$content.hasClass("ctn-item-drag-drop")){
      
      // referenciamos el contenedor principal
      $content = $content.closest("div.ctn-item-drag-drop");
    }
    
    // validamos si se debe agregar el elemento o no
    var isNewElement = validateNewElement($content, $element, options);
    
    // se valida si se debe creat un elemento nuevo
    if(isNewElement){
      
      // se define el nombre de la etiqueta
      var labelName = "";
      
      // Validamos si se agrega una pieza de entrada
      if(options.index == 1){
        
        // seleccionamos el diametro nominal de entrada en MM o diametro nominal de salida en MM
        isNewElement = selectedAttrManually($content, 2, 13, 15);
        
        // seleccionamos el TIPO DE CONEXIÓN ENTRADA o de SALIDA
        selectedAttrManually($content, 2, 19, 20);
        
        // se define el nombre de la Pza Entrada
        labelName = "Pza Entrada";
        
      } else if(options.index == 2){
        
        // seleccionamos el diametro nominal de salida en MM o diametro nominal de entrada en MM
        isNewElement = selectedAttrManually($content, 3, 15, 13);
        
        // seleccionamos el TIPO DE CONEXIÓN ENTRADA o de SALIDA
        selectedAttrManually($content, 3, 20, 19);
        
        // se define el nombre de la Pza Entrada
        labelName = "Pza Salida";
        
      }
      
      // volvemos a validar si se puede agregar la etiqueta
      if(isNewElement){
        
        // agregamos el elemento al contenedor
        $content.append(dropItem($element, options));
        
        // actualizamos el nombre del grupo
        generateGroupName();
        
      } else {
        
        // mostramos un mensaje
        SnvaJsApi.showAlert("No existe el 'Diametro de entrada o salida' en la especie a la que desea agregar la etiqueta de '" + labelName + "'.");
        
        // validamos si la etiqueta que se intento agregar ede pieza de entrada
        if(labelName == "Pza Entrada"){
          
          // Habilitamos la etiqueta de pieza de entrada 
          $("#itemGroup1").show();
        }
        
        // validamos si la etiqueta que se intento agregar ede pieza de salida
        if(labelName == "Pza Salida"){
          
          // Habilitamos la etiqueta de pieza de salida
          $("#itemGroup2").show();
        }
        
      }
    }
  }
}

/**
 * Función que permite seleccionar un atributo manualmente
**/
function selectedAttrManually($content, position, cellIndex, cellIndexOptional){
  
  // referenciamos la fila del contenedor
  var $rowContent = $content.closest("tr");
  
  // obtenemos la celda donde esta el diametro nominal de entrada en MM
  var $cell = $rowContent.find("td.td-enabled-selection[data-cellIndex='" + cellIndex + "']");
  
  // validamos si no existe el diametro nominal de entrada en MM
  if($cell.length == 0 && cellIndexOptional){
  
    // obtenemos la celda donde esta el diametro nominal de entrada en MM
    $cell = $rowContent.find("td.td-enabled-selection[data-cellIndex='" + cellIndexOptional + "']");
  
  }
  
  // validamos si existe celda
  if($cell.length > 0){
    
    // validamos si la celda es 19 o 20
    if(cellIndex == 19 || cellIndex == 20){
      
      // validamos si el valor que selecciono es el tipo de conexión de entrada
      if(cellIndex == 19){
        
        // agregamso el valor de tipo de conexión de entrada
        $("#sltConectionInput-group").val($cell.data("valueSelected")).formSelect();
        
      } else {
        
        // agregamso el valor de tipo de conexión de salida
        $("#sltConectionOutput-group").val($cell.data("valueSelected")).formSelect();
      }
    }
    
    // seleccionamos la etiqueta
    addAttrInCell($cell, cellIndex, position);
    
    // agregamos la clase para deshabilitar los eventos
    $cell.addClass("disabled-events");
    
    // retornamos un valor verdadero
    return true;
    
  } else {
    
    // retornamos por defecto falso
    return false;
  }
  
}

/**
 * Función que permite validar si se puede agregar el elemento o no
**/
function validateNewElement($content, $currentElement, options){
  
  // referenciamos el contenedor
  var isNewElement = false;
  
  // validamos si ya existe un tag con el mismo nombre del tag
  if($content.find("div.item-tag[data-index='" + options.index + "']").length == 0){
  
    // validamos si es un tag que es obligatorio y solo aparece en un lugar
    if(options.only){
      
      // validamos que no exista ningun tag en el contenedor
      if($content.find("div.item-tag").length == 0){
        
        // cambiamos el estado a verdadero para determinar que si se crar el nuevo elemento
        isNewElement = true;
        
        // ocultamos la opción del listado de etiquetas
        $currentElement.hide();
      }
      
    } else {
      // 5-6-7-8
      // validamos si se va agregar una etiqueta opcional
      if(options.index == 5 || options.index == 6 || options.index == 7 || options.index == 8){
        
        // variable que determina si debe continuar la validación
        var iscontinue = true;
        
        // realizamos un ciclo para validar que no exista
        for(var i = 5; i < 9; i++){
          
          // validamos que no exista
          if($content.find("div.item-tag[data-index='" + i + "']").length > 0){
            
            // Detenemos el proceso
            iscontinue = false;
            
            // salimos del ciclo
            break;
            
          }
        }
        
        // validamos que no exista ningun tag que solo deba estar solo
        if(iscontinue && $content.find("div.item-tag-only").length == 0){
          
          // cambiamos el estado a verdadero para determinar que si se crear el nuevo elemento
          isNewElement = true;
        }
        
      } else {
      
        // validamos que no exista ningun tag que solo deba estar solo
        if($content.find("div.item-tag-only").length == 0){
          
          // cambiamos el estado a verdadero para determinar que si se crear el nuevo elemento
          isNewElement = true;
        }
      }
    }
  }
  
  // retornamos el estado
  return isNewElement;
}

/**
 * Función que saca una copia al elemento actual y agrega la opción de eliminar
**/
function dropItem($currentElement, options){
  
  // creamos copia del elemento
  var $copyElement = $("<div>").attr({class: "item-tag", "data-index": options.index}).text($currentElement.text());
  
  // validamos si es un tag que es obligatorio y solo aparece en un lugar para que lo habilite de las opciones de etiquetas
  if(options.only){
    
    // referenciamos la opción y la mostramos
    $copyElement.addClass("item-tag-only");
  }
  
  // creamos la opción de eliminar la etiqueta
  var $deleteOption = $("<span>").attr({title: "Eliminar etiqueta"}).text("x").click({options: options}, deleteTagInTable);
  
  // agregamos la opción de eliminar en la copia
  $copyElement.append($deleteOption);
  
  // retornamos la opción
  return $copyElement;  
}

    "ANCHO DE LA PIEZA<br>PIES",
    "CALIBRE<br>MIL",
    "MODELO",
    "CAUDAL<br>LPH",
    "CAUDAL<br>LPS",
    "SEPARACIÓN<br>CM"
  ];

  // referenciamos la tabla
  var $table = $("#tblAddNewGroup").data({"notColumns": notColumns});
  
  // referenciamos la fila donde va los checks y el nombre de los atributos
  var $rowAttr = $("#trInputs");
  
  // creamos la primera columna por defecto
  $rowAttr.html('<th colspan="6"></th>');
  
  // agregamos la nueva columna de Genero
  $rowAttr.append(
    $("<th>").attr({class: "addGroup"}).append(
      $("<span>").attr({class: "spnAddGroup"}).html(attrName[0])
    )
  );
  
  // cantidad de atributos
  var attributesConter = 1;
  
  // calculamos el valor limite
  var limite = conceptArray[0].length >= 34 ? 33: conceptArray[0].length;
  
  // recorremos la cantidad de columnas de la primera fila sin contar el Genero y por eso no empieza desde 8 sino 9
  for(var col = 9; col < limite; col++){
    
    // validamos si el index de la columna no esta en el listado de las columnas que no deben
    if(notColumns.indexOf(col) == -1){
  
      // agregamos la nueva columna
      $rowAttr.append(

          $("<span>").attr({class: "spnAddGroup"}).html(attrName[col - 8])

      attributesConter++;
    }
  }

  $("#thAttributes").attr({colspan: attributesConter});
  
  // referenciamos el cuerpo de la tabla
  var $tBody = $table.find("tbody");

  var $row = null,
      currentConcept = [],
      $contentLabels = null,
      conceptAllData = null;
  
  // recorremos cada uno de los especies
  for(var row = 0; row < conceptArray.length; row++){
    
    // referenciamos el especies actual
    currentConcept = conceptArray[row];

    if(row == 0){

      $("#txtGender-group").val(currentConcept[8]);
      
      // agregamos la clase "active"
      $("#txtGender-group").parent().find("label").addClass("active");
      
    }
    
    // obtenemos los todos los datos del especies
    conceptAllData = onlyGroupArray ? onlyGroupArray[row] : null;

    addRowInManageGroupTable($table, $tBody, currentConcept, (row + 1), notColumns, null, conceptAllData);
    
  }

  generateGroupName();

  SnvaJsApi.initPaginationByTable($table, "ulAddGroupPagination", 5);

/**
 * Función que permite agregar una fila a la tabla de grupos
**/
function addRowInManageGroupTable($table, $tBody, currentConcept, rowIndex, notColumns, $row, onlyGroupArray){
  
  // validamos si la fila aun no existe
  if($row == null){
  
    // creamos la fila
    $row = $("<tr>").attr({class: "isValid"});
    
    // agregamos la fila al cuerpo de la tabla
    $tBody.append($row);
    
    // agregamos la nueva columna con el check
    $row.append(
      $("<td>").attr({class: "text-center"}).append(
        $("<b>").attr({class: "spnNumberCounter"}).text(rowIndex)
      )
    );
    
  } else {
    
    // borramos las demas columnas que no necesito excepto la primera
    $row.find("td:not(:first)").remove();
    
  }
  
  // Agregamoas los datos a la fila o los actualizamos
  $row.data("conceptData", currentConcept);
  
  // agregamos la nueva columna con el campo de ubicación
  $row.append(
    $("<td>").attr({class: "text-center", "style": "min-width: 90px;"}).append(
      $("<a>").attr({title: "Subir nivel", href: "javascript:void(0)", class: "btn-icon btn-floating orange waves-effect levelUp"}).append(
        $("<i>").attr("class", "material-icons").text("keyboard_arrow_up").click({$table: $table, "action": "levelUp"}, manageUpOrDownGroup)
      )
    ).append(
      $("<a>").attr({title: "Bajar nivel", href: "javascript:void(0)", class: "btn-icon btn-floating orange waves-effect levelDown"}).append(
        $("<i>").attr("class", "material-icons").text("keyboard_arrow_down").click({$table: $table, "action": "levelDown"}, manageUpOrDownGroup)
      )
    ).append(
      $("<a>").attr({title: "Cambiar especie", href: "javascript:void(0)", class: "btn-icon btn-floating orange waves-effect"}).append(
        //$("<i>").attr("class", "material-icons").text("find_replace").click({"$row": $row, "currentData": currentConcept}, previewConceptSimilars)
        $("<i>").attr("class", "material-icons").text("find_replace").click({"panelId": "replaceConcept", "$row": $row, "currentData": currentConcept}, openModalSearchConcept)
      )
    ).append(
      $("<a>").attr({title: "Eliminar especie", href: "javascript:void(0)", class: "btn-icon btn-floating red waves-effect"}).append(
        $("<i>").attr("class", "material-icons").text("delete").click(deleteSpecieInGroup)
      )
    )
  );
  
  // creamos el contenedor de etiquetas
  var $contentLabels = $("<div>").attr({class: "ctn-item-drag-drop"}).on("drop", dropTag).on("dragover", allowDrop).on("dragleave", dragLeaveTag);
  
  // se valida si existe información de las etiquetas guardadas
  if(onlyGroupArray && onlyGroupArray.labels && onlyGroupArray.labels.length > 0){
  
    // agregamos las etiquetas al contenedor
    insertlabels($contentLabels, onlyGroupArray.labels);
  }
  
  // agregamos la nueva columna con el campo de nombre de proyectos
  $row.append(
    $("<td>").attr("style", "max-width: 200px;").append($contentLabels).append(currentConcept[1])
  );
  
  // agregamos la nueva columna con el campo de unidad
  $row.append(
    $("<td>").text(currentConcept[4])
  );
  
  // agregamos la nueva columna con el campo de cantidad
  $row.append(
    $("<td>").append(
      $("<input>").attr({type: "text", pattern: "^[0-9]+(?:\.[0-9]{1,3}){0,1}$", style: "max-width: 80px;", class: "txtGroupQuantity"}).change(generateGroupName).on("paste keypress", SnvaJsApi.validateNumberFormat).focusin(showFormuleInField).focusout(processFormuleInField)
    )
  );
  
  // agregamos la nueva columna con el campo de alias
  $row.append(
    $("<td>").attr({style: "min-width: 120px;"}).append(
      $("<input>").attr({class: "inpAlias", type: "text", style: "max-width: 120px;"}).on("keyup change", manageAlias)
    )
  );
  
  // calculamos el valor limite
  var limite = currentConcept.length >= 34 ? 33: currentConcept.length;
  
  // definimos la variable donde se ingresaran los datos de atributos
  var $tdAttr = null;
  
  // se recorre cada una de las columnas 
  for(var i = 8; i < limite; i++){
  
    // validamos si el index de la columna no esta en el listado de las columnas que no deben
    if(notColumns.indexOf(i) == -1){
    
      // Validamos si si es elprimer atributo
      if(i == 8){
      
        // agregamos la nueva columna con el campo de cantidad
        $row.append(
          $("<td>").attr({class: "disable-select td-enabled-selection", style: "cursor: default !important;"}).data("valueSelected", currentConcept[i]).append(currentConcept[i])
        );
      
      } else {
        
        // creamos la columna
        $tdAttr = $("<td>").text(currentConcept[i]);
        
        // validamos que exista el valor
        if(String(currentConcept[i]).trim()){
          
          // agregamos el evento clic 
          $tdAttr.attr({"data-cellIndex": i, class: "disable-select td-enabled-selection"}).data({"valueSelected": currentConcept[i], "cellIndex": i}).click(toggleSelectionTd);
        }
        
        // agregamos la nueva columna con la opción de agregar el campo de cantidad
        $row.append($tdAttr);
      }
    }
  }
}

    });

  } else {
    
    //Mostramos el mensaje de error

      displayLength: 6000,

    });

}
/**
* Función que permite insertar una especie al momento de modificar
**/
function updateConceptByReplace(mainPanelId, $table, conceptData, conceptTotal, $row) {
  
  // obtenemos el cuerpo de la tabla
  var $tBody = $table.find("tbody");
  
  // validamos si la fila aun no existe
  if($row == null){
    // creamos la fila
    $row = $("<tr>").attr({class: "isValid"});
    
    // agregamos la fila al cuerpo de la tabla
    $tBody.append($row);
    
    // agregamos la nueva columna con el check
    $row.append(
      $("<tr>").attr({class: "isValid"}).data("conceptData", conceptData)
    );
  } else {
    
    // borramos las demas columnas que no necesito excepto la primera
    $row.find("td").remove();
    
  }
  
  // Agregamoas los datos a la fila o los actualizamos
  $row.data("conceptData", conceptData);
  
  // validamos si el tipo de unidad es diferente a "GRUPO"
  if(String(conceptData[4]).toLowerCase() != "grupo"){
    // creamos la fila para crear un campo de check
    $row.append(
      $("<td>").attr({style:"padding: 0px;", "class": "checkbox"}).append(
        $("<label>").append(
          $("<input>").attr({type: "checkbox", class: "filled-in ok"}).change({"table": $table}, changeCheckboxTable)

  // creamos la fila de: Nombre
  $row.append(
    $("<td>").attr({style:"padding: 0px;"}).text(conceptData[1])
  );
  
  // creamos la fila de: Unidad
  $row.append(
    $("<td>").attr({style:"padding: 0px;"}).text(conceptData[4])

  // obtenemos el nombre de la familia
  var currGender = SnvaJsApi.escapeRegExp(conceptData[8]);

    $row.append(
      $("<td>").attr({style:"padding: 0px;"}).append(
        $("<input>").attr({type: "text", pattern: "^[0-9]+(?:\.[0-9]{1,3}){0,1}$", style: "max-width: 80px;", value: conceptTotal}).focusin(showFormuleInField).focusout(processFormuleInField).on("keyup change", {price: String(conceptData[5]).replace(/\,|\$/g, "")}, calculateTotal).on("paste keypress", SnvaJsApi.validateNumberFormat)
      )
    );
  }
  
  // obtenemos el total
  var costFromConcept = Number(String(conceptData[5]).replace(/\$|\,/g, "")) || 0;
  
  // creamos la fila de: Costo unitario
  $row.append(
    $("<td>").attr({style:"padding: 0px;"}).text(SnvaJsApi.formatValue(costFromConcept))
  );
  
  // creamos la fila de: Total
  $row.append(
    $("<td>").attr({style:"padding: 0px;"}).text(SnvaJsApi.formatValue(SnvaJsApi.roundDecimal(costFromConcept * conceptTotal, 2)))
  );
  
  // Generamos el Id de l Popover
  var popoverId ="POP_" + SnvaJsApi.generateUUID();

  $row.append(
    $("<td>").attr({style:"padding: 0px;", class: "text-center"}).append(

          //$("<i>").attr("class", "material-icons").text("find_replace").click({"$row": $row, "currentData": conceptData, table: $table}, previewConceptSimilars)
          $("<i>").attr("class", "material-icons").text("find_replace").click({"panelId": "replaceConcept", "$row": $row, "currentData": conceptData, table: $table}, openModalSearchConcept)
        )

          $("<i>").attr("class", "material-icons").text("content_copy")
        ).data({$table: $table, mainPanelId: mainPanelId})
      )
  );
  
  // Establecemos el popover
  $("#" + popoverId).popover({

  if(target && target.type && target.type == "number"){

    return false;

  var $elem = $(this);

  // validamos que las etiquetas obligatorias como: "Pza Entrada", "Pza Salida", "Transición Interior" y "unión exterior" ya esten seleccionadas
  if(isLabelSelected() || cellIndex == 9){

/**
 * Función que permite agregar la opción dentro de la celda del atributo
**/
function addAttrInCell($elem, cellIndex, valueCount){
  
  // removemos el contenedor div.item-group-number
  $elem.find("div.item-group-number").remove();
  
  // obtenemos la cantidad de campos de numero
  var counter = $("#tblAddNewGroup .item-group-number").length;
  
  // validamos si ya tiene la clase "td-selected-group"
  if(!$elem.hasClass("td-selected-group")) {
  
    // Definimos los atributos del input
    var attrInput = {
      class: "input-group-number",
      min: 4,
      type: "number",
      value: (counter + 1)
    };
    
    // validamos si 
    
    // validamos si el index de la celda es: 9, 19, 20 o si el valor que se debe parametrizar es pasado como parametro
    if(cellIndex == 9 || cellIndex == 19 || cellIndex == 20 || valueCount){
    
      // se valida si es material
      if(cellIndex == 9){
      
        // cambiamos el valor del campo
        attrInput.value = 1;
        
        // definimos el minimo en 1
        attrInput.min = 1;
        
      } else if(valueCount){
        
        // cambiamos el valor del campo
        attrInput.value = valueCount;
        
        // propiedad que tienen los atributos asociados a PZA entrada y salida
        attrInput["data-reference"] = valueCount;
        
        // definimos el minimo en 1
        attrInput.min = 1;
        
      }
      
      // agregamos el atributo disabled
      attrInput.disabled = true;
      
      // obtenemos la posición de la columnas
      var position = $elem.index();
      
      // validamos que el valor no sea 2 o 3
      if(attrInput.value != 2 && attrInput.value != 3){
        
        // removemos los items anteriores por si existen
        $("#tblAddNewGroup tbody tr:not(.info-message)").each(function(){
        
          // removemos el elemento 
          $(this).find("td:eq(" + position + ")").removeClass("disabled-events").removeClass("td-selected-group").find("div.item-group-number").remove();
        
        });
        
        // agregamos la clase para deshabilitar el evento click
        $elem.addClass("disabled-events");
      }
    
    }
    
    // aumentamos el contador en 1
    counter ++;
    
    // variable para guardar el input
    var $input = $("<input>").attr(attrInput).on("keyup change", manageAttributes);
    
    // creamos el contenedor
    $elem.prepend(
      $("<div>").attr({class: "item-group-number"}).append($input)
    );
    
    // actualizamos los atributos
    manageAttributes();
  }
  
  // actualizamos el maximo de los campos y emulamos el evento change del campo
  $("#tblAddNewGroup .item-group-number .input-group-number").change().attr({max: counter});
  
  // cambiamos de clase
  $elem.toggleClass("td-selected-group");
}
