  /**
   * Permite habilitar el autocompletado del campo de especies en el modal de busqueda
  **/
  function addAutocompleteSpecies($input, conceptList){
    
    // Variable para usar como data de una especie
    var initData = getItemAutocompleteSpecies(conceptList, "");
    
    // Agregamos el evento al campos de busqueda de especies
    $input.autocomplete({
      data: initData,
      //minLength: 3,
      onAutocomplete: function(e){
        $input.trigger("keyup");
      }
    });
    
    // Agregamos el evento para que cuandto se realice un cambio
    $input.off("keyup").on("keyup", function(e){
      
      // obtenemos el código
      var keyCode = e.keyCode;
      //$input.popover("destroy");
      // Se valida que sea diferente a las teclas de dirección o al enter o (*)
      if([187, 13, 37, 38, 39, 40].indexOf(keyCode) == -1){
      
        // obtenemos el valor actual
        var currValue = $input.val();
        
        // Se referencia la instancia del autocomplete
        var instance = M.Autocomplete.getInstance($input[0]);
        
        // Se valida si existe la instancia
        if(instance){
          
          // obtenemos los datos
          initData = getItemAutocompleteSpecies(conceptList, currValue);
          
          // Actualizamos las sugerencias
          instance.updateData(initData);
          
          // se valida si existe sugerencias
          if(Object.keys(initData).length > 1 || (Object.keys(initData).length == 1 && initData[currValue] !== null)){
            
            // Mostramos el buscador
            instance.open();
          }
        }
      }
    });
    
    // Mostramos el popover
    $input.popover({
      title: 'Agregar comodín',
      trigger: 'custom_specie',
      placement: 'bottomLeft',
      content: function(){
     
        // Retornamos el listado actualizado 
        return getComodinListPopover($input, conceptList); 
      }
    });
    
  }
  
  // Adicionamos el evento pal boton de aceptar con la clase "btn__add-commodin"
  $(document).on('click', 'button.btn__add-commodin', function(event) {
  
  	// obtenemos el id del campo
    var fieldId = $(this).attr("data-input");
    
    // obtenemos el id del campo donde debemos de cambiar los valores
    var $input = $("#" + fieldId);
    
    // Refernciamos el contendor
    var $content = $("select.list__comoddin-data").parent();
    
    // obtenemos el valor del comodin y del valor
    var formData = {
      property: $("select.list__comoddin-data").val(),
      value: $("select.list__comoddin-values").val()
    };
    
    // ocultamos el mensaje de erroro
    manageErrorPopoverSpecie($content, false);
    
    // validamos si existe la propiedad seleccionada
    if(formData.property == "" || formData.value == ""){
      
      // mostramos el mensaje en el popover
      manageErrorPopoverSpecie($content, true, formData.property == "" ? "Se debe de seleccionar un comodín." : "Se debe de seleccionar el valor del comodín.");
      
    } else {
    
      // obtenemos el valor actual del campo
      var currValueField = $input.val().replace(/\*$/g, " ");
      
      // agregamos el comodin
      currValueField += "${" + formData.property + "=" + formData.value + "}";
      
      // insertamos el nuevo valor
      $input.val(currValueField);
      
      // se garantiza que no exista ningun panel abiertp
      document.querySelectorAll('.popover__open').forEach(function(element) {
        element.click();
      });
    }
  });

  /**
   * Permite mostrar u ocultar el error
  **/
  function manageErrorPopoverSpecie($content, isShow, message){
    
    // referenciamos el contenedor del error
    var $errorContent = $content.find(".popover__error-content").html(message || '');
    
    // se valida si se debe mostrar
    if(isShow){
      $errorContent.show();
    } else {
      $errorContent.hide();
    }
  }
  
  
  /**
   * Permite obtener los valores del campo "data-values y mostrarlo en el siguiente campo de tipo select"
  **/
  function updateValuesCommodin(){
    
    // referenciamos el campos acrual
    var $element = $(this);
    
    // obtenemos la lista de valores
    var valuesList = [];
    
    // obtenemos los valores de la opción respectiva
    var dataValues = $element.find("option:selected").attr("data-values");
    
    // validamos si existe valores
    if(dataValues){
      
      // Convertimos el texto en array
      valuesList = String(dataValues).split(",");
    }
    
    // referenciamos el campo de valores
    var $selectValues = $element.parent().find("select.list__comoddin-values");
    
    // Incializamos el campo de valores de comodines
    $selectValues.html('<option value="">-- Seleccione un valor --</option>');
    
    // recorremos cada una de las opciones
    for(var i = 0; i < valuesList.length; i++){
      
      // Agregamos la opción respectiva
      $selectValues.append(
        $("<option>").attr("value", valuesList[i]).text(valuesList[i])
      );
    }
    
  }
  
  /**
   * Permite obtener los grupos actuales como objeto
  **/
  function getCommodinsObject(currValue){
    
    // obtenemos los grupos actuales
    var currGroups = currValue.match(/(?:\${.*?})/g);
    
    // definimos el objeto actual
    var currOptions = {}, tempMatch = null;
    
    // se valida si ya existen grupos
    if(currGroups != null){
      
      // recorre cada uno de los grupos
      for(var i = 0; i < currGroups.length; i++){
      
        // se obtiene el valor y la propiedad
      	tempMatch = currGroups[i].match(/(?:\{(.*?)=(.*?)})/);
        
        // se valida si es valido el grupo
        if(tempMatch != null){
          
          // Agregamos la nueva propiedad y valor
          currOptions[tempMatch[1]] = tempMatch[2];
          
        }
      }
    }
    
    // retornamos los datos
    return currOptions;
    
  }
  
  /**
   * Permite consultar la lista de comodines
  **/
  function getComodinListPopover($element, conceptList){
    
    
    /*Modificación por @ Antonio Cespedes  <dirtic@hidro.expert> */
    // obtenemos el valor del departamento, familia y palabra clave
    var formDataFilters = {
      departament: $("#txtDepartmentSearch").val(),
      family: $("#txtFamilySearch").val(),
      keyWord: $("#txtKeywordSearch").val()
    };
    /* termina modificación */
 
    // obtenemos el valor actual
    var currValue = String($element.val()).trim();
    
    // definimos el objeto actual
    var currOptions = getCommodinsObject(currValue);
    
    // obtenemos la lista de comodines
    var comodineList = getComodinesList(conceptList, currValue, currOptions, formDataFilters);

    // definimos el contenedor
    var $content = $("<div>").html('<div class="popover__error-content" style="display:none;"></div>');
    
    // creamos el select del comodín
    var $comodin = $("<select>").attr({class: "form__control-field list__comoddin-data"}).html('<option value="">-- Seleccione un comodín --</option>');
    
    // obtenemos las claves organizadas
    var sortKeys = Object.keys(comodineList).sort();
    
    // Se recorre cada uno de los items
    for(var index = 0; index < sortKeys.length; index++){
      
      /*Modificación por @ Antonio Cespedes  <dirtic@hidro.expert> */
      // obtenemos los valores del select para separarlos y organizarlos
      var dataValues = comodineList[sortKeys[index]].toString();
      
      // guardamos en un array los valores separados por coma, para ordenarlos
      dataValues = dataValues.split(",");
      
      // declaramos nuestro array asociativo
      var dataValuesArr = [];
      var numbers = 0;
      var strings = 0;
      
      dataValues.forEach(value => {        
               
        // Obtenemos el valor numerico dentro de value
        let relativeValue = extractNumber(value);
        
        let newValueinArray = [];
        
        if (relativeValue>0){
          newValueinArray = {
            "label": value,
            "numeric_value": Number(relativeValue)
          }
          numbers++;
        } else {
          newValueinArray = {
            "label": value,
            "numeric_value": value
          }
          strings++;
        }
        
        // Agregamos el objeto al array
        dataValuesArr.push(newValueinArray);
        
      });

      // ordenamos los valores en funcion de su valor numerico
      // Si generalmente son numeros los ordenamos por valor numerico 
      if(numbers>=strings){
        dataValuesArr.sort(function (x, y) {
            return x.numeric_value - y.numeric_value;
        });
      } else {
        dataValuesArr.sort(function (x, y) {
            let a = x.label.toUpperCase(),
                b = y.label.toUpperCase();
            return a == b ? 0 : a > b ? 1 : -1;
        });
      }    
      
            
      // declaramos variable de salida para impresión dentro del data-values del combo
      var dataValuesTxt = "";
      dataValuesArr.forEach(el => {
        if (dataValuesTxt == ""){
          dataValuesTxt = el.label;
        }else{
          dataValuesTxt = dataValuesTxt+","+el.label;
        }
      });  
      
      /* termina modificación*/
      
      // Agregamos la opción

  /**
  * Antonio Cespedes <dirtic@hidro.expert
  * Esta función extrae un numero de un texto para asignar valor
  **/
  function extractNumber(str) {
    
    var doubleNumber = Number(str.replace(/[^0-9\.]+/g,""));
    
    var fractionNumber = str.match(/(?:[1-9][0-9]*|0)\/[1-9][0-9]*|((?:[1-9][0-9]*|0)-(?:[1-9][0-9]*|0)\/[1-9][0-9]*)/g,"");
    
    // es numero fraccion o double
    if(fractionNumber){    
      // Conseguir el valor absoluto de esta fracción.
      // Dividimos el string por -, esto indica que tiene un numero entero a la izquierda.
      var disolveFraccion = fractionNumber[0].split("-");
      var absoluteValue = 0;
      
      if(disolveFraccion.length>1){        
        var absoluteDecimalArr = disolveFraccion[1].split("/");
        var absoluteDecimalValue = absoluteDecimalArr[0]/absoluteDecimalArr[1];   
        absoluteValue = Number(disolveFraccion[0])+Number(absoluteDecimalValue);        
      }else{
        var absoluteDecimalArr = disolveFraccion[0].split("/");
        var absoluteDecimalValue = absoluteDecimalArr[0]/absoluteDecimalArr[1];   
        absoluteValue = Number(absoluteDecimalValue);   
      }      
      return absoluteValue;      
    }else{
      return doubleNumber;
    }   
    
  }
  
  /**
   * Permite obtener la lista de comodines y sus respectivos valores
  **/
  function getComodinesList(conceptList, currValue, currOptions, formDataFilters){

    // obtenemos el index desde donde empieza el ptimer comodin
    var startIndex = currValue.indexOf("${");
    
    // Se valida si existe comodines
    if(startIndex != -1){
    
      // eliminamos texto de comodines
      currValue = currValue.substring(0, startIndex);
    }
    
    // Reemplazamos el ultimo astetisco si existe
    currValue = currValue.replace(/\*$/g, "");
    
    // Variables temporales
    var currSpecieArray = null, returnData = {}, specieEscape = "";
    
    // verificamos la cadema para determinar caracter que requieres ser espacapddo
    specieEscape = SnvaJsApi.escapeRegExp(currValue);
    
    // Definimso las propiedade y columna de cada una de ellas
    var properties = getPropertiesComodin();
    
    // definimos el regexp
    var regExpValue = new RegExp("^(" + specieEscape + ")", "gi"), isValid = false, currComodin = {};
    
    var genderDataSelected = $("#pnlGenderSearch").data("genderData");
       
    // recorras cada uno de los conceptos
    for(var i = 0; i < conceptList.length; i++){
    
      /*Modificación por @ Antonio Cespedes  <dirtic@hidro.expert> */
      // En este punto podemos validar si existen conceptos que no estén dentro de los terminos preestablecidos para descartarlos.
      // Omitir por departamento seleccionado
      if (formDataFilters.departament && conceptList[i][0].toString() != formDataFilters.departament){
         continue;
      }
      
      // Omitir por familia seleccionada
      if (formDataFilters.family && conceptList[i][2].toString() != formDataFilters.family){
         continue;
      }     
      
      // omitir por gender
      var mustSkip = 0;
      
      if (genderDataSelected){
        for (var j = 0; j < genderDataSelected.length; j++){           
           if (conceptList[i][8].toString() != genderDataSelected[j]){
             mustSkip++;
           } else {
             mustSkip--;
           }        
        }
        
        if(mustSkip>0){
           continue;
        }
        
      }
      
      /*termina modificacion*/
      
      // partimos de que el registro es valido
      isValid = true;
      
      // se valida si curren values esta vacia
      if(currValue != "" && currValue != "*"){
        
        // obtenermos el grupo
        var matchValue = conceptList[i][1].toString().match(regExpValue);
       
        // validamos si el texto esta dentro de un de los concepros
        if(matchValue == null){
          
          // Establecemos falso por nos indica que no cumple con el inicio de un concepto
          isValid = false;
        }
      }
      
      // validamos con los comodines actuales
      isValid = isComodinValue(conceptList[i], currOptions, properties);
      
      // si el registro es valido
      if(isValid){
        
        // variable para colocar el valor actual del comodin
        var currTempValue = "";
        
        // recorremos cada uno de los tipos de comodines para agregarlos a la lista
        for(var property in properties){
          
          // Validamos si la propedad aun no existe
          if(!currOptions[property]){
          
            // Se obtiene el valor actual
            currTempValue = conceptList[i][properties[property]];
            
            // se valida que exista un valor
            if(currTempValue){
            
              // se valida si la propiedad aun no existe
              if(!returnData[property]){
                
                // Inicializamos la propiedad
                returnData[property] = [];
              }
              
              // se valida que aun no exista el valor en el comodin
              if(returnData[property].indexOf(currTempValue) == -1){
                
                // se agrega el valor
                returnData[property].push(currTempValue);
                
              }
            }
          }// Fin
          
        }
      }
    }

    // retornamos los datos
    return returnData;
  }
  
  /**
   * Se valida si pertenecce a uno de los grupos
  **/
  function isComodinValue(record, currOptions, properties){
    
    // Se recorre cada uno de los grupos actuales
    for(var key in currOptions){
      
      // se valida si la referncia de la propiedad existe
      if(properties[key] && record[properties[key]] != currOptions[key]){
        
        // retornamos false;
        return false;
        
      }
    }
    
    // se retorna el estado por defecto
    return true;
  }

/**
 * permite determinar los valores a mostrar ya sea en departamento, familia o palabra clave
**/
function definedValuesList(mainData, formData, currentProperty, currentValue){
  
  // definimos el objeto a retornar
  var returnObject = {
    departament: {},
    family: {},
    keyWord: {},
    gender: []
  };
  
  // recorremos cada uno de los registros
  for(var i = 0; i < mainData.length; i++){
    
    // validamos si la familia y palabra clave corresponde 
    if((!formData.departament || formData.departament == mainData[i][0]) && 
        (!formData.family || formData.family == mainData[i][2]) && 
        (!formData.keyWord || formData.keyWord == mainData[i][3])){
      
      if(mainData[i][0]) returnObject.departament[mainData[i][0]] = null;
      if(mainData[i][2]) returnObject.family[mainData[i][2]] = null;
      if(mainData[i][3]) returnObject.keyWord[mainData[i][3]] = null;
      
      // de valida que palabras claves se deben de agregar
      if((formData.departament || formData.family || formData.keyWord) && mainData[i][8] && returnObject.gender.indexOf(mainData[i][8]) == -1){
        returnObject.gender.push(mainData[i][8]);
      }
    }
    
  }
  
  // no se tiene en cuenta la propiedad del campo actual
  returnObject[currentProperty] = null;
  
  // retornamos loa datos
  return returnObject;
}

*/
function validateComunValues(ArrayTotal, newArray){
  let resultArray = [];
  // recorremos los valores del nuevo array
  for(var i = 0 ; i < newArray.length; i++){
    // validamos si los elementos del nuevo array se encuentran en el array Total
    if(ArrayTotal.indexOf(newArray[i]) != -1){
      // adicionamos los valores a un array auxiliar
      resultArray.push(newArray[i]);

  /**
   * Creamos la función que permite cambiar entre paneles
  **/
  function changePanel(e){
    
    // prevenimos el evento por defecto
    e.preventDefault();
    
    //validamos si esta creado el trigger de guardado automatico
    if((triggerAutoSaveRequest)){
    
      // Eliminamos la funcion que se ejecuta en el intervalo
      clearInterval(triggerAutoSaveRequest);
    
    }
    
    // obtenemos la referencia del elemento seleccionado
    var $element = $(this);
    
    // obtenemos el id del panel a mostrar
    var panelId = $element.attr("href");
    
    // Validamos si es el panenl principal
    if(panelId == "#ctn-projects"){
      
      // ocultamos el panel de creación
      $("#pnlCreateQuotation").hide();
      
      // borramos la propiedad del localStorage
      Lockr.rm("snva_temporal_data");
      
      //validamos si esta creado el trigger de guardado automatico
      if((triggerAutoSaveRequest)){
        
        // Eliminamos la funcion que se ejecuta en el intervalo
        clearInterval(triggerAutoSaveRequest);
      
      }
      
      // reseteamos el formulario
      resetCreateForm();
      
      // mostramos el panel de inicio
      $("#pnlMain").show();
      
    
    }
    
    // ocultamos los 2 paneles
    $("#ctn-projects, #ctn-renovation, #ctn-setting-line, #ctn-catalog").addClass("hidden");
    
    // removemos el active en las opciones
    $("a.options-menu").parent().removeClass("active");
    
    // agregamos la clase "active" en la opción elegida en ambos paneles
    $("a.options-menu[href='" + panelId + "']").parent().addClass("active")
    
    // mostramos el respectivo panel
    $(panelId).removeClass("hidden");
    
    // validanos si el panel de detalles de catálogo de especies se encuentra visible
    if($("#pnlCatalog").is(":visible")){
    
      // ocultamos el panel de edición del catálogo
      $("#pnlCatalog").hide();
      
      // Removemos la cantidad de estilo de scroll
      $("#ctnScroll")[0].style.height = "0px";
    }
    
    // referenciamos la instancia del menu
    var instanceMenu = M.Sidenav.getInstance($("#ctn-menu-fixed"));
    
    // cerramos el menu
    instanceMenu.close();
    
  }

  /**
   * Función que permite insertar cada uno de los registros de cot. en la tabla
   **/
  function insertRecordsFromTable(requestData) {
    
    // referenciamos la tabla de lista de cotizaciones
    var $table = $("#tblQuotationList");
    
    // obtenemos el cuerpo de la tabla
    var $tBody = $table.find("tbody");
    
    // restablecemos el contenido
    $tBody.html('<tr class="info-message" style="display: none;"><td colspan="9">No hay cotizaciones para mostrar</td></tr>');
    
    // variable para almacenar la referencia de la fila creada
    var $row = null;
    
    // variable para guardar la estructura
    var currentStructure = {};
    
    // recorremos cada uno de los datos
    for(var i = 0; i < requestData.length; i++){
      
      // obtenemos la estructura actual
      currentStructure = requestData[i].structures[requestData[i].mainSheetName] ? JSON.parse(requestData[i].structures[requestData[i].mainSheetName].structure) : {};
      
      // validamos que exista alguna propiedad
      if(Object.keys(currentStructure).length > 0){
      
        // creamos una nueva fila
        $row = $("<tr>").attr({class: "isValid"});
        
        // agregamos la fila al cuerpo de la tabla
        $tBody.append($row);
        
        // creamos la fila de: Seleccionar
        $row.append(
          $("<td>").attr({class: "text-center"}).append(
            $("<label>").append(
              $("<input>").attr({class: "with-gap", type: "radio", name: "radProject"}).data("requestData", requestData[i]).click({$table: $table}, enabledOption)
            ).append(
              $("<span>")
            )
          )
        );
        
        // creamos la fila de: Nombre del creador
        $row.append(
          $("<td>").text(requestData[i].applicant)
        );
        
        // creamos la fila de: RFC
        $row.append(
          $("<td>").text(currentStructure.federalRecord)
        );
        
        // creamos la fila de: Nombre del cliete
        $row.append(
          $("<td>").text(requestData[i].name)
        );
        
        // creamos la fila de: Tipo de sistema de riego
        $row.append(
          $("<td>").text(requestData[i].typeIrrigation)
        );
        
        // creamos la fila de: Ubicación del proyecto
        $row.append(
          $("<td>").text(requestData[i].location)
        );
        
        // creamos la fila de: Fecha de emisión
        $row.append(
          $("<td>").text(requestData[i].date)
        );
        
        // creamos la fila de: Oferta
        $row.append(
          $("<td>").text(SnvaJsApi.formatValue(requestData[i].proposal))
        );
        
        // definimos los atributos para la opción de abrir federal
        var federalAttr = {class: "btn-icon-table btn-floating blue waves-effect", href: "javascript:void(0)", title: "No existe cotización de federal", disabled: true};
        
        // se valida si existe el id de la cotización de federal
        if(requestData[i].federalFileId){
          
          // asignamos los atributos
          federalAttr = {class: "btn-icon-table btn-floating blue waves-effect", href: ("https://docs.google.com/document/d/" + requestData[i].federalFileId), target: "_blank", title: "Abrir cotización de federal"}
          
        }
        
        // creamos la fila de: acciones 
        $row.append(
          $("<td>").attr({class: "text-center td-project-options"}).append(
            $("<a>").attr({title: "Editar cotización", href: "javascript:void(0)", class: "btn-icon-table btn-floating orange waves-effect"}).append(
              $("<i>").attr("class", "material-icons").text("edit")
            ).click({requestData: requestData[i]}, modifyQuotation)
          )/*.append(
            $("<a>").attr({title: "Crear cotización de federal", href: "javascript:void(0)", class: "btn-icon-table btn-floating blue-gray waves-effect"}).append(
              $("<i>").attr("class", "material-icons").text("insert_drive_file")
            ).click({requestData: requestData[i]}, createCotFederal)
          )*/.append(
            $("<a>").attr({title: "Crear cotización de estatal", href: "javascript:void(0)", class: "btn-icon-table btn-floating blue-gray waves-effect"}).append(
              $("<i>").attr("class", "material-icons").text("insert_drive_file")
            ).click({requestData: requestData[i]}, createCotStatal_)
          ).append(
            $("<a>").attr({title: "Eliminar cotización", href: "javascript:void(0)", class: "btn-icon-table btn-floating red waves-effect"}).append(
              $("<i>").attr("class", "material-icons").text("delete")
            ).click({documentId: requestData[i].documentId, row: requestData[i].row, tableId: "tblQuotationList", paginationId: "ulPagination", module: "quotation"}, deleteQuotation)
          ).append(
            $("<a>").attr({class: "btn-icon-table btn-floating green waves-effect", href: ("https://docs.google.com/spreadsheets/d/" + requestData[i].documentId), target: "_blank", title: "Abrir cotización del proyecto"}).append(
              $("<i>").attr("class", "material-icons").text("open_in_new")
            )
          ).append(
            $("<a>").attr(federalAttr).append(
              $("<i>").attr("class", "material-icons").text("open_in_new")
            )
          )
        );
      }
      
    }
    
    // deshabilitamos el boton de generar cotización a partir de otra
    $("#btnCreateCotByOther").attr({disabled: true});
    
    // iniciaizamos el paginador
    SnvaJsApi.initPaginationByTable($table, "ulPagination", 10);
    
  }

    // validamos que e sea diferente de null
    if(e != null){
    
      // prevenimos el evento por defecto
      e.preventDefault();
    }

      }

  /**
   * Función que permite validar que sea un vínculo de tipo spreadSheet
  **/
  function validateUrlSpreadsheet(url){
  
    // Obtenemos el id de la url
    var urlInfo = url.match(/\/d\/(.*?)\//);
    
    // se valida si existe el id
    if(urlInfo && urlInfo.length > 1){
      
      // retornamos verdadero
      return true;
    }
    
    // se retorna por defecto falso
    return false;
  }

    e.preventDefault();
    
    // Mostramos el loading
    SnvaJsApi.manageLoading("block", "Habilitando la cotización en modo de edición...");

    // obtenemos todas las structuras
    var allStructures = requestData.structures;
    
    // obtenemos la estructura que debemos revisar y el nombre de la hoja
    var currentStructure = allStructures[requestData.mainSheetName].structure;

      resetCreateForm();

      // mostramos el panel de seleccionar carpeta
      $("#ctnLink").closest("div.panel-primary").hide();

      $("#frmCreateQuotation").data({consecutive: requestData.id, "action": "modification", "rowIndex": requestData.row, "documentId": requestData.documentId, "lastRow": objectData.lastRow});
      
      // agregamos cada uno de los campos al formulario
      addDataToForm(objectData.currentData);

      });

  /**
   * Función que permite agregar las opciones en el select de Versión
  **/
  function updateVersionList($select, sheets, structures, defaultSheet){
    
    // variable para definir los atributos
    var attrs = {};
    
    // recorremos la cantidad de hojas
    for(var i = 0; i < sheets.length; i++){
      
      // definimos los atributos por defecto
      attrs = {value: sheets[i]};
      
      // validamos si el nombre de la hoja actual es igual a la que se pasas por defecto
      if(sheets[i] == defaultSheet){
        
        // agregamos el atributo de selección
        attrs["selected"] = true;
        
      }
      
      // agregamos la opción
      $select.append(
        $("<option>").attr(attrs).data("sheetsData", structures[sheets[i]]).text(sheets[i])
      );
      
    }
    
    // actualizamos el select
    $select.formSelect();
    
  }
  
  /**
   * Función que permite realizar una acción al momento de cerrap un colapsable
  **/
  function collapsibleCloseEvent(event){
    
    // referenciamos el contenedor
    var $content = $(this.el);
    
    // obtenemos los id de referencia para mostrar la info cuando se oculte el panel
    var reference = String($content.attr("data-reference"));
    
    // validamos si exite datos
    if(reference){
      
      // convertimos en array los campos de referencia
      var referenceArray = reference.split(",");
      
      // variable para guardar la información
      var values = [];
      
      // recorremos el listado
      referenceArray.forEach(function(fieldId){
        
        // obtenemos el valor actual
        var currentValue = (fieldId == "#allOrderTotal" ? $(fieldId).text() : $(fieldId).val());
        
        // tiene un valor
        if(currentValue){
          
          // agregamos el valor al listado
          values.push(currentValue);
        }
        
      });
      
      // agregamos la información del campo de referencia
      $content.find("span.spnDetailsCollapsible").text(values.toString());
      
    }
    
  }
  
  /**
   * Función que permite realizar una acción al momento de abrir un colapsable
  **/
  function collapsibleOpenEvent(e){
    
    // referenciamos el contenedor
    var $content = $(this.el);
    
    // restablecemos el valor
    $content.find("span.spnDetailsCollapsible").text("");
    
  }
  
  /**
   * Función que permite agregar los valores en el formulario de creación
  **/
  function addDataToForm(arrayData){
    
    //############# PLAZOS ############
    // referenciamos la instancia del campo de fecha
    var instancePicker = M.Datepicker.getInstance($("#txtIssue"));
    
    //############# Nombre del proyecto ############
    // Agregamos el detalle de nombre del proyecto
    $("ul.panel-collapsible:nth-child(5) span.spnDetailsCollapsible").text(arrayData.formEmission);
    
    // Referenciamos el select
    var $comunNane = $("#sltComunNameNew"), comunNane = '';
    
    // Obtenemos los datos de información de columnName
    var comunNameList = $comunNane.data('comunNameList') || [];
  
     // recorremos cada uno de los registros para validar cual pertenece a nombre general de acuerdo al sistema, clasificación, etc
    for(var i = 0; i < comunNameList.length; i++){
    
      // agregamos cada una de las opciones
      if(arrayData.systemClasification == comunNameList[i].clasification && arrayData.systemType == comunNameList[i].systemType && arrayData.formEmission == comunNameList[i].emmisionForm && arrayData.features == comunNameList[i].features){
        
        // obtenemos el nombre de este grupo
        comunNane = comunNameList[i].comunName;
        
        // Salimos del ciclo
        break;
      }
    }
    
    // agregamos el dato del nombre comun
    $comunNane.val(comunNane);
    
    $("#sltCultivation").val(arrayData.cultive); // agregamos el dato del cultivo
    $("#txtSurface").val(arrayData.surface); // agregamos el dato de la superficie
    
    // obtenemos el array de la fecha
    var issueArray = String(arrayData.issue).split("/");
    
    try{
      // establecemos la fecha actual
      instancePicker.setDate(new Date(issueArray[1] + "/" + issueArray[0] + "/" + issueArray[2]));
    }catch(e){}
    
    // Agregamos el detalle de plazos
    $("ul.panel-collapsible:nth-child(1) span.spnDetailsCollapsible").text(arrayData.issue);
    
    $("#txtIssue").val(arrayData.issue); // agregamos el dato fecha de emisión
    $("#txtValidity").val(arrayData.validity); // agregamos el dato de vigencia
    $("#txtExecution").val(arrayData.execution); // agregamos el dato de ejecución
    
    //############# Razon social del solicitante ############
    // Agregamos el detalle de razon social
    $("ul.panel-collapsible:nth-child(2) span.spnDetailsCollapsible").text(arrayData.client);
    
    $("#txtClient").val(arrayData.client); // agregamos el dato de nombre
    $("#txtFederalRecod").val(arrayData.federalRecord); // agregamos el dato de registro federal
    $("#txtAgent").val(arrayData.agent); // agregamos el dato del representante
    $("#txtFiscalResidence").val(arrayData.fiscalRecidence); // agregamos el dato del domicilio fiscal
    
    //############# Ubicación del proyecto ############
    // Agregamos el detalle de ubicación del proyecto
    $("ul.panel-collapsible:nth-child(3) span.spnDetailsCollapsible").text(arrayData.municipality + ", " + arrayData.location);
    
    $("#sltState").val(arrayData.state); // agregamos el dato estado y emulamos el evento para que obtenga el valor
    $("#sltMunicipality").data("tempValue", arrayData.municipality); // agregamos el dato de municipio
    $("#sltLocation").data("tempValue", arrayData.location); // agregamos el dato de localidad
    
    //############# Georeferencia ############
    $("#txtLatitude").val(arrayData.latitude); // agregamos el dato latitud
    $("#txtLongitude").val(arrayData.longitude); // agregamos el dato de longitud
    
    //############# Generación de presupuesto ############
    $("#sltProyectClass").val(arrayData.projectClass); // agregamos el dato de clase de proyecto y emulamos el evento de cambio
    
    // agregamos la propiedad en el contenedor de orden de proyecto, la cual detemina que debe agregar algun valor
    $("#ctnOrdersPanels").data("orderProjects", arrayData.orderProjects);
    
    // actualizamos los campos
    M.updateTextFields();
  }
  
  /**
   * Función que permite eliminar una cotización
  **/
  function deleteQuotation(e){
    
    // Se previene el evento por defecto
    e.preventDefault();
    
    // referenciamos el id del documento cotización
    var documentId = e.data.documentId;
    
    // referenciamos el id de la tabla donde se desea eliminar el registro    
    var tableId = e.data.tableId;
    
    // referenciamos el id del paginador donde se desea eliminar la fila
    var paginationId = e.data.paginationId;
    
    // referenciamos la fila de la cotización en la hoja de cálculo
    var row = e.data.row;
    
    // referenciamos el tipo de módulo del que accede
    var module = e.data.module;
    
    // referenciamos la fila donde se encuentra el usuario
    var $currentRow = $(this).closest("tr");
        
    // mostramos mensaje de confirmación antes de proceder a eliminar la cotización
    SnvaJsApi.confirm("¿Seguro desea eliminar esta cotización?", function(){
     
      // mostramos el loading
      SnvaJsApi.manageLoading("block", "Eliminando el cotización...");
      
      //Invocamos a la función que trae del servidor los datos de las carpetas hijas de la carpeta principal y sus respectivos archivos
      google.script.run.withSuccessHandler(function(response){
      
        // eliminamos la fila
        $currentRow.remove();
        
        // referenciamos el paginador 
        var $pagination = $("#" + paginationId);
        
        // Obtenemos el numero de la pagina 
        var pageNumberActive = $pagination.find("li.active").text();
        
        // iniciaizamos el paginador
        SnvaJsApi.initPaginationByTable($("#" + tableId), paginationId, 10);
        
        // Validamos la cantidad de paginas se encuentre entre la pagina activa
        if(pageNumberActive > ($pagination.find("li").length - 2)){
          
          // Le restamos una pagina 
          pageNumberActive = Number(pageNumberActive) -1;
        }
        
        // Simulamos el click en la pagina       
        $pagination.find("li:eq(" + pageNumberActive + ") a").click();


        // Ocultamos el loading
        SnvaJsApi.manageLoading("none", "Espera un momento por favor...");
        
        // mostramos el respectivo mensaje
        SnvaJsApi.showAlert("Cotización eliminada satisfactoriamente.");
      
      }).withFailureHandler(SnvaJsApi.onFailure).deleteQuotation(documentId, row, module);
      
    });
    
  }

  /**
   * Función que permite iniciar el paginador 
   **/
  function searchByTable(e) {
    
    // referenciamos el id de la tabla
    var tableId = e.data.tableId;
    
    // referenciamos el id del paginador
    var paginationId = e.data.paginationId;
    
    // removemos los acentos
    var text = SnvaJsApi.removeLatinSymbols($(this).val().trim()).toLowerCase(),
      currentText = "",
      $currentRow = null;

    // recorremos las filas actuales de la tabla
    $("#" + tableId + " tbody tr").each(function() {

      // referenciamos la fila recorrida
      $currentRow = $(this);

      // obtenemos el texto actual de la fila
      currentText = SnvaJsApi.removeLatinSymbols($currentRow.text()).toLowerCase();
      
      // validamos si el texto ingresado por el usuario equivale a una de las filas
      if (currentText.indexOf(text) != -1) {
  
        // mostramos la fila
        $currentRow.addClass("isValid");

      } else {
        // ocultamos la fila
        $currentRow.removeClass("isValid");
      }

    });

    // iniciamos el paginador de la tabla respectiva
    SnvaJsApi.initPaginationByTable($("#" + tableId), paginationId, 10);

  }
