<style>

/* Overlay */
.qcmd__sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 9899;
  cursor: pointer;
}
.qcmd__sidebar-overlay--visible {
  display: block;
}

/* Sidebar container */
.qcmd__sidebar {
  position: fixed;
  top: 0;
  left: -520px;
  width: 500px;
  max-width: 96vw;
  height: 100vh;
  background: #fff;
  z-index: 9900;
  box-shadow: 4px 0 28px rgba(0,0,0,.16);
  display: flex;
  flex-direction: column;
  transition: right .35s cubic-bezier(.4,0,.2,1);
  font-family: 'Roboto', sans-serif;
}

.qcmd__toast {
  z-index: 9901;
}

.qcmd__sidebar--open {
  left: 0;
}

/* Header */
.qcmd__sidebar-header {
  background-color: var(--main-color);
  color: #fff;
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.qcmd__sidebar-title {
  margin: 0;
  flex: 1;
  font-size: 17px;
  font-weight: 500;
  letter-spacing: .3px;
}
.qcmd__sidebar-close {
  background: rgba(255,255,255,.15);
  border: none;
  color: #fff;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .2s;
  padding: 0;
}
.qcmd__sidebar-close:hover {
  background: rgba(255,255,255,.3);
}

/* Tabs */
.qcmd__tabs {
  display: flex;
  border-bottom: 2px solid #E3F2FD;
  background: #F8FBFF;
  flex-shrink: 0;
}
.qcmd__tab {
  flex: 1;
  padding: 12px 8px;
  text-align: center;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: #78909C;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: color .2s, border-color .2s;
  position: relative;
  user-select: none;
}
.qcmd__tab .material-icons {
  font-size: 16px;
}
.qcmd__tab:hover {
  color: #1976D2;
}
.qcmd__tab--active {
  color: #1976D2;
  border-bottom-color: #1976D2;
}
.qcmd__tab-badge {
  background: #E53935;
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  border-radius: 10px;
  padding: 1px 6px;
  min-width: 18px;
  text-align: center;
  line-height: 16px;
}

/* Body */
.qcmd__sidebar-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
}
.qcmd__sidebar-body--hidden {
  display: none;
}

/* Categories */
.qcmd__category {
  background: #fff;
  border: 1px solid #E3F2FD;
  border-radius: 8px;
  margin-bottom: 14px;
  overflow: hidden;
}
.qcmd__category-header {
  background: #E8F4FD;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 700;
  color: #1565C0;
  letter-spacing: .4px;
  text-transform: uppercase;
}
.qcmd__category-icon {
  font-size: 16px !important;
}

/* Grid */
.qcmd__grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 14px;
}
.qcmd__field {
  display: flex;
  flex-direction: column;
}
.qcmd__field--full {
  grid-column: 1 / -1;
}

.qcmd__input--subtext {
  display: flex;
  align-items: center;
  justify-items: center;
  font-size: 12px;
  margin-top: 0.4rem;
  color: #646464;
  line-height: 14px;
}

.qcmd__input--subtext p{
  color: #646464;
}

.qcmd__input--subtext i{
  font-size: 14px;
  margin-right: 2px;
  color: var(--secundary-color);
}

/* Labels */
.qcmd__label {
  font-size: 11px;
  font-weight: 600;
  color: #546E7A;
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: .4px;
}

/* Inputs and selects */
.qcmd__select,
.qcmd__input {
  width: 100%;
  border: 1.5px solid #CFD8DC !important;
  border-radius: 5px !important;
  padding: 8px 10px !important;
  font-size: 13px !important;
  height: auto !important;
  margin: 0 !important;
  box-sizing: border-box;
  background: #FAFCFF;
  color: #263238;
  transition: border-color .2s, box-shadow .2s;
}
.qcmd__select:focus,
.qcmd__input:focus {
  border-color: #1976D2 !important;
  box-shadow: 0 0 0 3px rgba(25,118,210,.1) !important;
  outline: none;
  background: #fff;
}

/* Footer */
.qcmd__sidebar-footer {
  border-top: 1px solid #ECEFF1;
  padding: 12px 20px;
  background: #F8FBFF;
  flex-shrink: 0;
}
.qcmd__sidebar-footer > div {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  align-items: center;
}

/* Buttons */
.qcmd__btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 18px;
  border-radius: 5px;
  border: none;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  letter-spacing: .3px;
}
.qcmd__btn .material-icons {
  font-size: 16px;
}
.qcmd__btn--flat {
  background: transparent;
  color: #607D8B;
  border: 1.5px solid #CFD8DC;
}
.qcmd__btn--flat:hover {
  background: #ECEFF1;
}
.qcmd__btn--primary {
  background: var(--main-color);
  color: #fff;
  box-shadow: 0 2px 6px rgba(25,118,210,.3);
}
.qcmd__btn--primary:hover {
  background: var(--secundary-color);
}
.qcmd__btn--success {
  background: #388E3C;
  color: #fff;
  box-shadow: 0 2px 6px rgba(56,142,60,.3);
}
.qcmd__btn--success:hover {
  background: #2E7D32;
}

/* Crossing list items */
.qcmd__crossing-item {
  border: 1px solid #E3F2FD;
  border-left: 4px solid #1976D2;
  border-radius: 6px;
  padding: 12px 14px;
  margin-bottom: 10px;
  background: #fff;
  transition: box-shadow .2s;
}
.qcmd__crossing-item:hover {
  box-shadow: 0 3px 10px rgba(25,118,210,.12);
}
.qcmd__crossing-item-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.qcmd__crossing-item-title {
  font-size: 13px;
  font-weight: 700;
  color: #1565C0;
}
.qcmd__crossing-item-actions {
  display: flex;
  gap: 4px;
}
.qcmd__crossing-item-meta {
  font-size: 12px;
  color: #607D8B;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

/* Meta tags */
.qcmd__meta-tag {
  background: #E3F2FD;
  color: #1565C0;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 500;
}

/* Icon buttons */
.qcmd__icon-btn {
  background: transparent;
  border: none;
  color: #90A4AE;
  cursor: pointer;
  border-radius: 50%;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s, color .15s;
  padding: 0;
}
.qcmd__icon-btn .material-icons {
  font-size: 16px;
}
.qcmd__icon-btn--clone:hover  { background: #E3F2FD; color: #1976D2; }
.qcmd__icon-btn--edit:hover   { background: #FFF8E1; color: #F57F17; }
.qcmd__icon-btn--delete:hover { background: #FFEBEE; color: #C62828; }

/* Empty state */
.qcmd__empty {
  text-align: center;
  padding: 30px 16px;
  color: #90A4AE;
}
.qcmd__empty-icon {
  font-size: 48px !important;
  color: #B0BEC5;
  margin-bottom: 10px;
}
.qcmd__empty p {
  margin: 4px 0;
  font-size: 13px;
}
.qcmd__empty-hint {
  font-size: 12px !important;
  color: #B0BEC5;
}
.qcmd__empty-hint strong {
  color: #1976D2;
}

#qcmdListItems {
  padding: 4px 2px; /* Un pequeño margen interno adicional */
}

/* Crossing list items - Unificado a 'crucero' para coincidir con el JS */
.qcmd__crucero-item {
  border: 1px solid #E3F2FD;
  border-left: 4px solid #1976D2;
  border-radius: 6px;
  padding: 12px 14px;
  margin-bottom: 12px; /* Aumentamos un poco el espacio entre tarjetas */
  margin-right: 2px;   /* Evita que el shadow se corte en algunos navegadores */
  margin-left: 2px;    /* Centra visualmente la tarjeta */
  background: #fff;
  transition: box-shadow .2s, transform .2s;
}
.qcmd__crucero-item:hover {
  box-shadow: 0 4px 12px rgba(25,118,210,0.15);
  transform: translateY(-1px);
}
.qcmd__crucero-item-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.qcmd__crucero-item-title {
  font-size: 13px;
  font-weight: 700;
  color: #1565C0;
}
.qcmd__crucero-item-actions {
  display: flex;
  gap: 6px;
}
.qcmd__crucero-item-meta {
  font-size: 12px;
  color: #607D8B;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

/* Panel de Alerta */
.qcmd__alert {
  background-color: #FDEDEC;
  border: 1px solid #FADBD8;
  border-left: 4px solid #E53935;
  color: #7B241C;
  padding: 12px 16px;
  border-radius: 6px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  font-weight: 500;
}
.qcmd__alert i {
  font-size: 18px;
  color: #E53935;
}

/* Estado de error en campos */
.qcmd__field--error .qcmd__label {
  color: #E53935 !important;
}
.qcmd__field--error .qcmd__input,
.qcmd__field--error .qcmd__select {
  border-color: #E53935 !important;
  background-color: #FDEDEC !important;
}

.qcmd__alert-list {
  margin: 5px 0 0 24px;
  padding: 0;
  list-style-type: disc;
}
.qcmd__alert-list li {
  margin-bottom: 2px;
  list-style-type: initial !important;
}

.qcmd__table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}
.qcmd__table th, .qcmd__table td {
  padding: 8px 4px;
  border-bottom: 1px solid #eee;
  text-align: left;
}
.qcmd__table th {
  font-size: 0.8rem;
  color: #666;
  text-transform: uppercase;
}

.qcmd__table td {
  font-size: 0.75rem;
}

.qcmd-add-single {
  color: #2e7d32;
  background: none;
  border: none;
  cursor: pointer;
}

/* Alineación para checkboxes dentro de tablas en el sidebar */
#qcmdPanelMaterials table td label,
#qcmdPanelMaterials table th label {
  display: flex;
  align-items: center;
  padding-left: 5px;
}

/* Evita que el texto de la tabla se vea muy grande */
#qcmdMaterialsListBody td,
#qcmdMaterialsListBody th {
  padding: 5px;
  vertical-align: middle;
}
</style>
