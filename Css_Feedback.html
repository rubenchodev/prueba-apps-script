<style>
.snva-mdl-feedback *, .snva-mdl-feedback ::after, .snva-mdl-feedback ::before {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
.snva-mdl-feedback,
.snva-mdl-alert {
  position: fixed; /* Stay in place */
  padding-top: 1.2em; /* Location of the box */
  left: 0;
  top: 0;
  width: 100%; /* Full width */
  height: 100%; /* Full height */
  overflow: auto; /* Enable scroll if needed */
  background-color: rgb(0,0,0); /* Fallback color */
  background-color: rgba(0,0,0,0.50); /* Black w/ opacity */
  font-family: sans-serif; 
}

.snva-mdl-feedback{    
    z-index: 99999998; /* Sit on top */    
    display: none; /* Hidden by default */
}

.snva-mdl-alert {    
    z-index: 99999999; /* Sit on top */
}

.snva-mdl-content{
    position: relative;
    background-color: #fefefe;
    margin: auto;
    padding: 0;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2),0 6px 20px 0 rgba(0,0,0,0.19);
    -webkit-animation-name: snva_animatetop;
    -webkit-animation-duration: 0.4s;
    animation-name: snva_animatetop;
    animation-duration: 0.4s;
    font-family: sans-serif;
}

/* Add Animation */
@-webkit-keyframes snva_animatetop {
    from {top:-300px; opacity:0} 
    to {top:0; opacity:1}
}

@keyframes snva_animatetop {
    from {top:-300px; opacity:0}
    to {top:0; opacity:1}
}

.snva-mdl-content .snva-mdl-header{
    padding: 4px 0.7em;
    background-color:#07788a; /* rgb(84, 110, 122);*/
    box-sizing: border-box;
    color: #ffffff;
}

.snva-alert-error .snva-mdl-header{
    background-color:#e4711f !important; /* rgb(84, 110, 122);*/
}

.snva-mdl-content .snva-mdl-header h2{
    margin: 10px 6px 10px 0px;
    font-size: 1.2em;
    font-family: sans-serif;
    font-weight: 500;
    line-height: 1.2;
}

/* Estilos para la opción de cerrar */
.snva-mdl-content .snva-mdl-header-close {
    color: #ffffff;
    float: right;
    font-size: 22px;
    font-weight: bold;
    font-family: sans-serif;
    margin-top: 6px;
    line-height: 1.5;
}
  
.snva-mdl-content .snva-mdl-header-close:hover,
.snva-mdl-content .snva-mdl-header-close:focus {
    color: #adb5bd;
    text-decoration: none;
    cursor: pointer;
}

.snva-mdl-body {
    padding: 0.7em;
}

.snva-mdl-alert .snva-mdl-body {
    padding: 1.1em 0.7em !important;
    font-family: sans-serif;
}

.snva-mdl-footer {
    padding: 6px 10px;
    background-color: #dfe6e8;
    color: white;
    text-align: right;
    font-family: sans-serif;
}

.snva-alert-error .snva-mdl-footer button{
    background-color:#e4711f !important;
}

.snva-alert-error .snva-mdl-footer button:hover:not([disabled]){
    background-color:#e4711f !important;
    opacity: .7;
}

.snva-mdl-footer button{
    border: none;
    color: #FFFFFF;
    background: #07788a;
    padding: 5px 16px;
    border: 1px solid transparent;
    font-family: sans-serif;
    line-height: 1.5;
}

.snva-mdl-footer button:hover:not([disabled]){
  cursor: pointer;
  background: #098ca0;
  color: #fff;
  border: 1px solid #fff;
  box-shadow: none;
}

.snva-field{
  width: 100%;
}

.snva-field select{
  display:block;
  border: 1px solid #9a9898;
  height: 30px;
}

.snva-field textarea{
    width: 100%;
    min-height: 100px;
    padding: 6px;
    max-height: 160px;
    resize: none;
    margin-top: 5px;
    margin-bottom: 0px;
    height: 70px;
    border: 1px solid #ccc;
    font-family: sans-serif;
    font-size: 13px;
    line-height: 1.5;
}

.snva-separator{
    width: 100%;
    display: block;
    height: 1px;
    background: rgba(99, 99, 99, 0.4);
    margin: 4px 0px;
}

.snva-screenshot img{
    width: 100%;
    height: 100%;
    max-height: 246px;
    border: 1px solid rgba(0, 0, 0, 0.18);
}

.snva-screenshot{
    padding: 5px;
    width: 100%;
    height: 100%;
    overflow: hidden;
    max-height: 260px;
    border: 2px dashed #a7a4a4;
}

.snva-spinner {
    width: 1.2rem;
    height: 1.2rem;
    border-top-color: #FFFFFF;
    border-left-color: #ffffff;
    margin-right: 6px;
    animation: snva-animation-spinner 400ms linear infinite;
    border-bottom-color: transparent;
    border-right-color: transparent;
    border-style: solid;
    border-width: 2px;
    border-radius: 50%;
    box-sizing: border-box;
    display: inline-block;
    vertical-align: middle;
  }
  
  /* Animation styles */
  @keyframes snva-animation-spinner {
    0% {
      transform: rotate(0deg);
    }
    100% {
      transform: rotate(360deg);
    }
  }
</style>
