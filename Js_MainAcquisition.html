      // Agregamos el valor del importe

      // mostramos la fila
      $currRow_ .addClass("isValid");
    });

    // Actualizamos el valor del importe

  /**
   * Función que permite realizar el filtro en el campo de historial de ordenes
   **/
  function filterOrderHistory_(e) {
    e.preventDefault();

    // Obtenemos los datos del formulario
    var formObject_ = {
      type: $("input[name='filterOrderType']:checked").val()
    };

    // Se valida si se filtra por fabricante
    if(formObject_.type == "manufacturer"){
      formObject_.value = $("#sltFilterOrderManufacturer").val() || null;
    } else if(formObject_.type == "orderId"){
      formObject_.value = $("#sltFilterOrderId").val() || null;
    } else{
      formObject_.value = $("#txtFilterOrderProduct").val() || "";
    }

    // Se valdia si NO existe un valor
    if(!formObject_.value){
      
      // mostramos el respectivo mensaje
      SnvaJsApi.showAlert("Los campos con asterisco(*) son obligatorios");
      return false;
    }

    // Se valida si se filtra por fabricante
    if(["manufacturer", "orderId"].indexOf(formObject_.type) != -1){

      // Eliminamos acentos
      formObject_.value = formObject_.value.map(function(currValue_){
        return SnvaJsApi.removeLatinSymbols(currValue_).toLowerCase();
      });
    }
    
    // referenciamos el id de la tabla
    var tableId = "tblHistoryData";
    var allImporte_ = 0;
    
    // referenciamos el id del paginador
    var paginationId = "ulPaginationHistoryData";
    
    // removemos los acentos
    var currentText = "", $currentRow = null, productNameTemp_;

    // recorremos las filas actuales de la tabla
    $("#" + tableId + " tbody tr").each(function() {

      // referenciamos la fila recorrida
      $currentRow = $(this);

      // Se valida si se filtra por fabricante
      if(["manufacturer", "orderId"].indexOf(formObject_.type) != -1){

        // obtenemos el texto actual de la fila
        currentText = SnvaJsApi.removeLatinSymbols($currentRow.text()).toLowerCase();

        // Recorremos cada uno de los datos para filtrar la información
        for(var k = 0; k < formObject_.value.length; k++){
        
          // validamos si el texto ingresado por el usuario equivale a una de las filas
          if (currentText.indexOf(formObject_.value[k]) != -1) {

            // mostramos la fila
            $currentRow.addClass("isValid");

            // Agregamos el valor del importe
            allImporte_ += ($currentRow.data("importe") || 0);
            break;
          } else {
            // ocultamos la fila
            $currentRow.removeClass("isValid");
          }
        }

      } else {

        // Obtenemos la información del producto
        productNameTemp_ = $currentRow.data("productData");
        var rowIsValid_ = false;

        // Se valida si existe la información del producto
        if(productNameTemp_){

          // recorremos y validamos si alguno de los productos corresponde al elegido por el usuario
          for(var n = 0; n < productNameTemp_.length; n++){

            // validamos si el texto ingresado por el usuario equivale a una de las filas
            if (productNameTemp_[n].name.indexOf(formObject_.value) != -1) {

              // mostramos la fila
              rowIsValid_ = true;
              break;
            }
          }
        }

        // validamos si el texto ingresado por el usuario equivale a una de las filas
        if (rowIsValid_) {

          // mostramos la fila
          $currentRow.addClass("isValid");

          // Agregamos el valor del importe
          allImporte_ += ($currentRow.data("importe") || 0);
        } else {
          // ocultamos la fila
          $currentRow.removeClass("isValid");
        }
      }      

    });

    // Actualizamos el valor del importe
    $(".th__importe-order").html(SnvaJsApi.formatValue(SnvaJsApi.roundDecimal(allImporte_, 6)));

    // iniciamos el paginador de la tabla respectiva
    SnvaJsApi.initPaginationByTable($("#" + tableId), paginationId, 10);

  }

  /**
  * Permite habilitar el autocompletado del campo de especies en el modal de busqueda
  **/
  function addAutocompleteSpeciesAdquicition_($input, conceptList){
    
    // Variable para usar como data de una especie
    var initData = getItemAutocompleteSpeciesAdquicition_(conceptList, "");
    
    // Agregamos el evento al campos de busqueda de especies
    $input.autocomplete({
      data: initData,
      //minLength: 3,
      onAutocomplete: function(e){
        $input.trigger("keyup");
      }
    });
    
    // Agregamos el evento para que cuandto se realice un cambio
    $input.off("keyup").on("keyup", function(e){
      
      // obtenemos el código
      var keyCode = e.keyCode;
      //$input.popover("destroy");
      // Se valida que sea diferente a las teclas de dirección o al enter o (*)
      if([187, 13, 37, 38, 39, 40].indexOf(keyCode) == -1){
      
        // obtenemos el valor actual
        var currValue = $input.val();
        
        // Se referencia la instancia del autocomplete
        var instance = M.Autocomplete.getInstance($input[0]);
        
        // Se valida si existe la instancia
        if(instance){
          
          // obtenemos los datos
          initData = getItemAutocompleteSpeciesAdquicition_(conceptList, currValue);
          
          // Actualizamos las sugerencias
          instance.updateData(initData);
          
          // se valida si existe sugerencias
          if(Object.keys(initData).length > 1 || (Object.keys(initData).length == 1 && initData[currValue] !== null)){
            
            // Mostramos el buscador
            instance.open();
          }
        }
      }
    });
  }

  /**
  * Permite recorrer cada uno de los conceptos y asi retorna la lista de opciones
  **/
  function getItemAutocompleteSpeciesAdquicition_(conceptList, currValue){
    
    // Variables temporales
    var currSpecieArray = null, returnData = {}, specieEscape = "";
    
    // verificamos la cadema para determinar caracter que requieres ser espacapddo
    specieEscape = SnvaJsApi.escapeRegExp(currValue);
    
    // definimos el regexp
    var regExpValue = new RegExp(("^(" + specieEscape + ")(?: \\S*|\\S*)"), "gi");
    
    // recorras cada uno de los conceptos
    for(var i = 0; i < conceptList.length; i++){
      
      // obtenemos la especie sepada en array
      currSpecieArray = String(conceptList[i][1]).split(" ");
      
      // se valida si curren values esta vacia
      if(currValue == "" && currSpecieArray && currSpecieArray.length > 0){
        
        // se valida que la primera palabra no existe en el objeto principal
        returnData[currSpecieArray[0]] = null;
        
      } else if(currValue != ""){
        
        // obtenermos el grupo
        var matchValue = conceptList[i][1].toString().match(regExpValue);
        
        // validamos si el texto esta dentro de un de los concepros
        if(matchValue != null){
          
          // se valida que la primera palabra no existe en el objeto principal
          returnData[matchValue[0]] = null;        
        }      
      }
    }

    // retornamos los datos
    return returnData;
  }

  /*
  * Permtie agregar las especies por familia
  */
  function addSpeciesForFamily(e){
    
    // Prevenimos el evento por defecto 
    e.preventDefault();
    
    // Referenciamos el campo de seleeción de Familias
    var $contFamilySearchForUpdate = $("#contFamilySearchForUpdate");
    
    // Referenciamos la instacia de chips de la seleeción de familias
    var chipsFamilyInstance = M.Chips.getInstance($contFamilySearchForUpdate);
    
    // Se obtiene los datos registrados
    var chipsDataFamily = chipsFamilyInstance.chipsData;
    
    // se valida si existe  familia seleccionas
    if(chipsDataFamily.length > 0){
      
      // damos forma al array de familias
      var families = chipsDataFamily.map(function(a){
        return a.tag;
      });
      
      // Datos de las especies
      var arrayData = $("#mdlSearchConceptsUpdate").data("arrayData");
      
      // Referenciamos la tabla
      var $tblUpdatePrices = $("#tblUpdatePrices");
      
      // referenciamos el cuerpo
      var $tbody = $tblUpdatePrices.find("tbody");
      
      // crea el objeto vacio
      var conceptObj = {}, newConcepts = 0;
      
      // obtenemos la referncia de los nombres de los usuarios
      var nameReferenceObj = $("#mdlSearchConceptsUpdate").data("nameReference");
      
      // Obtenemos los datos 
      var pricesAnalysis =  $("#frmSearchConceptOC").data("arrayPricesAnalysis");
      
      // obtenemos la información de las familias y su asociación con los fabricantes
      var familyReference = $("#btnAddConceptUpdate").data("familyReference");
      
      // recorremos cada uno de los registros
      for(var i = 0; i < arrayData.length; i++){
        
        // validamos si la familia pertenece a las filtradas
        if(families.indexOf(arrayData[i][2]) != -1){
          
          // validamos que la especie no exista
          if(validateIfExisteConcept(arrayData[i], $tbody)){
            
            // crea el objeto vacio
            conceptObj = {};
            
            // validamos si la especie existe en el listado de precios y si ya han pasado 15 días
            if(nameReferenceObj[arrayData[i][1]]){
            
              // agregamos los valores
              conceptObj[arrayData[i][1]] = {
                conceptCount: 1, 
                keyword: arrayData[i][3], 
                family: arrayData[i][2],
                unit: arrayData[i][4],
                rowIndex: nameReferenceObj[arrayData[i][1]].rowIndex
              };
              
              // Validamos si el concepto se encuentra actualizado  
              if(!isValidUpdatePrices(nameReferenceObj[arrayData[i][1]])){
                
                // Establecemos el color que debe llevar la fila 
                conceptObj[arrayData[i][1]].background = "#e1c572";
              }
              
              // llamammos la función 
              insertConceptsTablesFamily(conceptObj, pricesAnalysis, familyReference, $tblUpdatePrices, $tbody);
              
              // se aumenta el concecutivo
              newConcepts ++;
            }
          }
        }
      }
      
      // actualizamos la información de total de importes maximos y minimos
      amountsSum();
      
      // iniciaizamos el paginador
      SnvaJsApi.initPaginationByTable($tblUpdatePrices, "ulPaginationUpdatePrices", 10);
      
      // se valida si existe algun concepto nuevo agregado
      if(newConcepts > 0){
        
        // se referencia el modal de seleccionar la carpeta destivo 
        var $modal = $("#mdlSearchConceptsUpdateForFamily");
        
        // creamos la instancia del modal
        var instanceMdl = M.Modal.getInstance($modal);
        
        // validamos si existe la instancia
        if(instanceMdl){
        
          // cerramos el modal
          instanceMdl.close();
        }
        
        // Referenciamos la instacia de chips de la seleeción de familias
        var chipsInstance = M.Chips.getInstance($("#contFamilySearchForUpdate"));
        
        // se valida que exista la instancia del campo de tipo chips
        if(chipsInstance){
        
          // eliminamos los chips seleccionados
          chipsInstance.deleteChip();
        }
        
        // mostramos el respectivo mensaje
        SnvaJsApi.showAlert("Se han agregado <b>" + newConcepts + "</b> " + (newConcepts > 0 ? "conceptos" : "concepto") + "  a la lista para actualizar.");
        
      } else {
      
        // mostramos el respectivo mensaje
        SnvaJsApi.showAlert("No existe conceptos nuevos para agregar.");
      }
    } else {
      
      // mostramos el respectivo mensaje
      SnvaJsApi.showAlert("Por favor seleccionar mínimo una familia.");
    }
  }

  /*

  */
  function updateCurrencyTypeHexp(e){

     var objectData = {

     }
     
     // Validamos de que se encuentre los valores

  /*
  * Permite recorrer todas las filas de la tabla de analisis de precios para obtener la sumatoria de los importes.
  */
  function amountsSum(){
    
    // Referenciamos cada unos de las filas activas
    var $rows =  $("#tblUpdatePrices tbody tr.isValid");
    
    // inicializamos los importes para realizar las sumas
    var amountSumMax = 0;
    var amountSumMin = 0;
    
    // Limpiamos los valores
    $("#amountMax").text("0");
    $("#amountMin").text("0");
    
    // Para realizar las conversiones 
    var amountMax = 0;
    var amountMin = 0;
    
    // validamos de que se tengan las filas 
    if($rows && $rows.length > 0){
      
      // Recorremos cada uno de las filas 
      $rows.each(function(){
      
        // referenciamos la fila
        amountMax = $(this).find("td:eq(6)").text();
        amountMin = $(this).find("td:eq(7)").text();
        
        // Quitamos la coma para poder realizar la suma
        amountMax = Number(amountMax.replace(/\,/g, "")) || 0;
        amountMin = Number(amountMin.replace(/\,/g, "")) || 0;
        
        // realizamos la suma de los importes
        amountSumMax = amountSumMax + amountMax;
        amountSumMin = amountSumMin + amountMin;
        
      });
    }
    
    // Establecemos la sumatorias de los importes 
    $("#amountMax").text( SnvaJsApi.formatValue(SnvaJsApi.roundDecimal(amountSumMax, 4), 4));
    $("#amountMin").text( SnvaJsApi.formatValue(SnvaJsApi.roundDecimal(amountSumMin, 4), 4));
    
  }

  /**
   * Función que permite enviar la solicitud de actualización de precios
  **/
  function sendUpdatePrices(){
    
    // referenciamos la tabla
    var $table = $("#tblUpdatePrices");
    
    // referenciamos cada una de las filas
    var $rows = $table.find("tbody tr:not(.info-message)");
    
    // validamo si existe al menos una fila
    if($rows.length > 0){
    
      // variable para guardar los datos de cada especie
      var sendArrayData = [],
          $currentRow = null,
          conceptData = null,
          quantityValue = "";
      
      // recorremos cada una de las filas
      $rows.each(function(){
        
        // referenciamos la fila
        $currentRow = $(this);
        
        // obtenemos los datos de la especie
        conceptData = $currentRow.data("conceptData");
        
        // Obtenemos la cantidad seleccionada
        quantityValue = $currentRow.find("input").val();
        
        // se valida si existe el valor de la cantidad
        if(quantityValue != ""){
        
          // agregamos los datos al array principal
          sendArrayData.push({
            conceptName: $currentRow.data("conceptName"),
            conceptFamily: conceptData.family,
            quantity: quantityValue,
            unit: conceptData.unit,
            rowIndex: conceptData.rowIndex
          });
        }
        
      });
     
      // se valida que la cantidad de fila sea la misma que la cantidad de filas enviadas
      if(sendArrayData.length == $rows.length){
      
        // mostramos mensaje de confirmación antes de eliminar la especie
        SnvaJsApi.confirm("¿Seguro desea enviar la solicitud de actualización de precios para las especies seleccionadas?", function(){
          
          // Mostramos el loading
          SnvaJsApi.manageLoading("block", "Enviando solicitud de actualización de precios, espera un momento por favor...");
          
          // obtenemos el token y mostramos el selector
          google.script.run.withSuccessHandler(resultUpdatePrecies).withFailureHandler(SnvaJsApi.onFailure).sendUpdatePrices(sendArrayData);
          
        });
        
      } else {
        
        // mostramos el respectivo mensaje
        SnvaJsApi.showAlert("Por favor valida que todas las especies tengan un valor de cantidad.");
        
      }
    } else {
      
      // mostramos el respectivo mensaje
      SnvaJsApi.showAlert("Se debe seleccionar al menos una especie.");
      
    }
  }

  /**
   * Función que permite obtener cada uno de los datos del departamento,familia, palabra clave y Unidad
  **/
  function getConceptFilterData(conceptList){
    
    // definimos el objeto a retornar
    var returnObject = {
      departament: {},
      family: {},
      keyWord: {}
    };
    
    // recorremos cada uno de las especies
    for(var i = 0; i < conceptList.length; i++){
      
      // validamos si ya existe el valor del departamento
      if(conceptList[i][0] && !returnObject.departament[conceptList[i][0]]){
        
        // agregamos el departamento
        returnObject.departament[conceptList[i][0]] = null;
        
      }
      
      // validamos si ya existe el valor de familia
      if(conceptList[i][2] && !returnObject.family[conceptList[i][2]]){
        
        // agregamos la familia
        returnObject.family[conceptList[i][2]] = null;
        
      }
      
      // validamos si ya existe el valor de palabre clave
      if(conceptList[i][3] && !returnObject.keyWord[conceptList[i][3]]){
        
        // agregamos la palabre clave
        returnObject.keyWord[conceptList[i][3]] = null;
        
      }
    }
    
    // retornamos el objeto
    return returnObject;
    
  }

  /**
   * Permite obtener la lista de conceptos por diametro
  **/
  function sortResultByDiameter(filterArray){
    
    // variable para agrupar por lso primeros 2 parametros
    var groups = {}, arrayOrder = [], propertyTemp = "", mainArray = [];
    
    // recorermos cada uno de los items
    for(var i = 0; i < filterArray.length > 0; i++){
      
      // obtenemos la propiedad actual
      propertyTemp = filterArray[i][0] + filterArray[i][2] + filterArray[i][3];
      
      // se valida si aun no existe la propiedad
      if(!groups[propertyTemp]){
        
        // Inicializamos el objeto
        groups[propertyTemp] = []
        
        arrayOrder.push(propertyTemp);
        
      }
      
      // agregamos el registro
      groups[propertyTemp].push(filterArray[i]);
      
    }
    
    // recorremos cada una de las propiedades existentes
    for(var j = 0; j < arrayOrder.length; j++){
      
      // agregamos cada grupo en el array principal
      mainArray = mainArray.concat(groups[arrayOrder[j]].sort(function(a, b){
        var x = (Number(String(a[13]).replace(/[^\.\d\n]/gi, "")) || 0);
        var y = (Number(String(b[13]).replace(/[^\.\d\n]/gi, "")) || 0);
        if (x < y) {return -1;}
        if (x > y) {return 1;}
        return 0;
      }));
      
    }
    
    // Se retorna actualizada el orden a mostrar
    return mainArray;
  }

  /**
   * Función que permite validar si la fecha de la ultima actualización ya paso 15 días
  **/
  function isValidUpdatePrices(nameReferenceObj){
 
    // validamos si la propiedad "" no existe para retornar por defceto true
    if(!nameReferenceObj.updateDateStr) return true;
    
    // generamos la fecha
    var updateDate = new Date(nameReferenceObj.updateDateStr);
   
    // Obtenemos la diferencia en dias
    var diffDate =  ((new Date().getTime() - updateDate.getTime()) / 3600000 ) / 24;
    
    //validamos la fecha del registro
    if(diffDate < 15){
   
      // Establecemos de que no se debe agregar el registro  
      return false;
    
    }
    
    // retornamos por defecto verdadero
    return true;
    
  }
  
  /**
   * Función que permite validar si un especie ya existe en la tabla para no permitir agregar el especie
  **/
  function validateIfExisteConcept(conceptData, $tBody){
     
     // definimos el estado inicial
     var state = true,
         conceptName = [],
         keys = [];
     
     // recorremos cada una de las filas
     $tBody.find("tr").each(function(row){
       
       // obtenemos los datos sobe la fila
       conceptName = $(this).data("conceptName");
       
       // validamos si existe la propiedad del nombre
       if(conceptName){
         
         // validamos si los datos de la fila es igual al que paso como parametro
         if(conceptName == conceptData[1]){
           
           // cambiamos el estado a falso
           state = false;
           
           // salimos del ciclo
           return false;
         }
         
       }
       
     });
    
    // retornamos el estado
    return state;
     
  }

  /**
   * Permite calcular el total del modal de actualizar precios
  **/
  function updatePrecieTotalMdl(){
    
    // obtenemos el tipo de moneda
    var currencyType = $("#sltCurrencyUpdatePriceManufacturerF9").val();
    
    // definimos el total
    var total = Number(String($("#txtPriceSpecieManufacturerF9").val()).replace(/\,/g, "")) || 0;
    var currencyValue = 1;
    
    // obtenemos el valor de cantidad
    var quantity = Number($("#txtQuantityManufacturerF9").val()) || 1;
    
    // validamos si el tipo de modena es dolar
    if(currencyType == "USD"){
      
      // obtenemos el valor de tipo de cambio de dolar
      currencyValue = Number(String($("#txtExchangeUsdF9").val()).replace(/\,/g, "")) || 0;
      
    } else if(currencyType == "EUR"){
      
      // obtenemos el valor de tipo de cambio de euro
      currencyValue = Number(String($("#txtExchangeEurF9").val()).replace(/\,/g, "")) || 0;
    }
    
    // calculamos el total actual
    total = total * quantity;
    
    // agregamos el total
    $("#spnTotalF9, #tdF9Subtotal").text(SnvaJsApi.formatValue(SnvaJsApi.roundDecimal(total, 2)));
    
    // obtenemos el porcentaje de descuento y el IVA aplicado
    var iva = Number(String($("#sltProductIvaF9").val()).replace(/\,/g, "")) || 0;
    var discountApplied = Number(String($("#txtDiscountAppliedF9").val()).replace(/\,/g, "")) || 0;
    
    // obtenemos el valor de descuento
    var totalDiscont = (total * discountApplied) / 100;
    
    // calculamos el total - descuento
    total = total - totalDiscont;
    
    // obtenemos el valor de iva
    var ivaDiscont = (total * iva) / 100;
    
    // calculamos el total - descuento
    total = total + ivaDiscont;
    
    // agregamos el total final
    $("#tdF9Total").text(SnvaJsApi.formatValue(SnvaJsApi.roundDecimal((total * currencyValue), 2)));
  }

  /*

  function changeDepartamentOC(){

    var $contDepartmentSearchOC = $("#contDepartmentSearchOC");

      // obtenemos todas las opciones posible de las familias, palabras clave y especies

  /*
  * Permite obtener las familias dependiendo de los departamentos
  */
  function getFamily(familyObj, objectDataSlt){
    
    // validamos de que exista el objeto de las familias
    if(familyObj && Object.keys(familyObj).length > 0){
    
      // Recorremos el objeto
      for (var keyFamily in familyObj) {
      
        // Validamos de no que exista la propiedad
        if(!objectDataSlt.familyListObjSlt[keyFamily]){
        
          //Agregamos la propiedad
          objectDataSlt.familyListObjSlt[keyFamily] = null;
          
          // Obtenemos las palabras claves
          getkeyword(familyObj[keyFamily].keywordListObj, objectDataSlt);
          
        }
      }
      
    }
  }
  
  
  /*
  * Permite obtene las palabras claves y especies 
  */
  function getkeyword(keywordObj, objectDataSlt){
    
    // validamos de que se tengan datos de la familia
    if(keywordObj && (Object.keys(keywordObj).length > 0)){
      
      // Recorremos el objeto
      for (var keyKeyword in keywordObj) {
      
        // Agregamos la propiedad 
        objectDataSlt.keywordListObjSlt[keyKeyword] = null;
        
        // Obtenemos las especies
        getSpecies(keywordObj[keyKeyword], objectDataSlt);
      } 
    
    }
  }
  
  
  /*
  * permite Obtener las especies dependiendo de un objeto de palabras clave
  */
  function getSpecies(speciesArray, objectDataSlt){
    
    // Validamos de que se tengan especies 
    if(speciesArray && speciesArray.length > 0){
    
      //recorremos cada una de las especies 
      for(var j = 0; j < speciesArray.length; j++){
     
        // Agregamos la propiedad al objeto
        objectDataSlt.speciesNameListSlt[speciesArray[j]] = null; 
      }
    }
  
  }

             // Obtenmos los datos del fabricante
             manufacturerData =  pricesAnalysis.manufacturerObj[objectValuesFilter.manufacturers[j]];
             
             // validamos de que tenga especies
             if(manufacturerData.specieArray && manufacturerData.specieArray.length > 0){
              
               // Recorremos cada una de las especies 
               for(var z = 0; z < manufacturerData.specieArray.length; z++){
                 
                 // Validamo de que exista en el array de especies a filtrar
                 if(arraySpeciesList.indexOf(manufacturerData.specieArray[z]) == -1){
                   
                   // Agregamos la especies
                   arraySpeciesList.push(manufacturerData.specieArray[z]);
                   
                 }
                 
                 // validamos de que no se encuentre el fabricante 
                 if(!filterManufacturerObj[objectValuesFilter.manufacturers[j]]){
                 
                   // Creamos la propiedad y los datos de la empresa 
                   filterManufacturerObj[objectValuesFilter.manufacturers[j]] = manufacturerData.manufacturerData; 
                 }
               }
             }
           }
         }
         
         // Obtenemos las especies filtradas
         filterSpeciesArray = getSpeciesFilter(filterSpeciesArray, arraySpeciesList, pricesAnalysis).species;
      
      } else {
     
        // Obtenemos las especies filtradas y los datos de fabricantes
        var speciesAndManufacturers = getSpeciesFilter(filterSpeciesArray, arraySpeciesList, pricesAnalysis, true);
        
        // obtenemos la lista de especies
        filterSpeciesArray = speciesAndManufacturers.species;
        
        // obtenemos la lista de fabricantes
        filterManufacturerObj = speciesAndManufacturers.manufacturers;
      }
    }
  
    // llamamamos la función en la que muestra los datos filtrados
    insertConceptsSearching(filterSpeciesArray, filterManufacturerObj);
  }
   
  /*

    // referenciamos la tabla de analisis de precios
    var $table = $("#tblPriceAnalysisOC");

  /*
  * permite eliminiar una fila de la tabla 
  */
  function deleteItemOC(e){
    
    // Se previene el evento por defecto
    e.preventDefault();
    
    // Obtenemos la fila para eliminar 
    var $currentRow = e.data.$row;
    
    // mostramos mensaje de confirmación antes de proceder a eliminar la especie
    SnvaJsApi.confirm("¿Seguro desea eliminar esta especie?", function(){
      
      // Referenciamos la tabla 
      var $tblConceptSelected = $("#tblConceptSelected");
      
      // Obtenemos los datos de la tabla 
      var specieObjData = $tblConceptSelected.data("specieObjData");
      
      // Obtenemos el nombre del fabricante 
      var specieData = $currentRow.data("specieData");
      
      // Validamos si esxiten los datos
      if(specieObjData && specieData && specieObjData[specieData.specieName]){
        
        // Removemso la propiedad del objeto
        delete(specieObjData[specieData.specieName]);
        
        // Actaulizamos los datos de la tabla 
        $tblConceptSelected.data("specieObjData", specieObjData);
      }
      
      // eliminamos la fila
      $currentRow.remove();
    }); 
  }
  
  /**
   * Permite insertar cada una de las columnas de fabricantes
  **/
  function addColumnsByManufacturers($row, columnReference, manufacturerObject){
   
    // recorremos la cantidad de columnas que se deben crear
    for(var i = 0; i < Object.keys(columnReference).length; i++){
    
      // creamos cada unos de las celdas para los fabricantes de la especie
      $row.append($("<td>").attr({class: "center"}));
    
    }
    
    // variable que referencia la columna donde se debe colocar la columna personalizada
    var columnIndex = -1,
        $td = null,
        priceUnit = 0,
        objectDataConcept = {},
        arrayTemp = [];
    
    // se recorre cada uno de los fabricantes
    for(var key in manufacturerObject){
      
      // obtenemos la columna de acuerdo al nombre del fabricante
      columnIndex = columnReference[key];
      
      // validamos que no sea indefinido
      if(columnIndex != undefined){
        
         //obtenenemos el td par insertar el precio unitario 
         $td = $row.find("td").eq(columnIndex);
         
         // asignamos el evento click a la columna
         $td.addClass("td-price-selected disable-select").off().click(selectionCell).data("manufacturerObject", manufacturerObject[key]);
         
         // Obtenemos el precio unitario ofertado por el fabricante y lo redondeamos a 4 decimales
         priceUnit = SnvaJsApi.roundDecimal(manufacturerObject[key].priceUnit, 4);
         
         // Validamos de que exista un valor
         if(priceUnit && priceUnit > 0){
         
           //validamos si no extiste la propiedad en el objeto 
           if(!objectDataConcept[priceUnit]){
           
             // Agregamos el nuevo precio
             objectDataConcept[priceUnit] = [$td];
             
             // Agregamos el nuevo precio 
             arrayTemp.push(Number(priceUnit));
           } else {
           
             // insertamos la fila en un precio ya establecido
             objectDataConcept[priceUnit].push($td);
           }
         }
         
         // Insertamos el precio unitario
         $td.html(SnvaJsApi.formatValue(priceUnit) + "<br>(" + manufacturerObject[key].unit + ")");
        
      }
    }
    
    // Actualizamos los colores de la tabla
    updateColorPrice($row, objectDataConcept, arrayTemp);
  }
  
  /* 
  *Función que permite insertar la cabecera a la tabla
  */
  function insertTableHead($table, manufacturerObject){
    
    // obtenemos la primera fila de la cabecera de la tabla
    var $firtRow = $table.find("thead").find("tr"),
        currentData = {},
        columnReference = {},
        columnIndex = 3;
    
    // borramos los datos de la fila y agregamos las 4 columnas por defecto
    $firtRow.html('<th>Acciones</th><th>Nombre de la especie</th> <th class="center">Unidad</th><th class="center">Cantidad</th>');
    
    // recorremos cada uno de los fabricantes
    for(var key in manufacturerObject){
      
      // aumentamos el contador de la columna
      columnIndex ++;
      
      // se agrega una propiedad con el nombre del fabricante y la ubicación del mismo
      columnReference[key] = columnIndex;
      
      // referenciamso el fabricante actual
      currentData = manufacturerObject[key];
      
      // se valida que la moneda de cambio se dolar o euro
      if(currentData.currencyType.indexOf("USD") != -1  ||  currentData.currencyType.indexOf("EUR") != -1 ){
      
        // agregamos la columna
        $firtRow.append(
          $("<th>").data("manufacturerData", currentData).attr({class: "center"}).append(currentData.manufacturerName).append(
            $("<br>")
          ).append(
           $("<a>").data("manufacturerData", currentData).attr({id:"btnUpdateCurrencyType", href:"javascript:void(0)", class:"btn btn-update-type"}).append(insertHtmlFlag(currentData.currencyType)).click(updateCurrencyType)
          ) 
        );
        
      } else{
      
        // agregamos la columna
        $firtRow.append(
          $("<th>").data("manufacturerData", currentData).attr({class: "center"}).html(currentData.manufacturerName)
        );
        
      }
      
    }
    
    // retornamos la referencia de las columnas
    return columnReference;
    
  }
 
  /*
  * permite realizar el filtro de especies 
  **/
  function getSpeciesFilter(filterSpeciesArray, arraySpeciesList, pricesAnalysis, requiredManufacturer){
    
    // datos de cada especie
    var specieData = {},
        manufacturerData = {};
    
    // Recorremos las especies 
    for(var i = 0; i < arraySpeciesList.length; i++){
      
      // Datos de la especie 
      specieData = pricesAnalysis.speciesObj[arraySpeciesList[i]];
     
      // Validamos que existan los datos de la especie
      if(specieData){
        
        // se valida si se requiere información de fabricantes
        if(requiredManufacturer){
          
          // se recorre cada uno de los fabricantes
          for(var key in specieData.manufacturersObj){
            
            // se valida si el fabricante aun no existe
            if(!manufacturerData[key]){
              
              // se Agrega el fabricante en el array principal
              manufacturerData[key] = specieData.manufacturersObj[key];
              
            }
          }
        }
        
        // Agregamos los datos del fabricante 
        filterSpeciesArray.push(specieData);
      }
    }
    
    // Retornamos la especies filtradas
    return {
      species: filterSpeciesArray,
      manufacturers: manufacturerData
    };
  }

  /**
   * Función que permite mostrar la formula en el campo respectivo
  **/
  function showFormuleInField(){
    
    // referenciamos el campo
    var $field = $(this);
    
    // cambiamos el atributo de "pattern" para que no acepte espacios
    $field.attr("pattern", "^((?![a-zA-Z_\\n ]).)*$");
    
    // obtenemos el atributo "data-formule"
    var formule = $field.attr("data-formule");
    
    // si existe el valor
    if(formule){
      
      // agregamos la formula
      $field.val(formule);
    }
    
  }
  
  /**
   * Función que permite crear la propiedad de "data-formule" en el campo y ejecutar la formula
  **/
  function processFormuleInField(){
    
    // referenciamos el campo
    var $field = $(this);
    
    // cambiamos el atributo de "pattern" para que solo acepte numeros
    $field.attr("pattern", "^[0-9]+(?:\\.[0-9]{1,3}){0,1}$");
    
    // obtenemos el valor actual
    var value = String($field.val()).replace(/ /g, "");
    
    // agregamos el valor al atributo "data-formule"
    $field.attr("data-formule", value);
    
    // agregamos la formula
    $field.val(evalFormule(value));
    
  }
  
  /**
   * Función que permite evaluar una formula
  **/
  function evalFormule(value){
    
    // variable para el valor procesado
    var processValue = 0;
    
    // obtenemos el valor procesado
    try{
      
      // se procesa la formula
      processValue = eval(value);
      
    } catch(e){
  
      // definimos un valor por defecto de cero(0)
      processValue = 0;
    }
    
    // retornamos el valor procesado
    return processValue;
    
  }
  
  /**
   * Función que permite seleccionar o desmarcar una columna
  **/
  function selectionCell(e){
    
    // Se previene el evento por defecto
    e.preventDefault();
    
    // refernciamos el elemento actual
    var $elem = $(this);
    
    // validamos si ya tiene la clase "td-selected-group"
    if(!$elem.hasClass("td-price-selected-active")) {
      
      // removemos el span que funciona como check
      $elem.closest("tr").find("td.td-price-selected-active").removeClass("td-price-selected-active").find("span").remove();
      
      // creamos el contenedor
      $elem.prepend($("<span>"));
      
    } else {

  /*
  * Función que permite actulizar los colores de la tabla 
  */
  function updateColorPrice($row, objectDataConcept, arrayTemp){
    
    // Ordenamos el objeto
    arrayTemp.sort(function(a,b){
      return a - b;
    });
    
    // Validamos si la cantidad de elementos es 1 
    if(arrayTemp.length == 1){
      
      // Agregamos el color ver a la celda
      objectDataConcept[arrayTemp[0]].forEach(function($td){
        $td.addClass("price-green");
      })
    
    // validamos si existe mas de un elmento
    }else if(arrayTemp.length > 1){
      
      // Agregamos el color verde al primer elemento 
      objectDataConcept[arrayTemp[0]].forEach(function($td){
        $td.addClass("price-green");
      
      }) 
      
      // Agregamos el color rojo al ultimo elmento 
      objectDataConcept[arrayTemp[arrayTemp.length-1]].forEach(function($td){
        $td.addClass("price-red");
      
      }) 
      
      // recorremos los elementos faltantes
      for(var i = 1; i <arrayTemp.length - 1; i++){
       
       // Agregamos el color amarillo
       objectDataConcept[arrayTemp[i]].forEach(function($td){
         $td.addClass("price-yellow");
      
       }) 
      
      }
    }
  }

  /*

  */
  function saveCurrencyType(e){
     
    // Se previene el evento por defecto
    e.preventDefault();
    
    // obtenemos los datos del fabricante 
    var manufacturerData = $("#ctnCurrencyTypeField").data("manufacturerData");
    
    // Inicializamos los tipos de cambios en vacios
    manufacturerData.newUSD = "";
    manufacturerData.newEUR = "";
    
    // Validamos si existe el tipo de cambio de dolar
    if(manufacturerData.currencyType.indexOf("USD") != -1){
     
     // Obtenemos el tipo de cambio en dolares
     manufacturerData.newUSD = $("#txtUpdateCurrencyTypeUSD").val();
     
    }
    
    // Validamos si existe el tipo de cambio de Euros
    if(manufacturerData.currencyType.indexOf("EUR") != -1){
     
     // Obtenemos el tipo de cambio en Euros
     manufacturerData.newEUR = $("#txtUpdateCurrencyTypeEUR").val();
     
    }
    
    // Ocultamos el loading
    SnvaJsApi.manageLoading("block", "Actualizando tipo de cambio...");
    
    // Guardamos y actualizamos el tipo de cambio de los productos 
    google.script.run.withSuccessHandler(function(pricesAnalysis){
      console.log('pricesAnalysis', pricesAnalysis);
      // Actualizamdos los campos del filtro
      updateDataFromAcquisitions(pricesAnalysis);
      
      // Simulamos el clir para actualizar los precios de la tablas
      $("#btnSearchConceptOC").trigger("click");
      
      // se referencia el modal de seleccionar la carpeta destivo 
      var $modal = $("#mdlCurrencyType");
      
      // creamos la instancia del modal
      var instanceMdl = M.Modal.getInstance($modal);
      
      // validamos si existe la instancia
      if(instanceMdl){
      
        // cerramos el modal
        instanceMdl.close();
      }
      // Ocultamos el loading
      SnvaJsApi.manageLoading("none", "Espera un momento por favor...");
      
      // mostramos el respectivo mensaje
      SnvaJsApi.showAlert("Se actualizo con éxito los tipos de cambio del fabricante.");
            
    }).withFailureHandler(SnvaJsApi.onFailure).updateCurrencyType(manufacturerData);
   
  }

  /**
   * permite enviar correo de notificación al fabricante
  **/
  function sendAccessDataByManufacter(e){
    
    // Se previene el evento por defecto
    e.preventDefault();
    
    // obtenemos los datos 
    var manufacturerData = $(this).closest('tr').data('manufacturerData');
    
    // validamos si la contraseña o el correo aun no existen
    if(!manufacturerData.password || !manufacturerData.email){
      
      // validamos si la contraseña es la que no existe
      if(!manufacturerData.password){
        
        // mostramos el respectivo mensaje
        SnvaJsApi.showAlert("Lo sentimos este fabricante aun no tiene asiganada una contraseña.");
        
      } else if(!manufacturerData.email){
        
        // mostramos el respectivo mensaje
        SnvaJsApi.showAlert("Lo sentimos este fabricante aun no tiene asiganado un correo.");
      }
      
      // terminamos la ejecución
      return false;
    }
    
    // mostramos mensaje de confirmación antes de proceder a enviar los datos de acceso
    SnvaJsApi.confirm("¿Seguro desea enviar los datos de acceso al fabricante?", function(){
      
      // Ocultamos el loading
      SnvaJsApi.manageLoading("block", "Enviando datos de acceso...");
      
      // se procede a enviar los datos de acceso al fabricante
      google.script.run.withSuccessHandler(function(){
      
        // Ocultamos el loading
        SnvaJsApi.manageLoading("none", "Espera un momento por favor...");
        
        // mostramos el respectivo mensaje
        SnvaJsApi.showAlert("Se ha enviado los datos de acceso correctamente..");
              
      }).withFailureHandler(SnvaJsApi.onFailure).sendMailNotifyAccess(manufacturerData);
      
    }); 
    
  }
  
  /**
   * Función que permite habilitar o deshabilitar la opción de enviar correo a los fabricantes
  **/
  function enabledSendMail(e){
    
    // obtenemos el id de la tabla
    var tableId = e.data.tableId;
    
    // variable para definir el contenedor de la opción
    var $btn = null;
    var $btnAssign = $("#btnAssignFamilies");
    
    // se referencia la tabla
    var $table = $("#" + tableId);
    
    // se valida si la tabla que proviene el usuario es de la de fabricantes
    if(tableId == "tblManufacturers"){
      
      // referenciamos el boton de enviar el correo
      $btn = $("#btnSendMailManufacturers");
      
    } else {
      
      // contenedor de la opción de paquetería
      $btn = $("#btnSendMailParcel");
      
    }
    
    // se valida si existe algun opción selecciondo
    if($table.find("tbody tr input[type='checkbox']:checked").length > 0){
      
      // habilitamos el boton
      $btn.attr({disabled: false});
      
    } else {
      
      // deshabilitamos el boton
      $btn.attr({disabled: true});
      
    }
    
     // se valida si existe algun opción selecciondo
    if($table.find("tbody tr input[type='checkbox']:checked").length > 0 && $table.find("tbody tr input[type='checkbox']:checked").length < 2){
      
      // habilitamos el boton
      $btnAssign.attr({disabled: false});
      
    } else {
      
      // deshabilitamos el boton
      $btnAssign.attr({disabled: true});
      
    }
    
  }
  
  /**
   * Creamos la función que permite cambiar entre paneles
  **/
  function changePanel(e){
    
    // obtenemos la referencia del elemento seleccionado
    var $element = $(this);
    
    // ocultamos los 2 paneles
    $("#ctnManufacturers, #ctnParcel, #ctnUpdatePrices, #ctnPriceAnalysis, #ctnHistoryData, #ctnSpecies, #ctnEditSpecies").addClass("hidden");
   
    // removemos el active en las opciones
    $("a.options-menu").parent().removeClass("active");
    
    // obtenemos el id del panel a mostrar
    var panelId = $element.attr("href");
    
    // agregamos la clase "active" en la opción elegida en ambos paneles
    $("a.options-menu[href='" + panelId + "']").parent().addClass("active");
  
    // Validamos si el el palndel de Analisis y orden de compra

  /**
   * Permite obtener los grupos actuales como objeto
  **/
  function getCommodinsObject(currValue){
    
    // obtenemos los grupos actuales
    var currGroups = currValue.match(/(?:\${.*?})/g);
    
    // definimos el objeto actual
    var currOptions = {}, tempMatch = null;
    
    // se valida si ya existen grupos
    if(currGroups != null){
      
      // recorre cada uno de los grupos
      for(var i = 0; i < currGroups.length; i++){
      
        // se obtiene el valor y la propiedad
      	tempMatch = currGroups[i].match(/(?:\{(.*?)=(.*?)})/);
        
        // se valida si es valido el grupo
        if(tempMatch != null){
          
          // Agregamos la nueva propiedad y valor
          currOptions[tempMatch[1]] = tempMatch[2];
          
        }
      }
    }
    
    // retornamos los datos
    return currOptions;
    
  }
  
  /**
   * Permite consultar la lista de comodines
  **/
  function getComodinListPopover($element, conceptList){
    
    
    /*Modificación por @ Antonio Cespedes  <dirtic@hidro.expert> */
    // obtenemos el valor del departamento, familia y palabra clave
    var formDataFilters = {
      departament: $("#txtDepartmentSearchUpdate").val(),
      family: $("#txtFamilySearchUpdate").val(),
      keyWord: $("#txtKeywordSearchUpdate").val()
    };
    /* termina modificación */
 
    // obtenemos el valor actual
    var currValue = String($element.val()).trim();
    
    // definimos el objeto actual
    var currOptions = getCommodinsObject(currValue);
    
    // obtenemos la lista de comodines
    var comodineList = getComodinesList(conceptList, currValue, currOptions, formDataFilters);

    // definimos el contenedor
    var $content = $("<div>").html('<div class="popover__error-content" style="display:none;"></div>');
    
    // creamos el select del comodín
    var $comodin = $("<select>").attr({class: "form__control-field list__comoddin-data"}).html('<option value="">-- Seleccione un comodín --</option>');
    
    // obtenemos las claves organizadas
    var sortKeys = Object.keys(comodineList).sort();
    
    // Se recorre cada uno de los items
    for(var index = 0; index < sortKeys.length; index++){
      
      /*Modificación por @ Antonio Cespedes  <dirtic@hidro.expert> */
      // obtenemos los valores del select para separarlos y organizarlos
      var dataValues = comodineList[sortKeys[index]].toString();
      
      // guardamos en un array los valores separados por coma, para ordenarlos
      dataValues = dataValues.split(",");
      
      // declaramos nuestro array asociativo
      var dataValuesArr = [];
      var numbers = 0;
      var strings = 0;
      
      dataValues.forEach(value => {        
               
        // Obtenemos el valor numerico dentro de value
        let relativeValue = extractNumber(value);
        
        let newValueinArray = [];
        
        if (relativeValue>0){
          newValueinArray = {
            "label": value,
            "numeric_value": Number(relativeValue)
          }
          numbers++;
        } else {
          newValueinArray = {
            "label": value,
            "numeric_value": value
          }
          strings++;
        }
        
        // Agregamos el objeto al array
        dataValuesArr.push(newValueinArray);
        
      });

      // ordenamos los valores en funcion de su valor numerico
      // Si generalmente son numeros los ordenamos por valor numerico 
      if(numbers>=strings){
        dataValuesArr.sort(function (x, y) {
            return x.numeric_value - y.numeric_value;
        });
      } else {
        dataValuesArr.sort(function (x, y) {
            let a = x.label.toUpperCase(),
                b = y.label.toUpperCase();
            return a == b ? 0 : a > b ? 1 : -1;
        });
      }    
      
            
      // declaramos variable de salida para impresión dentro del data-values del combo
      var dataValuesTxt = "";
      dataValuesArr.forEach(el => {
        if (dataValuesTxt == ""){
          dataValuesTxt = el.label;
        }else{
          dataValuesTxt = dataValuesTxt+","+el.label;
        }
      });  
      
      /* termina modificación*/
      
      // Agregamos la opción
      $comodin.append(
        $("<option>").attr({"value": sortKeys[index], "data-values": dataValuesTxt}).text(sortKeys[index])
      )
    }
    
    // creamos el select del comodín
    var $comodinValue = $("<select>").attr({class: "form__control-field list__comoddin-values"}).html('<option value="">-- Seleccione un valor --</option>');
    
    // Agregamos los campos
    $content.append($comodin).append($comodinValue);
    
    // Agregamos las opciones de cancelar o agregar
    $content.append(
      $("<div>").attr({class: "content__popover-buttons"}).append(
        $("<button>").attr({class: "waves-effect waves-light btn-small white grey-text btn__cancel-commodin"}).text("Cancelar")
      ).append(
        $("<button>").attr({class: "waves-effect waves-light btn-small btn__add-commodin", "data-input": $element.attr('id')}).text("Aceptar")
      )
    );
    
    // retornamos el contenedor
    return $content.html();    
  }
  
  /**
  * Antonio Cespedes <dirtic@hidro.expert
  * Esta función extrae un numero de un texto para asignar valor
  **/
  function extractNumber(str) {
    
    var doubleNumber = Number(str.replace(/[^0-9\.]+/g,""));
    
    var fractionNumber = str.match(/(?:[1-9][0-9]*|0)\/[1-9][0-9]*|((?:[1-9][0-9]*|0)-(?:[1-9][0-9]*|0)\/[1-9][0-9]*)/g,"");
    
    // es numero fraccion o double
    if(fractionNumber){    
      // Conseguir el valor absoluto de esta fracción.
      // Dividimos el string por -, esto indica que tiene un numero entero a la izquierda.
      var disolveFraccion = fractionNumber[0].split("-");
      var absoluteValue = 0;
      
      if(disolveFraccion.length>1){        
        var absoluteDecimalArr = disolveFraccion[1].split("/");
        var absoluteDecimalValue = absoluteDecimalArr[0]/absoluteDecimalArr[1];   
        absoluteValue = Number(disolveFraccion[0])+Number(absoluteDecimalValue);        
      }else{
        var absoluteDecimalArr = disolveFraccion[0].split("/");
        var absoluteDecimalValue = absoluteDecimalArr[0]/absoluteDecimalArr[1];   
        absoluteValue = Number(absoluteDecimalValue);   
      }      
      return absoluteValue;      
    }else{
      return doubleNumber;
    }   
    
  }
  
  /**
   * Permite obtener la lista de comodines y sus respectivos valores
  **/
  function getComodinesList(conceptList, currValue, currOptions, formDataFilters){

    // obtenemos el index desde donde empieza el ptimer comodin
    var startIndex = currValue.indexOf("${");
    
    // Se valida si existe comodines
    if(startIndex != -1){
    
      // eliminamos texto de comodines
      currValue = currValue.substring(0, startIndex);
    }
    
    // Reemplazamos el ultimo astetisco si existe
    currValue = currValue.replace(/\*$/g, "");
    
    // Variables temporales
    var currSpecieArray = null, returnData = {}, specieEscape = "";
    
    // verificamos la cadema para determinar caracter que requieres ser espacapddo
    specieEscape = SnvaJsApi.escapeRegExp(currValue);
    
    // Definimso las propiedade y columna de cada una de ellas
    var properties = getPropertiesComodin(false);
    
    // definimos el regexp
    var regExpValue = new RegExp("^(" + specieEscape + ")", "gi"), isValid = false, currComodin = {};
    
    var genderDataSelected = $("#pnlGenderSearchUpdate").data("genderData");
       
    // recorras cada uno de los conceptos
    for(var i = 0; i < conceptList.length; i++){
    
      /*Modificación por @ Antonio Cespedes  <dirtic@hidro.expert> */
      // En este punto podemos validar si existen conceptos que no estén dentro de los terminos preestablecidos para descartarlos.
      // Omitir por departamento seleccionado
      if (formDataFilters.departament && conceptList[i][0].toString() != formDataFilters.departament){
         continue;
      }
      
      // Omitir por familia seleccionada
      if (formDataFilters.family && conceptList[i][2].toString() != formDataFilters.family){
         continue;
      }     
      
      // omitir por gender
      var mustSkip = 0;
      
      if (genderDataSelected){
        for (var j = 0; j < genderDataSelected.length; j++){           
           if (conceptList[i][13].toString() != genderDataSelected[j]){
             mustSkip++;
           } else {
             mustSkip--;
           }        
        }
        
        if(mustSkip>0){
           continue;
        }
        
      }
      
      /*termina modificacion*/
      
      // partimos de que el registro es valido
      isValid = true;
      
      // se valida si curren values esta vacia
      if(currValue != "" && currValue != "*"){
        
        // obtenermos el grupo
        var matchValue = conceptList[i][1].toString().match(regExpValue);
       
        // validamos si el texto esta dentro de un de los concepros
        if(matchValue == null){
          
          // Establecemos falso por nos indica que no cumple con el inicio de un concepto
          isValid = false;
        }
      }
      
      // validamos con los comodines actuales
      isValid = isComodinValue(conceptList[i], currOptions, properties);
      
      // si el registro es valido
      if(isValid){
        
        // variable para colocar el valor actual del comodin
        var currTempValue = "";
        
        // recorremos cada uno de los tipos de comodines para agregarlos a la lista
        for(var property in properties){
          
          // Validamos si la propedad aun no existe
          if(!currOptions[property]){
          
            // Se obtiene el valor actual
            currTempValue = conceptList[i][properties[property]];
            
            // se valida que exista un valor
            if(currTempValue){
            
              // se valida si la propiedad aun no existe
              if(!returnData[property]){
                
                // Inicializamos la propiedad
                returnData[property] = [];
              }
              
              // se valida que aun no exista el valor en el comodin
              if(returnData[property].indexOf(currTempValue) == -1){
                
                // se agrega el valor
                returnData[property].push(currTempValue);
                
              }
            }
          }// Fin
          
        }
      }
    }

    // retornamos los datos
    return returnData;
  }
  
  /**
   * Se valida si pertenecce a uno de los grupos
  **/
  function isComodinValue(record, currOptions, properties){
    
    // Se recorre cada uno de los grupos actuales
    for(var key in currOptions){
      
      // se valida si la referncia de la propiedad existe
      if(properties[key] && record[properties[key]] != currOptions[key]){
        
        // retornamos false;
        return false;
        
      }
    }
    
    // se retorna el estado por defecto
    return true;
  }

    var regExpValue = new RegExp(("^(" + specieEscape + ")(?: \\S*|\\S*)"), "gi");
    
    // recorras cada uno de los conceptos
    for(var i = 0; i < conceptList.length; i++){
      
      // obtenemos la especie sepada en array
      currSpecieArray = String(conceptList[i][1]).split(" ");
      
      // se valida si curren values esta vacia
      if(currValue == "" && currSpecieArray && currSpecieArray.length > 0){
      	
        // se valida que la primera palabra no existe en el objeto principal
        returnData[currSpecieArray[0]] = null;
        
      } else if(currValue != ""){
        
        // obtenermos el grupo
        var matchValue = conceptList[i][1].toString().match(regExpValue);
        
        // validamos si el texto esta dentro de un de los concepros
        if(matchValue != null){
          
          // se valida que la primera palabra no existe en el objeto principal
          returnData[matchValue[0]] = null;
          
        }
        
      }
    }
   
    // retornamos los datos
    return returnData;
  }

  /**

  function definedValuesList(mainData, formData, currentProperty, currentValue){
    
    // definimos el objeto a retornar
    var returnObject = {
      departament: {},
      family: {},
      keyWord: {},
      gender: []
    };
    
    // recorremos cada uno de los registros
    for(var i = 0; i < mainData.length; i++){
      
      // validamos si la familia y palabra clave corresponde 
      if((!formData.departament || formData.departament == mainData[i][0]) && 
          (!formData.family || formData.family == mainData[i][2]) && 
          (!formData.keyWord || formData.keyWord == mainData[i][3])){
        
        if(mainData[i][0]) returnObject.departament[mainData[i][0]] = null;
        if(mainData[i][2]) returnObject.family[mainData[i][2]] = null;
        if(mainData[i][3]) returnObject.keyWord[mainData[i][3]] = null;
        
        // de valida que palabras claves se deben de agregar
        if((formData.departament || formData.family || formData.keyWord) && mainData[i][13] && returnObject.gender.indexOf(mainData[i][13]) == -1){
          returnObject.gender.push(mainData[i][13]);
        }
      }
      
    }
    
    // no se tiene en cuenta la propiedad del campo actual
    returnObject[currentProperty] = null;
    
    // retornamos loa datos
    return returnObject;
  }

  /*
  * ====================================================================
  *  TLDR
  *   - add search bar to materialize formSelect
  *   - options line 41 - 44
  * --------------------------------------------------------------------
  *  MaterializeCSS tweak to allow text filtering in multiple selects.
  *  - No need to modify Materialize JS files
  *  - Grabs keyboard focus nicely
  *  - No need for annoying JQuery
  *  - Renders correctly for any widget width
  *  - handles optgroups -> only hide empty optgroups,
  *                         show optgroup if child is visible
  *  - handle keyboard navigation - ArrowUp + ArrowDown events
  *  - supports multi select
  *  - hooks M.FormSelect.init
  *  - add M.SelectSearch.init(els) for manual initialisation
  *  - do own autoload
  *    - could be disabled with option 'doOwnAutoload' (line 42)
  *  - sticky searchbar
  *    - disable by option 'stickySearchbar' (line 43)
  *  - scroll focused element into view (keyboard navigation)
  *    - disable by option 'scrollIntoView' (line 44)
  * --------------------------------------------------------------------
  *  Installation
  *  - create js file, and load this after materialize.js
  *  - place attribute to your select:
  *     searchable="placeholder"
  *  - add css rule after materialize.css:
  *     .select-dropdown.dropdown-content li.hover {
  *       background-color: rgba(0,0,0,0.08); }
  * --------------------------------------------------------------------
  * Links
  * - https://github.com/Dogfalo/materialize/issues/3096#issuecomment-778513315
  * - https://jsfiddle.net/cherrg/vgn3Law4/
  * ====================================================================
  */
  (function(){
    "use strict";
    // script options ---------------------------------
    const keyBoardOnMobile = true;
    const doOwnAutoload = true;
    const stickySearchbar = true;
    const scrollIntoView = true;

    // helper functions -------------------------------
    const hasClass = function(el, className){
      if (el.classList) return el.classList.contains(className);
      return (new RegExp('( |^)' + className + '( |$)')).test(className);
    };
    const addClass = function(el, className){
      if (el.classList) el.classList.add(className)
      else if (!hasClass(el, className)) el.className += " " + className;
    }
    const removeClass = function(el, className){
      if (el.classList) el.classList.remove(className)
      else if (hasClass(el, className)) el.className = el.className.replace(new RegExp('( |^)' + className + '( |$)'), ' ');
    }
    const scrollIntoViewIfNeeded = function ( el, strict ) {
      // --------------------
      // init parameters
      // unpack jquery objects
      if (typeof jQuery === "function" && el instanceof jQuery) {
        el = el[0];
      }
      if (typeof strict !== 'boolean') {
        strict = true;
      }
      let parent = el.parentNode;
      let parent_rect = parent.getBoundingClientRect();
      let target_rect = el.getBoundingClientRect();
      if (stickySearchbar) {
        // as searchbar is first element, reduce parent height and top by search bar size
        let searchbar_rect = parent.firstElementChild.getBoundingClientRect();
        parent_rect = {
          top: parent_rect.top + searchbar_rect.height,
          height: parent_rect.height - searchbar_rect.height,
          left: parent_rect.left,
          width: parent_rect.width
        };
      }
      // --------------------
      // scroll into view
      if (target_rect.top < parent_rect.top && (strict || target_rect.top + target_rect.height < parent_rect.top)){
        // element out of bounds -> top
        // as search bar is forst element
        let diff = parent_rect.top - target_rect.top;
        parent.scrollBy(0, -diff);
      } else if (target_rect.top + target_rect.height > parent_rect.top + parent_rect.height && (strict || target_rect.top > parent_rect.top + parent_rect.height)) {
        let diff = parent_rect.top + parent_rect.height - (target_rect.top + target_rect.height);
        parent.scrollBy(0, -diff);
      }
    }

    const init = function (els, force_init) {
      if (typeof force_init !== "boolean") {
        force_init = false;
      }
      if (typeof jQuery === "function" && els instanceof jQuery) {
        els = els.toArray();
      } else if (typeof els === 'object' && !els.hasOwnProperty('forEach') && typeof els.forEach !== 'function') {
        els = [els];
      }

      if (typeof els === 'undefined'|| els === null) return;

      els.forEach(elem => {
        if (!force_init && !elem.hasAttribute('searchable')) {
          // filter for searchable attribute
          return;
        }

        if (elem.dataset.hasOwnProperty('searchableInitDone')) {
          return;
        } else {
          elem.dataset.searchableInitDone = '1';
        }

        const select = elem.M_FormSelect;
        const options = select.dropdownOptions.querySelectorAll('li');

        // Add search box to dropdown
        const placeholderText = select.el.getAttribute('searchable');
        const searchBox = document.createElement('div');
        searchBox.style.cssText =
          'padding: 6px 16px 0 16px;' +
          (stickySearchbar?
          // search boy sticky on top
          'position: -webkit-sticky;' +
          'position: sticky;' +
          'top: 0;' +
          'z-index: 1;' +
          'background-color: inherit;' : '');
        searchBox.innerHTML = `<input type="text" placeholder="${placeholderText}">`;
        select.dropdownOptions.prepend(searchBox);
        const searchInput = searchBox.firstElementChild;

        // Function to filter dropdown options
        function filterOptions(event) {
          // fix index value -> as materialize key handler changes value after keydown - event
          if (event.code === 'ArrowDown' || event.code === 'ArrowUp'){
            let hover_idx = -1;
            // find current hover index
            for(let i = 0; i < options.length; i++){
              if (hover_idx === -1 && hasClass(options[i], 'hover')){
                hover_idx = i;
                break;
              }
            }
            if (hover_idx > -1) {
              select.dropdown.focusedIndex = hover_idx + 1;
              if (scrollIntoView) {
                scrollIntoViewIfNeeded(options[hover_idx], true);
              }
            }
            return;
          } else if (event.code === 'Enter') {
            return;
          }

          // search for value
          const searchText = searchInput.value.toLowerCase().trim();
          let lastOptgroup = null;
          for(let i = 0; i < options.length; i++){
            const text = options[i].textContent.toLowerCase();
            const display = text.indexOf(searchText) === -1 ? 'none' : 'block';
            if (hasClass(options[i], 'optgroup')) {
              lastOptgroup = display === 'none' ? options[i] : null;
            } else if (!hasClass(options[i], 'optgroup-option')) {
              lastOptgroup = null;
            } else {
              if (display !== 'none' && lastOptgroup !== null) {
                lastOptgroup.style.display = display;
              }
            }
            options[i].style.display = display;
          }
          select.dropdown.recalculateDimensions();
          // recalculate may moves focus away in case of resize
          searchInput.focus();
        }

        // Function to handle ArrowUp/ArrowDown keyboard events
        // has to be hooked on keydown to get repeated key events in case of press&hold
        function filterNavigate(event) {
          // handle keyboard focus events
          if (event.code === 'ArrowDown' || event.code === 'ArrowUp'){
            let hover_idx = -1;		// currently hovered option
            let selected_idx = -1;	// currently selected option - start point for up/down, used if nothing hovered
            let visibles = [];
            // find current hover index
            for(let i = 0; i < options.length; i++){
              let optionIsVisible = window.getComputedStyle(options[i]).display !== 'none';
              if (hover_idx === -1 && hasClass(options[i], 'hover')){
                hover_idx = i;
              }
              if(optionIsVisible){
                visibles.push(i);
                if (hover_idx === -1 && selected_idx === -1 && hasClass(options[i], 'selected')){
                  selected_idx = i;
                }
              }
            }
            if (hover_idx === -1 && selected_idx !== -1) {
              hover_idx = selected_idx;
            }
            let new_hover_idx = -1;
            if (visibles.length > 0){
              let direction = event.code === 'ArrowDown' ? 1 : -1;
              if (hover_idx === -1 || visibles.indexOf(hover_idx) === -1) {
                new_hover_idx = visibles[direction === 1 ? 0 : visibles.length - 1];
              } else {
                new_hover_idx = visibles[(visibles.length + visibles.indexOf(hover_idx) + direction) % visibles.length];
              }
            }
            // unset hover
            if (hover_idx > -1) {
              removeClass(options[hover_idx], 'hover');
            }
            if (new_hover_idx > -1) {
              addClass(options[new_hover_idx], 'hover');
              select.dropdown.focusedIndex = new_hover_idx + 1;
            }
          }
        }

        // Function to give keyboard focus to the search input field
        function focusSearchBox() {
          searchInput.focus({
            preventScroll: true
          });
        }

        // Function to init search field and pull focus to search input
        function onSelectDropdownShow() {
          // clear search on open
          if (searchInput.value!=='') {
            searchInput.value='';
            // show all entries
            setTimeout(function(){
              searchBox.dispatchEvent(new KeyboardEvent('keyup', {'key':'Backspace', 'code':'Backspace', 'keyCode':8}));
            }, 200);
          }
          focusSearchBox();
        }

        select.dropdown.options.autoFocus = false;

        if (keyBoardOnMobile || window.matchMedia('(hover: hover) and (pointer: fine)').matches) {
          // listen to Click and ArrowDown select open events
          select.input.addEventListener('click', onSelectDropdownShow);
          select.input.addEventListener('keyup', function(event){
            if (event.code==='ArrowDown') { // select open event
              onSelectDropdownShow();
            }
          });
          for(let i = 0; i < options.length; i++){
            options[i].addEventListener('click', focusSearchBox);
          }
        }

        // filter text
        searchBox.addEventListener('keyup', filterOptions);
        // handle ArrowUp/ArrowDown keyboard events
        searchBox.addEventListener('keydown', filterNavigate);
      });
    }

    // hook materialize select init
    if (typeof M !== 'object') {
      let script_name = (typeof document.currentScript != 'undefined') ? document.currentScript.getAttribute('src') : 'materializecss-select-search.js';
      console.error('['+script_name+'] Has to be loaded AFTER materialize.js and before M.AutoInit() call. To manually init: call M.SelectSearch.init(els);');
    } else {
      M['SelectSearch'] = {
        'init' : function(els) {
          init(els, true);
        }
      };
      const SelectInit = M.FormSelect.init;
      M.FormSelect.init = function (els, options) {
        let t = this;
        SelectInit.call(t, els, options);
        init(els, false);
      }
    }

    // auto init disabled
    if (doOwnAutoload) {
      document.addEventListener('DOMContentLoaded', () => {
        init(document.querySelectorAll('select[searchable]'), true);
      });
    }
  })();
  
});

</script>
