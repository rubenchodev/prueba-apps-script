<script>
/**
 * Función que permite administrar el paginador
 **/
$.fn.pageMe = function(opts){

    // se define el objeto base de opciones por defecto
    var $this = this,
        defaults = {
            activeColor: 'blue',
            perPage: 10,
            showPrevNext: false,
            nextText: '',
            prevText: '',
            hidePageNumbers: false,
            numbersPerPage: 5
        },
        settings = $.extend(defaults, opts);
    
    // se define el contenedor base de los elemento
    var listElement = $this.find("tbody");

    // se define la cantidad de registros que se desean msostrar por ventana
    var perPage = settings.perPage;
    
    // ocultamos todas las filas por defecto
    listElement.find("tr").css('display','none');

    // referenciamos la fila de información
    var $trInfo = listElement.find("tr.info-message");

    // removemos la clase de "isValid" por si la tiene
    $trInfo.removeClass("isValid");

    // obtenemos las filas visibles
    var children = listElement.find("tr.isValid");
    var pager = $('.pager');
    
    if (typeof settings.childSelector!="undefined") {
        children = listElement.find(settings.childSelector);
    }
    
    if (typeof settings.pagerSelector!="undefined") {
    
        pager = $(settings.pagerSelector);
    }
  
    // removemos el paginador anterior
    pager.html("");
    
    var numItems = children.size();
    var numPages = Math.ceil(numItems/perPage);
    
    // validamos si NO existe registros para ocultar la fila de información
    if(numItems == 0){

      // mostramos fila de mensaje
      $trInfo.show();

      // ocultamos el panel del paginador
      pager.closest(".row").hide();
      
    } else {
        
      // mostramos el panel del paginador
      pager.closest(".row").show();
    }
    
    // agregamos la cantidad de resultados
    pager.parent().find("span.spnTotalPagination").html(numItems + " resultados en total");

    pager.data("curr",0);

    if (settings.showPrevNext){
        $('<li><a href="#" class="prev_link" title="'+settings.prevText+'"><i class="material-icons">chevron_left</i></a></li>').appendTo(pager);
    }
  
    var curr = 0;
    while(numPages > curr && (settings.hidePageNumbers==false)){
        $('<li class="waves-effect"><a href="#" class="page_link">'+(curr+1)+'</a></li>').appendTo(pager);
        curr++;
    }
   
    if (settings.numbersPerPage>1) {
        pager.find('.page_link').hide();
        pager.find('.page_link').slice(pager.data("curr"), settings.numbersPerPage).show();
    }

    if (settings.showPrevNext){
        $('<li><a href="#" class="next_link"  title="'+settings.nextText+'"><i class="material-icons">chevron_right</i></a></li>').appendTo(pager);
    }

    pager.find('.page_link:first').addClass('active');
   
    pager.find('.prev_link').addClass("pagination-disabled");
    if (numPages <= 1) {
        pager.find('.next_link').addClass("pagination-disabled");
    }
 
  	pager.children().eq(1).addClass("active " + settings.activeColor);

    children.hide();
    children.slice(0, perPage).show();
   
    pager.find('li .page_link').click(function(){
        var clickedPage = $(this).html().valueOf()-1;
        goTo(clickedPage,perPage);
        return false;
    });
    pager.find('li .prev_link').click(function(){
        previous();
        return false;
    });
    pager.find('li .next_link').click(function(){
        next();
        return false;
    });

    function previous(){
        var goToPage = parseInt(pager.data("curr")) - 1;
        goTo(goToPage);
    }

    function next(){
        goToPage = parseInt(pager.data("curr")) + 1;
        goTo(goToPage);
    }
    /**
     * FUnción que permite navegar entre paginas 
    **/
    function goTo(page){
        
        // Validamos por el id del paginador para cerrar el popover
        if(pager.closest("ul").attr("id") == "ulRenovationPagination" ){
          
          // se garantiza que no exista ningun panel abiertp
          document.querySelectorAll('.popover__open').forEach(function(element) {
            element.click();
          });
        }
        
        var startAt = (page * perPage),
            endOn = startAt + perPage;

        children.css('display','none').slice(startAt, endOn).show();

        if (page>=1) {
            pager.find('.prev_link').removeClass("pagination-disabled");
        }
        else {
            pager.find('.prev_link').addClass("pagination-disabled");
        }

        if (page<(numPages-1)) {
            pager.find('.next_link').removeClass("pagination-disabled");
        }
        else {
            pager.find('.next_link').addClass("pagination-disabled");
        }

        pager.data("curr",page);

        if (settings.numbersPerPage > 1) {
            pager.find('.page_link').hide();
            pager.find('.page_link').slice(page, settings.numbersPerPage + page).show();
        }
      	pager.children().removeClass("active "+settings.activeColor);
        pager.children().eq(page+1).addClass("active "+settings.activeColor);

    }
};
</script>
